<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>식약처 API 수집 설정 - BioFoodLab 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --border: #e2e6ed;
  --text: #1a2332;
  --text2: #5f6b7a;
  --text3: #8892a4;
  --primary: #1a73e8;
  --primary-light: #e8f0fe;
  --success: #0d9f6e;
  --success-light: #def7ec;
  --warning: #f59e0b;
  --warning-light: #fef3c7;
  --danger: #e53e3e;
  --danger-light: #fee2e2;
  --cat-biz: #4f46e5;
  --cat-prd: #0891b2;
  --cat-mat: #16a34a;
  --cat-chg: #d97706;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 14px rgba(0,0,0,.1);
  --radius: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

/* ─── Header ─── */
.header {
  background: linear-gradient(135deg, #1a2332 0%, #2d3a4a 100%);
  color: #fff;
  padding: 24px 32px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.15);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -.3px;
}
.header h1 span { color: #90caf9; font-weight: 400; }
.header-actions { display: flex; gap: 10px; align-items: center; }

/* ─── Buttons ─── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
}
.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-outline {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,.35);
  color: #fff;
}
.btn-outline:hover { border-color: #fff; background: rgba(255,255,255,.1); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

/* ─── Layout ─── */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 32px 60px;
}

/* ─── Cards ─── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  overflow: hidden;
}
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: #fafbfc;
}
.card-header h2 {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-body { padding: 20px; }

/* ─── Schedule Section ─── */
.schedule-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
}
@media (max-width: 768px) {
  .schedule-grid { grid-template-columns: 1fr; }
}
.schedule-item {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.schedule-item label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.schedule-item select,
.schedule-item input {
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text);
  background: #fff;
  transition: border-color .2s;
}
.schedule-item select:focus,
.schedule-item input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-light);
}
.time-picker {
  display: flex;
  align-items: center;
  gap: 6px;
}
.time-picker select {
  width: 80px;
  text-align: center;
}
.time-picker .sep {
  font-size: 18px;
  font-weight: 700;
  color: var(--text3);
}

/* ─── Toggle Switch ─── */
.toggle {
  position: relative;
  width: 44px;
  height: 24px;
  flex-shrink: 0;
}
.toggle input {
  opacity: 0;
  width: 0;
  height: 0;
}
.toggle-slider {
  position: absolute;
  inset: 0;
  background: #cdd5df;
  border-radius: 24px;
  cursor: pointer;
  transition: .25s;
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 18px;
  height: 18px;
  left: 3px;
  bottom: 3px;
  background: #fff;
  border-radius: 50%;
  transition: .25s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.toggle input:checked + .toggle-slider { background: var(--primary); }
.toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

/* ─── Stats Bar ─── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
@media (max-width: 768px) {
  .stats-bar { grid-template-columns: repeat(2, 1fr); }
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-card .stat-value {
  font-size: 26px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.2;
}
.stat-card .stat-label {
  font-size: 11px;
  color: var(--text3);
  margin-top: 4px;
  font-weight: 500;
}

/* ─── Category Tabs ─── */
.cat-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.cat-tab {
  padding: 7px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: #fff;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
  color: var(--text2);
}
.cat-tab:hover { border-color: var(--primary); color: var(--primary); }
.cat-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.cat-tab .cnt { 
  display: inline-block;
  background: rgba(0,0,0,.08);
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 11px;
  margin-left: 4px;
}
.cat-tab.active .cnt { background: rgba(255,255,255,.25); }

/* ─── API List ─── */
.api-item {
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
  transition: all .2s;
}
.api-item:hover { border-color: #c5cdd8; }
.api-item.disabled { opacity: .6; }
.api-item-header {
  display: flex;
  align-items: center;
  padding: 14px 18px;
  gap: 14px;
  cursor: pointer;
  user-select: none;
  background: #fafbfc;
  transition: background .15s;
}
.api-item-header:hover { background: #f3f5f8; }

.api-cat-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: .3px;
  flex-shrink: 0;
}
.badge-업소인허가 { background: #eef2ff; color: var(--cat-biz); }
.badge-품목제조 { background: #ecfdf5; color: var(--cat-prd); }
.badge-원재료 { background: #f0fdf4; color: var(--cat-mat); }
.badge-변경이력 { background: #fffbeb; color: var(--cat-chg); }

.api-info {
  flex: 1;
  min-width: 0;
}
.api-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}
.api-id {
  font-size: 11px;
  color: var(--text3);
  font-family: 'Courier New', monospace;
  margin-top: 1px;
}
.api-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.api-count {
  font-size: 12px;
  color: var(--text2);
  text-align: right;
}
.api-count strong {
  display: block;
  font-size: 16px;
  color: var(--text);
}
.api-expand {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  transition: all .2s;
  color: var(--text3);
  font-size: 12px;
}
.api-item.expanded .api-expand { transform: rotate(180deg); color: var(--primary); }

/* ─── Fields Panel ─── */
.api-fields {
  display: none;
  padding: 0 18px 16px;
  border-top: 1px solid var(--border);
  background: #fff;
}
.api-item.expanded .api-fields { display: block; }

.fields-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0 10px;
}
.fields-toolbar .left {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
}
.fields-toolbar .right { display: flex; gap: 8px; }

.fields-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 6px;
}
.field-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 6px;
  border: 1px solid transparent;
  transition: all .15s;
  cursor: pointer;
}
.field-item:hover { background: #f3f5f8; border-color: var(--border); }
.field-item input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--primary);
  cursor: pointer;
  flex-shrink: 0;
}
.field-label {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
}
.field-key {
  font-size: 10px;
  color: var(--text3);
  font-family: 'Courier New', monospace;
}
.field-item.required {
  background: var(--primary-light);
  border-color: #c4dbf6;
}
.field-item.required input { pointer-events: none; }

/* ─── Collection Log ─── */
.log-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.log-table th {
  text-align: left;
  padding: 10px 12px;
  font-weight: 600;
  color: var(--text2);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 2px solid var(--border);
}
.log-table td {
  padding: 10px 12px;
  border-bottom: 1px solid #f0f2f5;
  color: var(--text);
}
.log-table tr:hover td { background: #fafbfc; }

.status-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 6px;
}
.status-dot.ok { background: var(--success); }
.status-dot.err { background: var(--danger); }
.status-dot.warn { background: var(--warning); }

/* ─── Toast ─── */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  z-index: 9999;
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 8px 30px rgba(0,0,0,.2);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }
.toast.info { background: var(--primary); }

/* ─── Confirm Modal ─── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 500;
  align-items: center;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 14px;
  padding: 28px;
  max-width: 440px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal h3 {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 10px;
}
.modal p {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 20px;
  line-height: 1.7;
}
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- ─── Header ─── -->
<div class="header">
  <div class="header-inner">
    <h1>🔧 식약처 API 수집 설정 <span>| BioFoodLab 관리자</span></h1>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" onclick="loadStatus()">↻ 새로고침</button>
      <button class="btn btn-warning btn-sm" onclick="confirmManualCollect()">▶ 수동 수집</button>
      <button class="btn btn-primary" onclick="saveAllSettings()">💾 설정 저장</button>
    </div>
  </div>
</div>

<div class="container">

  <!-- ─── Stats Bar ─── -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-value" id="statTotal">-</div>
      <div class="stat-label">전체 API</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statActive">-</div>
      <div class="stat-label">수집 활성</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statBizCount">-</div>
      <div class="stat-label">업소 데이터</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statPrdCount">-</div>
      <div class="stat-label">품목 데이터</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statLastCollect">-</div>
      <div class="stat-label">최근 수집</div>
    </div>
  </div>

  <!-- ─── Schedule Settings ─── -->
  <div class="card">
    <div class="card-header">
      <h2>⏰ 수집 스케줄 설정</h2>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:12px;color:var(--text2)">자동 수집</span>
        <label class="toggle">
          <input type="checkbox" id="scheduleActive" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    <div class="card-body">
      <div class="schedule-grid">
        <div class="schedule-item">
          <label>수집 시각 (KST)</label>
          <div class="time-picker">
            <select id="collectHour"></select>
            <span class="sep">:</span>
            <select id="collectMinute"></select>
          </div>
        </div>
        <div class="schedule-item">
          <label>수집 모드</label>
          <select id="collectMode">
            <option value="incremental">증분 수집 (변경분만)</option>
            <option value="full">전체 수집 (전체 재수집)</option>
          </select>
        </div>
        <div class="schedule-item">
          <label>식약처 API 키</label>
          <input type="text" id="apiKey" value="e5a1d9f07d6c4424a757" placeholder="API 인증키">
        </div>
        <div class="schedule-item">
          <label>1회 요청 건수</label>
          <select id="batchSize">
            <option value="50">50건</option>
            <option value="100" selected>100건 (권장)</option>
            <option value="200">200건</option>
            <option value="500">500건</option>
          </select>
        </div>
        <div class="schedule-item">
          <label>요청 간격 (초)</label>
          <select id="requestDelay">
            <option value="0.1">0.1초</option>
            <option value="0.2">0.2초</option>
            <option value="0.3" selected>0.3초 (권장)</option>
            <option value="0.5">0.5초</option>
            <option value="1.0">1.0초</option>
          </select>
        </div>
        <div class="schedule-item">
          <label>서버 API URL</label>
          <input type="text" id="serverUrl" value="http://localhost:5050" placeholder="API 서버 주소">
        </div>
      </div>
    </div>
  </div>

  <!-- ─── API Collection Settings ─── -->
  <div class="card">
    <div class="card-header">
      <h2>📡 수집 대상 API 설정</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-sm btn-outline" style="color:var(--text2);border-color:var(--border)" onclick="toggleAllApis(true)">전체 선택</button>
        <button class="btn btn-sm btn-outline" style="color:var(--text2);border-color:var(--border)" onclick="toggleAllApis(false)">전체 해제</button>
      </div>
    </div>
    <div class="card-body">
      <!-- Category Tabs -->
      <div class="cat-tabs" id="catTabs">
        <button class="cat-tab active" data-cat="all" onclick="filterCategory('all')">전체 <span class="cnt">16</span></button>
        <button class="cat-tab" data-cat="업소인허가" onclick="filterCategory('업소인허가')">업소 인허가 <span class="cnt">9</span></button>
        <button class="cat-tab" data-cat="품목제조" onclick="filterCategory('품목제조')">품목 제조 <span class="cnt">2</span></button>
        <button class="cat-tab" data-cat="원재료" onclick="filterCategory('원재료')">원재료 <span class="cnt">3</span></button>
        <button class="cat-tab" data-cat="변경이력" onclick="filterCategory('변경이력')">변경 이력 <span class="cnt">2</span></button>
      </div>

      <!-- API List -->
      <div id="apiList"></div>
    </div>
  </div>

  <!-- ─── Collection Log ─── -->
  <div class="card">
    <div class="card-header">
      <h2>📋 최근 수집 이력</h2>
      <button class="btn btn-sm btn-outline" style="color:var(--text2);border-color:var(--border)" onclick="loadLogs()">↻ 새로고침</button>
    </div>
    <div class="card-body" style="padding:0; overflow-x:auto;">
      <table class="log-table">
        <thead>
          <tr>
            <th>일시</th>
            <th>API</th>
            <th>모드</th>
            <th>총건수</th>
            <th>수집</th>
            <th>신규</th>
            <th>갱신</th>
            <th>오류</th>
            <th>소요</th>
          </tr>
        </thead>
        <tbody id="logBody">
          <tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text3)">서버 연결 후 데이터가 표시됩니다.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ─── Confirm Modal ─── -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3 id="modalTitle">수동 수집 확인</h3>
    <p id="modalMsg">활성화된 API에 대해 수동 수집을 시작하시겠습니까?<br>수집 모드에 따라 시간이 소요됩니다.</p>
    <div class="modal-actions">
      <button class="btn btn-outline" style="color:var(--text2);border-color:var(--border)" onclick="closeModal()">취소</button>
      <button class="btn btn-warning" id="modalConfirmBtn" onclick="doManualCollect()">수집 시작</button>
    </div>
  </div>
</div>

<!-- ─── Toast ─── -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// API 정의 데이터 (16개)
// ============================================================
var API_DEFS = {
  'I1220': {
    name: '식품제조가공업', category: '업소인허가',
    fields: [
      {key:'LCNS_NO', label:'인허가번호', required:true},
      {key:'BSSH_NM', label:'업소명', required:true},
      {key:'PRSDNT_NM', label:'대표자명'},
      {key:'INDUTY_NM', label:'업종'},
      {key:'PRMS_DT', label:'허가일자'},
      {key:'TELNO', label:'전화번호'},
      {key:'LOCP_ADDR', label:'주소', required:true},
      {key:'INSTT_NM', label:'기관명'}
    ]
  },
  'I2829': {
    name: '즉석판매제조가공업', category: '업소인허가',
    fields: [
      {key:'LCNS_NO', label:'인허가번호', required:true},
      {key:'BSSH_NM', label:'업소명', required:true},
      {key:'PRSDNT_NM', label:'대표자명'},

// ============================================================
// 상태 관리
// ============================================================
var settings = {
  apis: {},       // { apiId: { enabled: true, fields: ['LCNS_NO','BSSH_NM',...] } }
  schedule: {}
};

var currentFilter = 'all';

// ============================================================
// 초기화
// ============================================================
function init() {
  // 시간 선택기 생성
  var hSel = document.getElementById('collectHour');
  for (var h = 0; h < 24; h++) {
    var opt = document.createElement('option');
    opt.value = h;
    opt.textContent = h.toString().padStart(2, '0') + '시';
    if (h === 3) opt.selected = true;
    hSel.appendChild(opt);
  }
  var mSel = document.getElementById('collectMinute');
  for (var m = 0; m < 60; m += 5) {
    var opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m.toString().padStart(2, '0') + '분';
    mSel.appendChild(opt);
  }

  // API 기본 설정 초기화
  Object.keys(API_DEFS).forEach(function(id) {
    settings.apis[id] = {
      enabled: true,
      fields: API_DEFS[id].fields.map(function(f) { return f.key; })
    };
  });

  renderApiList();
  loadFromServer();
}

// ============================================================
// API 리스트 렌더링
// ============================================================
function renderApiList() {
  var container = document.getElementById('apiList');
  var html = '';
  var order = ['I1220','I2829','I-0020','I1300','I1320','I2835','I2831','C001','I1260',
               'I1250','I1310','C002','C003','C006','I2859','I2860'];

  order.forEach(function(id) {
    var def = API_DEFS[id];
    var cfg = settings.apis[id];
    if (!def) return;

    var catClass = 'badge-' + def.category;
    var disabledClass = cfg.enabled ? '' : ' disabled';
    var display = (currentFilter === 'all' || def.category === currentFilter) ? '' : 'display:none;';
    var enabledCount = cfg.fields.length;
    var totalCount = def.fields.length;

    html += '<div class="api-item' + disabledClass + '" id="api-' + id + '" style="' + display + '">';
    html += '  <div class="api-item-header" onclick="toggleExpand(\'' + id + '\')">';
    html += '    <label class="toggle" onclick="event.stopPropagation()">';
    html += '      <input type="checkbox" ' + (cfg.enabled ? 'checked' : '') + ' onchange="toggleApi(\'' + id + '\', this.checked)">';
    html += '      <span class="toggle-slider"></span>';
    html += '    </label>';
    html += '    <span class="api-cat-badge ' + catClass + '">' + def.category + '</span>';
    html += '    <div class="api-info">';
    html += '      <div class="api-name">' + def.name + '</div>';
    html += '      <div class="api-id">' + id + '</div>';
    html += '    </div>';
    html += '    <div class="api-meta">';
    html += '      <div class="api-count">필드 <strong>' + enabledCount + '/' + totalCount + '</strong></div>';
    html += '      <div class="api-expand">▼</div>';
    html += '    </div>';
    html += '  </div>';

    // Fields panel
    html += '  <div class="api-fields">';
    html += '    <div class="fields-toolbar">';
    html += '      <div class="left">수집할 항목 선택 (필수 항목은 해제 불가)</div>';
    html += '      <div class="right">';
    html += '        <button class="btn btn-sm btn-outline" style="color:var(--text2);border-color:var(--border)" onclick="selectAllFields(\'' + id + '\', true)">전체 선택</button>';
    html += '        <button class="btn btn-sm btn-outline" style="color:var(--text2);border-color:var(--border)" onclick="selectAllFields(\'' + id + '\', false)">필수만</button>';
    html += '      </div>';
    html += '    </div>';
    html += '    <div class="fields-grid">';

    def.fields.forEach(function(f) {
      var isReq = f.required ? true : false;
      var isChecked = cfg.fields.indexOf(f.key) >= 0;
      var reqClass = isReq ? ' required' : '';

      html += '      <label class="field-item' + reqClass + '">';
      html += '        <input type="checkbox" ' + (isChecked ? 'checked' : '') + (isReq ? ' checked disabled' : '');
      html += '               onchange="toggleField(\'' + id + '\', \'' + f.key + '\', this.checked)">';
      html += '        <div>';
      html += '          <div class="field-label">' + f.label + (isReq ? ' ✱' : '') + '</div>';
      html += '          <div class="field-key">' + f.key + '</div>';
      html += '        </div>';
      html += '      </label>';
    });

    html += '    </div>';
    html += '  </div>';
    html += '</div>';
  });

  container.innerHTML = html;
}

// ============================================================
// 인터랙션
// ============================================================
function toggleExpand(id) {
  var el = document.getElementById('api-' + id);
  el.classList.toggle('expanded');
}

function toggleApi(id, enabled) {
  settings.apis[id].enabled = enabled;
  var el = document.getElementById('api-' + id);
  if (enabled) el.classList.remove('disabled');
  else el.classList.add('disabled');
  updateStats();
}

function toggleField(apiId, fieldKey, checked) {
  var fields = settings.apis[apiId].fields;
  if (checked && fields.indexOf(fieldKey) < 0) {
    fields.push(fieldKey);
  } else if (!checked) {
    settings.apis[apiId].fields = fields.filter(function(f) { return f !== fieldKey; });
  }
  // 필드 카운트 업데이트
  var el = document.getElementById('api-' + apiId);
  var countEl = el.querySelector('.api-count strong');
  countEl.textContent = settings.apis[apiId].fields.length + '/' + API_DEFS[apiId].fields.length;
}

function selectAllFields(apiId, all) {
  var def = API_DEFS[apiId];
  if (all) {
    settings.apis[apiId].fields = def.fields.map(function(f) { return f.key; });
  } else {
    settings.apis[apiId].fields = def.fields.filter(function(f) { return f.required; }).map(function(f) { return f.key; });
  }
  renderApiList();
}

function toggleAllApis(enabled) {
  Object.keys(settings.apis).forEach(function(id) {
    settings.apis[id].enabled = enabled;
  });
  renderApiList();
  updateStats();
}

function filterCategory(cat) {
  currentFilter = cat;
  document.querySelectorAll('.cat-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.cat === cat);
  });
  renderApiList();
}

// ============================================================
// 통계 업데이트
// ============================================================
function updateStats() {
  var total = Object.keys(API_DEFS).length;
  var active = Object.keys(settings.apis).filter(function(id) {
    return settings.apis[id].enabled;
  }).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statActive').textContent = active;
}

// ============================================================
// 서버 통신
// ============================================================
function getServerUrl() {
  return document.getElementById('serverUrl').value.trim() || 'http://localhost:5050';
}

function loadFromServer() {
  var url = getServerUrl();
  // 설정 불러오기
  fetch(url + '/api/admin/settings')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.success) return;

      // 스케줄 설정 반영
      if (data.schedule) {
        document.getElementById('collectHour').value = data.schedule.collect_hour || 3;
        document.getElementById('collectMinute').value = data.schedule.collect_minute || 0;
        document.getElementById('collectMode').value = data.schedule.collect_mode || 'incremental';
        document.getElementById('apiKey').value = data.schedule.api_key || '';
        document.getElementById('batchSize').value = data.schedule.batch_size || 100;
        document.getElementById('requestDelay').value = data.schedule.request_delay || 0.3;
        document.getElementById('scheduleActive').checked = data.schedule.is_active ? true : false;
      }

      // API 설정 반영
      if (data.apis && data.apis.length > 0) {
        data.apis.forEach(function(a) {
          if (settings.apis[a.api_source]) {
            settings.apis[a.api_source].enabled = a.is_enabled ? true : false;
            if (a.enabled_fields) {
              try { settings.apis[a.api_source].fields = JSON.parse(a.enabled_fields); }
              catch(e) {}
            }
          }
        });
        renderApiList();
      }

      updateStats();
      showToast('서버 설정을 불러왔습니다.', 'info');
    })
    .catch(function(e) {
      console.log('서버 연결 실패:', e);
      updateStats();
    });

  loadStatus();
  loadLogs();
}

function loadStatus() {
  var url = getServerUrl();
  fetch(url + '/api/status')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.success) return;
      var t = data.tables || {};
      document.getElementById('statBizCount').textContent =
        t.fss_businesses ? numberFormat(t.fss_businesses.count) : '0';
      document.getElementById('statPrdCount').textContent =
        t.fss_products ? numberFormat(t.fss_products.count) : '0';

      // 최근 수집일
      var last = null;
      Object.values(t).forEach(function(v) {
        if (v.last_collected && (!last || v.last_collected > last)) last = v.last_collected;
      });
      document.getElementById('statLastCollect').textContent = last ? last.substring(5, 16) : '-';
    })
    .catch(function() {});
}

function loadLogs() {
  var url = getServerUrl();
  fetch(url + '/api/status')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.success || !data.recent_logs || data.recent_logs.length === 0) {
        document.getElementById('logBody').innerHTML =
          '<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text3)">수집 이력 없음</td></tr>';
        return;
      }
      var html = '';
      data.recent_logs.forEach(function(l) {
        var statusClass = l.error_count > 0 ? 'warn' : 'ok';
        html += '<tr>';
        html += '<td>' + (l.started_at || '').substring(0, 16) + '</td>';
        html += '<td><span class="status-dot ' + statusClass + '"></span>' + l.api_source + ' ' + (l.api_name || '') + '</td>';
        html += '<td>' + l.collect_type + '</td>';
        html += '<td>' + numberFormat(l.total_count) + '</td>';
        html += '<td>' + numberFormat(l.fetched_count) + '</td>';
        html += '<td style="color:var(--success)">' + numberFormat(l.inserted_count) + '</td>';
        html += '<td style="color:var(--primary)">' + numberFormat(l.updated_count) + '</td>';
        html += '<td style="color:' + (l.error_count > 0 ? 'var(--danger)' : 'var(--text3)') + '">' + l.error_count + '</td>';
        html += '<td>' + (l.duration_sec || 0) + '초</td>';
        html += '</tr>';
      });
      document.getElementById('logBody').innerHTML = html;
    })
    .catch(function() {});
}

function saveAllSettings() {
  var url = getServerUrl();
  var payload = {
    schedule: {
      collect_hour: parseInt(document.getElementById('collectHour').value),
      collect_minute: parseInt(document.getElementById('collectMinute').value),
      collect_mode: document.getElementById('collectMode').value,
      api_key: document.getElementById('apiKey').value.trim(),
      batch_size: parseInt(document.getElementById('batchSize').value),
      request_delay: parseFloat(document.getElementById('requestDelay').value),
      is_active: document.getElementById('scheduleActive').checked ? 1 : 0
    },
    apis: {}
  };

  Object.keys(settings.apis).forEach(function(id) {
    payload.apis[id] = {
      enabled: settings.apis[id].enabled,
      fields: settings.apis[id].fields,
      name: API_DEFS[id].name,
      category: API_DEFS[id].category,
      all_fields: API_DEFS[id].fields
    };
  });

  fetch(url + '/api/admin/settings', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      showToast('설정이 저장되었습니다. cron 스케줄이 업데이트됩니다.', 'success');
    } else {
      showToast('저장 실패: ' + (data.error || ''), 'error');
    }
  })
  .catch(function(e) {
    showToast('서버 연결 실패. 로컬에 저장합니다.', 'error');
    // localStorage 폴백
    try {
      localStorage.setItem('fss_settings', JSON.stringify(payload));
    } catch(e2) {}
  });
}

// ============================================================
// 수동 수집
// ============================================================
function confirmManualCollect() {
  var activeApis = Object.keys(settings.apis).filter(function(id) {
    return settings.apis[id].enabled;
  });
  document.getElementById('modalMsg').innerHTML =
    '활성화된 <strong>' + activeApis.length + '개 API</strong>에 대해 수동 수집을 시작하시겠습니까?<br>' +
    '현재 모드: <strong>' + document.getElementById('collectMode').value + '</strong><br>' +
    '<span style="color:var(--text3);font-size:12px">전체 수집은 30~60분 소요될 수 있습니다.</span>';
  document.getElementById('confirmModal').classList.add('show');
}

function closeModal() {
  document.getElementById('confirmModal').classList.remove('show');
}

function doManualCollect() {
  closeModal();
  var url = getServerUrl();
  var mode = document.getElementById('collectMode').value;
  var activeApis = Object.keys(settings.apis).filter(function(id) {
    return settings.apis[id].enabled;
  });

  showToast('수집 요청을 전송했습니다...', 'info');

  fetch(url + '/api/admin/collect', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ mode: mode, apis: activeApis })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      showToast('수집이 시작되었습니다. 이력에서 진행 상황을 확인하세요.', 'success');
      setTimeout(loadLogs, 5000);
    } else {
      showToast('수집 실패: ' + (data.error || ''), 'error');
    }
  })
  .catch(function(e) {
    showToast('서버 연결 실패: ' + e.message, 'error');
  });
}

// ============================================================
// 유틸
// ============================================================
function numberFormat(n) {
  if (n === null || n === undefined) return '-';
  return Number(n).toLocaleString();
}

function showToast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + (type || 'info');
  setTimeout(function() { el.classList.add('show'); }, 10);
  setTimeout(function() { el.classList.remove('show'); }, 3500);
}

// ─── Init ───
init();
</script>
