<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BFL - 시료사진 업로드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh;-webkit-text-size-adjust:100%}

/* 헤더 */
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100}
.header-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.header-sub{font-size:12px;opacity:.8;margin-top:2px}

/* 검색 */
.search-section{padding:16px;background:#fff;border-bottom:1px solid #e5e7eb}
.search-row{display:flex;gap:8px}
.search-input{flex:1;padding:12px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s}
.search-input:focus{border-color:#667eea}
.search-btn{padding:12px 20px;background:#667eea;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.search-btn:active{background:#5a6fd6}

/* 접수 정보 */
.receipt-info{margin:12px 16px;padding:16px;background:#fff;border-radius:12px;border:1px solid #e5e7eb;display:none}
.receipt-info.show{display:block}
.info-badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:10px}
.badge-ing{background:#dbeafe;color:#2563eb}
.badge-done{background:#dcfce7;color:#16a34a}
.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:14px}
.info-row:last-child{border:none}
.info-label{color:#6b7280;font-weight:500}
.info-value{color:#111827;font-weight:600;text-align:right;max-width:60%;word-break:break-all}

/* 사진 영역 */
.photo-section{padding:16px;display:none}
.photo-section.show{display:block}
.section-title{font-size:15px;font-weight:700;color:#374151;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.photo-count{font-size:12px;padding:2px 8px;border-radius:10px;background:#ede9fe;color:#7c3aed;font-weight:600}

/* 촬영 버튼 */
.capture-row{display:flex;gap:10px;margin-bottom:16px}
.capture-btn{flex:1;padding:16px;border:2px dashed #d1d5db;border-radius:12px;background:#fff;cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.capture-btn:active{background:#f9fafb;border-color:#667eea}
.capture-btn .icon{font-size:28px}
.capture-btn .label{font-size:13px;font-weight:600;color:#374151}
.capture-btn .hint{font-size:11px;color:#9ca3af}

/* 사진 그리드 */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.photo-thumb{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:1;background:#f3f4f6}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb .del{position:absolute;top:4px;right:4px;width:26px;height:26px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.photo-thumb .uploading-overlay{position:absolute;inset:0;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center}
.photo-thumb .prog-ring{width:36px;height:36px;border:3px solid #e5e7eb;border-top-color:#667eea;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.photo-name{font-size:10px;color:#6b7280;text-align:center;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 저장 */
.save-bar{position:sticky;bottom:0;padding:12px 16px;background:#fff;border-top:1px solid #e5e7eb;display:none}
.save-bar.show{display:block}
.save-btn{width:100%;padding:14px;background:#667eea;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:background .2s}
.save-btn:active{background:#5a6fd6}
.save-btn:disabled{background:#d1d5db;cursor:default}

/* 토스트 */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:12px 24px;background:#1f2937;color:#fff;border-radius:10px;font-size:14px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200}
.toast.show{opacity:1}

/* 최근 접수 목록 */
.recent-section{padding:16px;display:none}
.recent-section.show{display:block}
.recent-title{font-size:14px;font-weight:600;color:#6b7280;margin-bottom:10px}
.recent-item{padding:14px;background:#fff;border-radius:10px;border:1px solid #e5e7eb;margin-bottom:8px;cursor:pointer;transition:background .1s}
.recent-item:active{background:#f9fafb}
.recent-no{font-size:14px;font-weight:700;color:#667eea}
.recent-name{font-size:13px;color:#374151;margin-top:2px}
.recent-meta{font-size:11px;color:#9ca3af;margin-top:2px}

.empty-msg{text-align:center;padding:40px 20px;color:#9ca3af;font-size:14px}

/* 히든 input */
input[type="file"]{display:none}
</style>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/firestore-helpers.js"></script>
</head>
<body>

<div class="header">
    <div class="header-title">📷 시료사진 업로드</div>
    <div class="header-sub">바이오식품연구원 LIMS</div>
</div>

<div class="search-section">
    <div class="search-row">
        <input type="text" class="search-input" id="search-input" placeholder="접수번호 입력 (예: 2026-0001)" inputmode="text" autocomplete="off">
        <button class="search-btn" onclick="searchReceipt()">검색</button>
    </div>
</div>

<div class="receipt-info" id="receipt-info">
    <span class="info-badge" id="info-badge"></span>
    <div class="info-row"><span class="info-label">접수번호</span><span class="info-value" id="info-no"></span></div>
    <div class="info-row"><span class="info-label">의뢰기관</span><span class="info-value" id="info-company"></span></div>
    <div class="info-row"><span class="info-label">제품명</span><span class="info-value" id="info-product"></span></div>
    <div class="info-row"><span class="info-label">검사목적</span><span class="info-value" id="info-purpose"></span></div>
</div>

<div class="photo-section" id="photo-section">
    <div class="section-title">시료사진 <span class="photo-count" id="photo-count">0장</span></div>
    <div class="capture-row">
        <div class="capture-btn" onclick="document.getElementById('camera-input').click()">
            <span class="icon">📸</span>
            <span class="label">카메라 촬영</span>
            <span class="hint">직접 촬영</span>
        </div>
        <div class="capture-btn" onclick="document.getElementById('gallery-input').click()">
            <span class="icon">🖼️</span>
            <span class="label">갤러리 선택</span>
            <span class="hint">여러 장 선택 가능</span>
        </div>
    </div>
    <div class="photo-grid" id="photo-grid"></div>
</div>

<div class="recent-section" id="recent-section">
    <div class="recent-title">최근 접수 목록</div>
    <div id="recent-list"></div>
</div>

<div class="save-bar" id="save-bar">
    <button class="save-btn" id="save-btn" onclick="savePhotos()">사진 저장</button>
</div>

<div class="toast" id="toast"></div>

<input type="file" id="camera-input" accept="image/*" capture="environment" onchange="onFileSelected(this.files)">
<input type="file" id="gallery-input" accept="image/*" multiple onchange="onFileSelected(this.files)">

<script>
var currentReceipt = null;  // {id, no, data}
var photos = [];            // [{file, name, size, url, path, uploading, progress, thumb}]
var hasChanges = false;

document.getElementById('search-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') searchReceipt();
});

// 페이지 로드 시 최근 접수 표시
document.addEventListener('DOMContentLoaded', loadRecentReceipts);

async function loadRecentReceipts() {
    try {
        var snap = await db.collection('receipts')
            .orderBy('createdAt', 'desc')
            .limit(10)
            .get();

        var list = document.getElementById('recent-list');
        if (snap.empty) {
            list.innerHTML = '<div class="empty-msg">최근 접수가 없습니다</div>';
        } else {
            var html = '';
            snap.forEach(function(doc) {
                var d = doc.data();
                var no = d.receiptNo || doc.id;
                var company = d.companyName || d.company || '-';
                var product = d.productName || '-';
                var photoCount = (d.files && d.files.photo) ? d.files.photo.length : 0;
                html += '<div class="recent-item" onclick="loadReceipt(\'' + no + '\')">' +
                    '<div class="recent-no">' + no + '</div>' +
                    '<div class="recent-name">' + company + ' / ' + product + '</div>' +
                    '<div class="recent-meta">사진 ' + photoCount + '장</div>' +
                    '</div>';
            });
            list.innerHTML = html;
        }
        document.getElementById('recent-section').classList.add('show');
    } catch (e) {
        console.error('최근 목록 로드 실패:', e);
    }
}

function loadReceipt(no) {
    document.getElementById('search-input').value = no;
    searchReceipt();
}

async function searchReceipt() {
    var input = document.getElementById('search-input').value.trim();
    if (!input) { showToast('접수번호를 입력하세요'); return; }

    try {
        // receiptNo 필드로 검색
        var snap = await db.collection('receipts')
            .where('receiptNo', '==', input)
            .limit(1)
            .get();

        if (snap.empty) {
            showToast('접수번호를 찾을 수 없습니다');
            return;
        }

        var doc = snap.docs[0];
        currentReceipt = { id: doc.id, no: input, data: doc.data() };

        // 접수 정보 표시
        var d = currentReceipt.data;
        var statusText = d.status || '접수중';
        var badge = document.getElementById('info-badge');
        badge.textContent = statusText;
        badge.className = 'info-badge ' + (statusText === '접수중' ? 'badge-ing' : 'badge-done');
        document.getElementById('info-no').textContent = input;
        document.getElementById('info-company').textContent = d.companyName || d.company || '-';
        document.getElementById('info-product').textContent = d.productName || '-';
        document.getElementById('info-purpose').textContent = d.testPurpose || '-';
        document.getElementById('receipt-info').classList.add('show');

        // 기존 사진 로드
        photos = [];
        if (d.files && d.files.photo && d.files.photo.length > 0) {
            d.files.photo.forEach(function(f) {
                photos.push({
                    file: null, name: f.name, size: f.size || 0,
                    url: f.url || '', path: f.path || '',
                    uploading: false, progress: 0, thumb: f.url || ''
                });
            });
        }

        hasChanges = false;
        renderPhotos();
        document.getElementById('photo-section').classList.add('show');
        document.getElementById('save-bar').classList.add('show');
        document.getElementById('recent-section').classList.remove('show');

    } catch (e) {
        console.error('검색 실패:', e);
        showToast('검색 실패: ' + e.message);
    }
}

function onFileSelected(files) {
    if (!files || !files.length || !currentReceipt) return;
    for (var i = 0; i < files.length; i++) {
        var f = files[i];
        // 중복 체크
        var dup = photos.some(function(p) { return p.name === f.name && p.size === f.size; });
        if (dup) continue;
        photos.push({
            file: f, name: f.name, size: f.size,
            url: '', path: '',
            uploading: false, progress: 0,
            thumb: URL.createObjectURL(f)
        });
    }
    hasChanges = true;
    renderPhotos();
    // input 초기화
    document.getElementById('camera-input').value = '';
    document.getElementById('gallery-input').value = '';
}

function renderPhotos() {
    var grid = document.getElementById('photo-grid');
    document.getElementById('photo-count').textContent = photos.length + '장';

    if (photos.length === 0) {
        grid.innerHTML = '<div class="empty-msg" style="grid-column:1/-1">촬영 또는 갤러리에서 사진을 추가하세요</div>';
        return;
    }

    grid.innerHTML = photos.map(function(p, idx) {
        var overlay = '';
        if (p.uploading) {
            overlay = '<div class="uploading-overlay"><div class="prog-ring"></div></div>';
        }
        return '<div>' +
            '<div class="photo-thumb">' +
                '<img src="' + (p.thumb || p.url) + '" alt="">' +
                overlay +
                '<button class="del" onclick="removePhoto(' + idx + ')">✕</button>' +
            '</div>' +
            '<div class="photo-name">' + p.name + '</div>' +
            '</div>';
    }).join('');
}

function removePhoto(idx) {
    var p = photos[idx];
    // 이미 업로드된 파일이면 Storage에서도 삭제
    if (p.path && p.url) {
        fsDeleteFile(p.path).catch(function(e) { console.warn('삭제 실패:', e); });
    }
    // ObjectURL 해제
    if (p.thumb && p.thumb.startsWith('blob:')) {
        URL.revokeObjectURL(p.thumb);
    }
    photos.splice(idx, 1);
    hasChanges = true;
    renderPhotos();
}

async function savePhotos() {
    if (!currentReceipt) return;

    var btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = '업로드 중...';

    try {
        // 새 파일 업로드
        var promises = [];
        photos.forEach(function(p, idx) {
            if (p.url || p.uploading || !p.file) return;
            p.uploading = true;
            renderPhotos();

            var path = 'receipts/' + currentReceipt.no + '/photo/' + p.name;
            var pr = fsUploadFile(p.file, path, function(pct) {
                p.progress = pct;
            }).then(function(url) {
                p.url = url;
                p.path = path;
                p.uploading = false;
                p.file = null;
                renderPhotos();
            }).catch(function(e) {
                console.error('업로드 실패:', p.name, e);
                p.uploading = false;
                renderPhotos();
                throw e;
            });
            promises.push(pr);
        });

        if (promises.length > 0) {
            await Promise.all(promises);
        }

        // Firestore 업데이트 (files.photo 배열만 갱신)
        var photoData = photos.map(function(p) {
            return { name: p.name, size: p.size, url: p.url || '', path: p.path || '' };
        });

        // 기존 files 데이터 유지하면서 photo만 갱신
        var existingFiles = currentReceipt.data.files || {};
        existingFiles.photo = photoData;

        await db.collection('receipts').doc(currentReceipt.id).update({
            files: existingFiles,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        hasChanges = false;
        showToast('저장 완료! (' + photos.length + '장)');

    } catch (e) {
        console.error('저장 실패:', e);
        showToast('저장 실패: ' + e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '사진 저장';
    }
}

function showToast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
