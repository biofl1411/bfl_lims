// ============================================================
// 모의 계산기 — 해당 항목 전용 (계산식 기반 동적 생성)
// ============================================================
var _simReserved = /^(Math|PI|E|abs|pow|sqrt|log|log10|round|ceil|floor|min|max|parseFloat|parseInt|NaN|Infinity|true|false|undefined|null|return)$/;

function _simParseVars(formula) {
  var vars = [], seen = {}, re = /([a-zA-Z_]\w*)/g, m;
  while ((m = re.exec(formula)) !== null) {
    if (!seen[m[1]] && !_simReserved.test(m[1])) { seen[m[1]] = true; vars.push(m[1]); }
  }
  return vars;
}

function simInit() {
  var el = document.getElementById('sim-body');
  if (!el || el.dataset.inited) return;
  el.dataset.inited = '1';
  var d = window._simCalcData;
  if (!d || !d.calcs || !d.calcs.length) { el.innerHTML = '<div style="padding:12px;text-align:center;color:#94a3b8;font-size:12px">계산식 없음</div>'; return; }

  var h = '';
  d.calcs.forEach(function(calc, ci) {
    var formula = calc.formula || '';
    var formulaText = calc.formulaText || formula || '';
    var vars = formula ? _simParseVars(formula) : [];

    // 계산식 표시
    h += '<div style="background:#faf5ff;border:1px solid #e9d5ff;border-radius:8px;padding:10px;margin-bottom:10px">';
    h += '<div style="font-size:12px;font-weight:600;color:#7c3aed;margin-bottom:4px">' + (calc.label || '결과') + (calc.unit ? ' (' + calc.unit + ')' : '') + '</div>';
    h += '<div style="font-family:monospace;font-size:11px;color:#4c1d95;background:white;padding:6px 10px;border-radius:6px;border:1px solid #e9d5ff;word-break:break-all">' + formulaText + '</div>';
    h += '</div>';

    if (vars.length > 0) {
      // 변수 입력 필드 (field map에서 라벨 조회)
      var cols = vars.length <= 2 ? '1fr 1fr' : vars.length <= 4 ? '1fr 1fr' : '1fr 1fr 1fr';
      h += '<div style="display:grid;grid-template-columns:' + cols + ';gap:6px;margin-bottom:8px">';
      vars.forEach(function(v) {
        var fi = d.fieldMap[v] || {};
        var lb = fi.label || v;
        var unitStr = fi.unit ? ' (' + fi.unit + ')' : '';
        var ph = fi.example || '0';
        h += '<div><label style="font-size:11px;color:#475569;display:block;margin-bottom:3px">' + lb + unitStr + '</label>';
        h += '<input type="number" step="any" id="sim-' + ci + '-' + v + '" placeholder="' + ph + '" value="' + (fi.example || '') + '" oninput="simCalc(' + ci + ')" style="width:100%;padding:6px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px"></div>';
      });
      h += '</div>';
    } else if (formula) {
      // 변수 없는 상수식
      h += '<div style="font-size:11px;color:#64748b;margin-bottom:8px">변수 없는 상수 수식</div>';
    } else {
      // formula가 없으면 수동 입력 모드
      h += '<div style="margin-bottom:8px">';
      h += '<label style="font-size:11px;color:#475569;display:block;margin-bottom:3px">수식 직접 입력 (변수: A~F)</label>';
      h += '<input type="text" id="sim-' + ci + '-custom" placeholder="(A - B) * C / (D * 1000)" oninput="simCalc(' + ci + ')" style="width:100%;padding:6px 8px;border:1px solid #94a3b8;border-radius:6px;font-size:12px;font-family:monospace;margin-bottom:6px">';
      h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">';
      ['A','B','C','D','E','F'].forEach(function(k) {
        h += '<div><label style="font-size:10px;color:#475569">' + k + '</label>';
        h += '<input type="number" step="any" id="sim-' + ci + '-' + k + '" placeholder="0" oninput="simCalc(' + ci + ')" style="width:100%;padding:5px 7px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px"></div>';
      });
      h += '</div></div>';
    }

    h += '<div id="sim-result-' + ci + '"></div>';
    if (ci < d.calcs.length - 1) h += '<hr style="border:none;border-top:1px dashed #e9d5ff;margin:12px 0">';
  });

  // 판정기준 표시
  if (d.judgment && d.judgment.standardText) {
    h += '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:8px 10px;margin-top:8px">';
    h += '<span style="font-size:11px;font-weight:600;color:#991b1b">⚖ 판정기준:</span> ';
    h += '<span style="font-size:12px;font-weight:600;color:#dc2626">' + d.judgment.standardText + (d.judgment.unit ? ' ' + d.judgment.unit : '') + '</span></div>';
  }

  el.innerHTML = h;
  d.calcs.forEach(function(_, ci) { simCalc(ci); });
}

function simCalc(ci) {
  var d = window._simCalcData;
  if (!d || !d.calcs[ci]) return;
  var calc = d.calcs[ci];
  var area = document.getElementById('sim-result-' + ci);
  if (!area) return;

  var formula = calc.formula || '';
  var isCustom = !formula;
  var vars, vals = {};

  if (isCustom) {
    // 수동 입력 모드
    var customEl = document.getElementById('sim-' + ci + '-custom');
    formula = customEl ? customEl.value : '';
    if (!formula) { area.innerHTML = ''; return; }
    vars = ['A','B','C','D','E','F'];
    vars.forEach(function(k) { vals[k] = parseFloat((document.getElementById('sim-' + ci + '-' + k) || {}).value) || 0; });
  } else {
    vars = _simParseVars(formula);
    vars.forEach(function(v) {
      var vLow = v.toLowerCase();
      var fromPrev = false;
      // "Result" 또는 "결과" 포함 변수 → 이전 계산의 규칙적용 값 자동 참조
      if ((vLow.indexOf('result') >= 0 || vLow.indexOf('결과') >= 0) && window._simCalcResults) {
        // 가장 최근 이전 계산 결과 사용
        for (var pci = ci - 1; pci >= 0; pci--) {
          if (window._simCalcResults[pci]) {
            vals[v] = window._simCalcResults[pci].rule;
            fromPrev = true;
            // 입력 필드에도 반영 (표시용)
            var el = document.getElementById('sim-' + ci + '-' + v);
            if (el) {
              el.value = window._simCalcResults[pci].ruleStr;
              el.style.background = '#f0fdf4';
              el.title = '규칙적용 ' + window._simCalcResults[pci].label + ' 값 자동 반영';
              el.readOnly = true;
            }
            break;
          }
        }
      }
      if (!fromPrev) {
        vals[v] = parseFloat((document.getElementById('sim-' + ci + '-' + v) || {}).value) || 0;
      }
    });
  }

  // 수식에 값 대입
  var expr = formula;
  vars.forEach(function(v) {
    expr = expr.replace(new RegExp('\\b' + v + '\\b', 'g'), '(' + vals[v] + ')');
  });

  try {
    var result = Function('"use strict"; return (' + expr + ')')();
    if (typeof result !== 'number' || !isFinite(result)) throw new Error('계산 불가');

    // 원시 결과 (전체 소수점)
    var rawStr = result.toString();
    var unit = calc.unit || '';

    // 규칙적용 결과 (반올림/버림/올림)
    var rules = d.roundingRules || [{ decimal: 2, mode: 'round' }];
    var ruleResult = result;
    rules.forEach(function(rule) {
      var dp = rule.decimal != null ? rule.decimal : 2;
      var factor = Math.pow(10, dp);
      if (rule.mode === 'floor') ruleResult = Math.floor(ruleResult * factor) / factor;
      else if (rule.mode === 'ceil') ruleResult = Math.ceil(ruleResult * factor) / factor;
      else {
        // 오사오입 (banker's rounding): 끝자리 5일 때 앞자리 짝수면 내림, 홀수면 올림
        var shifted = ruleResult * factor;
        var floored = Math.floor(shifted);
        var diff = shifted - floored;
        if (Math.abs(diff - 0.5) < 1e-9) {
          ruleResult = (floored % 2 === 0 ? floored : floored + 1) / factor;
        } else {
          ruleResult = Math.round(shifted) / factor;
        }
      }
    });
    var lastRule = rules[rules.length - 1] || { decimal: 2 };
    var ruleStr = ruleResult.toFixed(lastRule.decimal != null ? lastRule.decimal : 2);
    var modeLabel = rules.map(function(r) {
      var m = r.mode === 'floor' ? '버림' : r.mode === 'ceil' ? '올림' : '반올림';
      return '소수점 ' + (r.decimal != null ? r.decimal : 2) + '자리 ' + m;
    }).join(' → ');

    // 대입 수식 표시
    var h = '<div style="background:#fffbeb;border:1px solid #fbbf24;border-radius:8px;padding:8px 10px;margin-bottom:8px">';
    h += '<div style="font-size:10px;font-weight:600;color:#92400e;margin-bottom:4px">📐 대입 결과</div>';
    h += '<div style="font-family:monospace;font-size:10px;color:#78716c;word-break:break-all">' + expr + '</div>';
    h += '</div>';

    // 원시값 + 규칙적용값 가로 배열
    var rawDisplay = result.toFixed(Math.min(3, rawStr.length));
    if (rawStr.indexOf('.') >= 0) {
      var parts = rawStr.split('.');
      rawDisplay = parts[0] + '.' + parts[1].substring(0, 3);
    } else {
      rawDisplay = rawStr;
    }
    // label에 이미 단위가 포함되어 있으면 중복 방지
    var label = calc.label || '결과';
    var labelHasUnit = unit && label.indexOf(unit) >= 0;
    var labelText = labelHasUnit ? label : (label + (unit ? ' (' + unit + ')' : ''));
    var ruleLabel = '규칙적용' + (unit ? ' (' + unit + ')' : '');

    h += '<div style="display:flex;gap:6px;margin-bottom:6px">';
    h += '<div style="flex:1;background:#f0f9ff;border:1px solid #7dd3fc;border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between">';
    h += '<span style="font-size:11px;font-weight:600;color:#0c4a6e">' + labelText + ':</span>';
    h += '<span style="font-family:monospace;font-size:13px;font-weight:700;color:#0369a1">' + rawDisplay + '</span></div>';
    h += '<div style="flex:1;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between">';
    h += '<span style="font-size:11px;font-weight:600;color:#166534">' + ruleLabel + ':</span>';
    h += '<span style="font-family:monospace;font-size:16px;font-weight:800;color:#059669">' + ruleStr + '</span></div>';
    h += '</div>';

    // 규칙적용값 저장 (다음 계산에서 참조)
    if (!window._simCalcResults) window._simCalcResults = {};
    window._simCalcResults[ci] = { raw: result, rule: ruleResult, ruleStr: ruleStr, label: calc.label || '', unit: unit };

    // 다음 계산 자동 재계산 트리거
    for (var nci = ci + 1; nci < d.calcs.length; nci++) {
      (function(nextIdx) { setTimeout(function() { simCalc(nextIdx); }, 100 * (nextIdx - ci)); })(nci);
    }

    h += '<div style="font-size:10px;color:#94a3b8;margin-bottom:8px;text-align:right">' + modeLabel + '</div>';

    // 판정 비교 (규칙적용값 기준)
    var jr = d.judgment;
    var limVal = null;
    if (jr && jr.standardText) {
      var limMatch = (jr.standardText + '').match(/([\d.]+)/);
      if (limMatch) limVal = parseFloat(limMatch[1]);
    }
    if (limVal !== null && !isNaN(limVal)) {
      var pass = ruleResult <= limVal;
      h += '<div style="background:' + (pass ? '#f0fdf4' : '#fef2f2') + ';border:2px solid ' + (pass ? '#22c55e' : '#ef4444') + ';border-radius:8px;padding:10px;text-align:center">';
      h += '<div style="font-size:22px;font-weight:800;color:' + (pass ? '#059669' : '#dc2626') + '">' + ruleStr + ' <span style="font-size:12px">' + unit + '</span></div>';
      h += '<div style="font-size:12px;font-weight:700;color:' + (pass ? '#16a34a' : '#dc2626') + ';margin-top:4px">' + (pass ? '✅ 적합' : '❌ 부적합') + ' <span style="font-size:10px;font-weight:400;color:#64748b">(기준: ' + jr.standardText + ')</span></div></div>';
    }
    area.innerHTML = h;
  } catch(e) {
    area.innerHTML = '<div style="padding:8px;text-align:center;color:#dc2626;font-size:11px;background:#fef2f2;border-radius:6px">⚠️ ' + e.message + '</div>';
  }
}

/* ══════════════════════════════════════
   미생물 표준평판법 전용 입력폼 + 모의 계산기

var _MICRO_DILUTIONS = [1, 10, 100, 1000, 10000, 100000]; // 0번=원액(1배)

function _isMicroBiology(testBasis) {
  if (!testBasis) return false;
  var b = testBasis.trim();
  // '제8.'은 식품공전 제8장 전체(중금속·농약 등 포함)에 해당해 너무 광범위하므로 제외
  return b.indexOf('미생물시험법') >= 0 || b.indexOf('일반시험법 4.') >= 0
    || b.indexOf('미생물') >= 0;
}

function _getMicroNCount(analyzed) {
  var rule = (analyzed || {}).judgmentRule || {};
  var text = rule.standardText || rule.resultFieldId || '';
  var m = text.match(/n\s*=\s*(\d+)/i);
  if (m) return parseInt(m[1]);
  if (rule.nCount) return rule.nCount;
  var calcs = (analyzed || {}).calculations || [];
  if (calcs.length >= 2 && calcs.some(function(c){ return c.sampleIndex; })) return calcs.length;
  return 5;
}

    + (rule.m !== undefined ? ', m=' + Number(rule.m).toLocaleString() : '')

    + '<div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">'

    + '</div></div>';
  h += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px;min-width:' + (80 + nCount * 88) + 'px">';
  h += '<thead><tr><th rowspan="2" style="background:#1e3a8a;color:#fff;padding:6px 8px;border:0.5px solid #1e40af;width:72px;text-align:center">희석배수</th>';

  // rule 객체를 전역 변수에 저장 (HTML 속성에 JSON 직접 넣으면 큰따옴표 깨짐)
  window._mcRule = rule;

       + dilLabel + '</label></td>';
    for (var n = 1; n <= nCount; n++) {
      h += '<td style="padding:3px;border:0.5px solid #e5e7eb;text-align:center"><input type="text" id="mc-' + n + '-' + di + '-0" value="ND" disabled onfocus="_mcFocus(this)" onblur="_mcBlur(this,' + n + ',' + di + ')" oninput="_mcUpdateRange(' + n + ',' + di + ');_mcCalcAll(window._mcNCount,window._mcRule)" ondblclick="_mcClickTNTC(this,' + n + ',' + di + ')" title="더블클릭 → TNTC" style="width:58px;height:22px;text-align:center;border:0.5px solid #e5e7eb;border-radius:4px;font-size:11px;color:#9ca3af;background:#f3f4f6"></td>';
      h += '<td style="padding:3px;border:0.5px solid #e5e7eb;text-align:center"><input type="text" id="mc-' + n + '-' + di + '-1" value="ND" disabled onfocus="_mcFocus(this)" onblur="_mcBlur(this,' + n + ',' + di + ')" oninput="_mcUpdateRange(' + n + ',' + di + ');_mcCalcAll(window._mcNCount,window._mcRule)" ondblclick="_mcClickTNTC(this,' + n + ',' + di + ')" title="더블클릭 → TNTC" style="width:58px;height:22px;text-align:center;border:0.5px solid #e5e7eb;border-radius:4px;font-size:11px;color:#9ca3af;background:#f3f4f6"></td>';
    }
    h += '</tr>';
  });
  h += '<tr style="background:#f0fdf4"><td style="padding:5px 6px;border:0.5px solid #e5e7eb;font-size:10px;color:#6b7280;text-align:center">채취량(g)</td>';
  for (var n = 1; n <= nCount; n++) h += '<td colspan="2" style="padding:3px;border:0.5px solid #e5e7eb;text-align:center"><input type="number" step="0.1" id="mc-w-' + n + '" placeholder="g" style="width:80px;height:22px;text-align:center;border:0.5px solid #e5e7eb;border-radius:4px;font-size:11px"></td>';
  h += '</tr>';
  h += '<tr style="background:#f0f9ff"><td style="padding:5px 6px;border:0.5px solid #e5e7eb;font-size:10px;color:#0369a1;text-align:center">계산식</td>';
  for (var n = 1; n <= nCount; n++) h += '<td colspan="2" style="padding:4px 6px;border:0.5px solid #e5e7eb;text-align:center;font-size:10px;color:#6b7280" id="mc-formula-' + n + '">-</td>';
  h += '</tr>';
  h += '<tr style="background:#fffbeb"><td style="padding:5px 6px;border:0.5px solid #e5e7eb;font-size:10px;color:#92400e;text-align:center">시험결과</td>';
  for (var n = 1; n <= nCount; n++) h += '<td colspan="2" style="padding:4px 6px;border:0.5px solid #e5e7eb;text-align:center;font-size:11px;color:#374151" id="mc-raw-' + n + '">-</td>';
  h += '</tr>';
  h += '<tr style="background:#eff6ff"><td style="padding:5px 6px;border:0.5px solid #e5e7eb;font-weight:700;font-size:10px;color:#1d4ed8;text-align:center">최종판정</td>';
  for (var n = 1; n <= nCount; n++) h += '<td colspan="2" style="padding:5px;border:0.5px solid #e5e7eb;text-align:center;font-weight:700;font-size:13px" id="mc-result-' + n + '">-</td>';
  h += '</tr></tbody></table></div>';
  h += '<div id="mc-judge-box" style="margin-top:10px;padding:10px 14px;border-radius:8px;border:1.5px solid #86efac;background:#f0fdf4;display:flex;align-items:center;gap:10px">'
    + '<span id="mc-judge-icon" style="font-size:20px">—</span><div>'
    + '<div style="font-size:14px;font-weight:500" id="mc-judge-text">집락수 입력 후 자동 판정</div>'
    + '<div style="font-size:11px;color:#6b7280;margin-top:2px" id="mc-judge-sub"></div></div></div>';
  return h;
}

function _mcSetND(inp) {
  inp.value = 'ND';
  inp.style.color = '#9ca3af';
  inp.style.background = '#f9fafb';
  inp.style.borderColor = '#e5e7eb';
}
function _mcClickTNTC(inp, n, di) {
  if (inp.disabled) return;
  if (inp.value.trim().toUpperCase() === 'TNTC') {
    // TNTC 상태 → 더블클릭 시 해제하고 빈 칸으로
    inp.value = '';
    inp.style.background = ''; inp.style.borderColor = ''; inp.style.color = '';
    inp.focus();
  } else {
    inp.value = 'TNTC';
    inp.style.background = '#fff7ed'; inp.style.borderColor = '#fb923c'; inp.style.color = '#c2410c';
  }
  _mcUpdateRange(n, di);
  _mcCalcAll(window._mcNCount, window._mcRule);
}
function _mcFocus(inp) {
  if (inp.value.trim().toUpperCase() === 'ND') {
    inp.value = '';
    inp.style.color = '';
    inp.style.background = '';
    inp.style.borderColor = '';
  }
}
function _mcBlur(inp, n, di) {
  if (inp.value.trim() === '') {
    _mcSetND(inp);
    _mcCalcAll(window._mcNCount, window._mcRule);
  }
}
function _mcToggleRow(di) {
  var chk = document.getElementById('mc-row-en-' + di);
  var enabled = chk && chk.checked;
  var row = document.getElementById('mc-row-' + di);
  if (row) row.style.opacity = enabled ? '1' : '0.4';
  var nCount = window._mcNCount || 1;
  for (var n = 1; n <= nCount; n++) {
    [0,1].forEach(function(p) {
      var inp = document.getElementById('mc-' + n + '-' + di + '-' + p);
      if (!inp) return;
      inp.disabled = !enabled;
      inp.style.background = enabled ? '#f9fafb' : '#f3f4f6';
      if (!enabled) { inp.value = 'ND'; inp.style.color = '#9ca3af'; inp.style.borderColor = '#e5e7eb'; }
    });
  }
  _mcCalcAll(window._mcNCount, window._mcRule);
}

function _mcUpdateRange(n, di) {
  [0,1].forEach(function(p) {
    var inp = document.getElementById('mc-'+n+'-'+di+'-'+p);
    if (!inp) return;
    var v = inp.value.trim();
    if (v === '' || v.toUpperCase() === 'ND') { inp.style.background='#f9fafb'; inp.style.borderColor='#e5e7eb'; inp.style.color='#9ca3af'; return; }
    var vUp = v.toUpperCase();
    if (vUp === 'TNTC') {
      inp.style.background='#fff7ed'; inp.style.borderColor='#fb923c'; inp.style.color='#c2410c';
      inp.value = 'TNTC'; return;
    }
    var num = Number(v);
    if (isNaN(num)) { inp.style.background='#fef2f2'; inp.style.borderColor='#fca5a5'; inp.style.color='#dc2626'; return; }
    inp.style.color = '';
    if (num >= 15 && num <= 300) { inp.style.background='#f0fdf4'; inp.style.borderColor='#86efac'; }
    else if (num < 15) { inp.style.background='#fffbeb'; inp.style.borderColor='#fcd34d'; }
    else { inp.style.background='#fff7ed'; inp.style.borderColor='#fb923c'; }
  });
}

// 입력값 → 숫자 변환 (TNTC→9999, ND→null, 숫자→숫자, 나머지→null)
function _mcGetVal(v) {
  if (v === '' || v === undefined || v === null) return null;
  var s = String(v).trim().toUpperCase();
  if (s === 'TNTC') return 9999;
  if (s === 'ND') return null;
  var n = Number(s);
  return isNaN(n) ? null : n;
}


function _mcInRange(v) {
  var num = _mcGetVal(v);
  return num !== null && num >= 15 && num <= 300;
}
function _mcRound2(n) {
  if (!n || n <= 0 || isNaN(n)) return 0;
  var mag = Math.pow(10, Math.floor(Math.log10(n)) - 1);
  return Math.round(n / mag) * mag;
}

function _mcCalcOne(n) {
  var allOver300 = true, allUnder15 = true, hasAnyValue = false;
  var firstDi = -1;
  _MICRO_DILUTIONS.forEach(function(dil, di) {
    var rowChk = document.getElementById('mc-row-en-' + di);
    if (!rowChk || !rowChk.checked) return;
    [0,1].forEach(function(p) {
      var v = (document.getElementById('mc-' + n + '-' + di + '-' + p) || {}).value || '';
      var num = _mcGetVal(v);
      if (num === null) return;
      hasAnyValue = true;
      if (num <= 300) allOver300 = false;
      if (num >= 15) allUnder15 = false;
    });
  });
  if (!hasAnyValue) return null;

  function _makeResult(sigmaC, denom, dilution, warning) {
    var isRaw = (dilution === 1); // 원액: 소수점 유지, 유효숫자 미적용
    var rawVal = (sigmaC / denom) * dilution;
    var denomStr = denom === 1 ? '1' : (Number.isInteger(denom) ? String(denom) : denom.toFixed(1));
    var dilStr = dilution === 1 ? '×1(원액)' : '×' + dilution.toLocaleString();
    var formulaStr = sigmaC + ' ÷ ' + denomStr + ' ' + dilStr + ' = ' + (isRaw ? rawVal.toFixed(2).replace(/\.?0+$/, '') : Math.round(rawVal).toLocaleString());
    return {
      sigmaC: sigmaC, denom: denom, dilution: dilution,
      raw: isRaw ? rawVal : Math.round(rawVal),
      final: isRaw ? rawVal : _mcRound2(rawVal),
      isRaw: isRaw, formulaStr: formulaStr,
      warning: warning || ''
    };
  }

  if (allOver300) {
    var closestVal = null, closestDi = -1;
    _MICRO_DILUTIONS.forEach(function(dil, di) {
      var rowChk = document.getElementById('mc-row-en-' + di);
      if (!rowChk || !rowChk.checked) return;
      [0,1].forEach(function(p) {
        var v = (document.getElementById('mc-' + n + '-' + di + '-' + p) || {}).value || '';
        var num = _mcGetVal(v);
        if (num === null) return;
        if (closestVal === null || Math.abs(num - 300) < Math.abs(closestVal - 300)) {
          closestVal = num; closestDi = di;
        }
      });
    });
    if (closestDi < 0) return null;
    var r = _makeResult(closestVal, 1, _MICRO_DILUTIONS[closestDi], 'over300');
    return r;
  }

  _MICRO_DILUTIONS.forEach(function(dil, di) {
    if (firstDi >= 0) return;
    var rowChk = document.getElementById('mc-row-en-' + di);
    if (!rowChk || !rowChk.checked) return;
    var v0 = (document.getElementById('mc-' + n + '-' + di + '-0') || {}).value || '';
    var v1 = (document.getElementById('mc-' + n + '-' + di + '-1') || {}).value || '';
    if (_mcInRange(v0) || _mcInRange(v1)) firstDi = di;
  });

  if (firstDi === -1) {
    for (var di2 = 0; di2 < _MICRO_DILUTIONS.length; di2++) {
      var rowChk2 = document.getElementById('mc-row-en-' + di2);
      if (!rowChk2 || !rowChk2.checked) continue;
      var v0b = (document.getElementById('mc-' + n + '-' + di2 + '-0') || {}).value || '';
      var v1b = (document.getElementById('mc-' + n + '-' + di2 + '-1') || {}).value || '';
      if (v0b !== '' || v1b !== '') { firstDi = di2; break; }
    }
    if (firstDi === -1) return null;
    var cnt = 0, sigC2 = 0;
    [0,1].forEach(function(p) {
      var v = (document.getElementById('mc-'+n+'-'+firstDi+'-'+p)||{}).value||'';
      var s2 = String(v).trim().toUpperCase();
      var num = _mcGetVal(v);
      // TNTC 평판은 fallback 집계에서도 제외
      if (num !== null && s2 !== 'TNTC') { cnt++; sigC2 += num; }
    });
    if (cnt === 0) return null;
    return _makeResult(sigC2, cnt, _MICRO_DILUTIONS[firstDi], allUnder15 ? 'under15' : '');
  }

  var sigmaC = 0, n1p = 0, n2p = 0;
  [0,1].forEach(function(p) {
    var v = (document.getElementById('mc-'+n+'-'+firstDi+'-'+p)||{}).value||'';
    var s = String(v).trim().toUpperCase();
    var num = _mcGetVal(v);
    // TNTC 평판은 집계에서 제외 (firstDi 선택 기준에만 관여)
    if (num !== null && s !== 'TNTC') { n1p++; sigmaC += num; }
  });
  var secDi = firstDi + 1;
  if (secDi < _MICRO_DILUTIONS.length) {
    var secChk = document.getElementById('mc-row-en-' + secDi);
    if (secChk && secChk.checked) {
      [0,1].forEach(function(p) {
        var v = (document.getElementById('mc-'+n+'-'+secDi+'-'+p)||{}).value||'';
        var num = _mcGetVal(v);
        if (num !== null && _mcInRange(v)) { n2p++; sigmaC += num; }
      });
    }
  }
  if (n1p === 0) return null;
  var denom = (1 * n1p) + (0.1 * n2p);
  return _makeResult(sigmaC, denom, _MICRO_DILUTIONS[firstDi], '');
}

function _mcCalcAll(nCount, rule) {
  var m = rule.m || 10000, M = rule.M || 50000, c = rule.c !== undefined ? rule.c : 2;
  var results = [], calcResults = [], over300Count = 0, warnCount = 0, failCount = 0;
  for (var n = 1; n <= nCount; n++) {
    var calc = _mcCalcOne(n);
    var elFormula = document.getElementById('mc-formula-' + n);
    var elRaw = document.getElementById('mc-raw-' + n);
    var el = document.getElementById('mc-result-' + n);

    if (!calc) {
      if (elFormula) { elFormula.textContent = '-'; elFormula.style.color = '#9ca3af'; }
      if (elRaw) { elRaw.textContent = '-'; elRaw.style.color = '#9ca3af'; }
      if (el) { el.textContent = '-'; el.style.color = '#9ca3af'; }
    } else {
      // 계산식 행
      if (elFormula) { elFormula.textContent = calc.formulaStr; elFormula.style.color = '#6b7280'; }

      // 시험결과 행 (원액: 소수점 표시, 그 외: Math.round 값)
      if (elRaw) {
        var rawStr = calc.isRaw
          ? (Number.isInteger(calc.raw) ? calc.raw.toString() : parseFloat(calc.raw.toFixed(2)).toString()) + ' CFU/g'
          : Math.round(calc.raw).toLocaleString() + ' CFU/g';
        elRaw.textContent = rawStr;
        elRaw.style.color = '#374151';
      }

      // 최종판정 행
      if (el) {
        if (calc.warning === 'over300') {
          el.innerHTML = (calc.isRaw ? (Number.isInteger(calc.final) ? calc.final.toString() : parseFloat(calc.final.toFixed(2)).toString()) : calc.final.toLocaleString()) + ' CFU/g <span style="font-size:10px;background:#fff7ed;color:#c2410c;padding:1px 4px;border-radius:3px">300초과</span>';
          el.style.color = '#c2410c'; over300Count++;
        } else {
          var finalStr = calc.isRaw
            ? (Number.isInteger(calc.final) ? calc.final.toString() : parseFloat(calc.final.toFixed(2)).toString()) + ' CFU/g'
            : calc.final.toLocaleString() + ' CFU/g';
          el.textContent = finalStr;
          el.style.color = calc.final > M ? '#dc2626' : calc.final > m ? '#d97706' : '#15803d';
        }
      }
    }
    if (calc) { results.push(calc.final); calcResults.push(calc); if (calc.final > M) failCount++; else if (calc.final > m) warnCount++; }
    else { results.push(null); calcResults.push(null); }
  }
  var box = document.getElementById('mc-judge-box');
  var icon = document.getElementById('mc-judge-icon');
  var text = document.getElementById('mc-judge-text');
  var sub = document.getElementById('mc-judge-sub');
  if (!box) return;
  var hasResult = results.some(function(r){ return r !== null; });
  if (!hasResult) { box.style.borderColor='#86efac'; box.style.background='#f0fdf4'; icon.textContent='—'; text.textContent='집락수 입력 후 자동 판정'; sub.textContent=''; return; }
  var pass = (failCount === 0 && warnCount <= c);
  box.style.borderColor = pass ? '#86efac' : '#fca5a5';
  box.style.background = pass ? '#f0fdf4' : '#fef2f2';
  icon.textContent = pass ? '✓' : '✗'; icon.style.color = pass ? '#15803d' : '#dc2626';
  text.textContent = pass ? '적합' : '부적합'; text.style.color = pass ? '#15803d' : '#dc2626';
  var resStr = calcResults.map(function(calc,i){
    if (calc === null) return null;
    var valStr = calc.isRaw
      ? (Number.isInteger(calc.final) ? calc.final.toString() : parseFloat(calc.final.toFixed(2)).toString())
      : calc.final.toLocaleString();
    return 'n'+(i+1)+'='+valStr;
  }).filter(Boolean).join(', ');
  sub.textContent = resStr
    + (over300Count > 0 ? ' | 300초과(밀집평판법) '+over300Count+'건' : '')
    + (failCount > 0 ? ' | M초과 '+failCount+'건' : '')
    + (warnCount > c ? ' | m초과 '+warnCount+'건>c('+c+')' : '');
}

function _printViaIframe(htmlContent) {
  var iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none';
  document.body.appendChild(iframe);
  var doc = iframe.contentDocument || iframe.contentWindow.document;
  doc.open(); doc.write(htmlContent); doc.close();
  iframe.onload = function() {
    try { iframe.contentWindow.focus(); iframe.contentWindow.print(); } catch(e) {}
    setTimeout(function() { if (iframe.parentNode) iframe.parentNode.removeChild(iframe); }, 1000);
  };
}

function _showPrintPreview(htmlContent, title) {
  var modal = document.getElementById('print-preview-modal');
  if (!modal) return;
  // iframe에 미리보기 내용 삽입
  var pif = document.getElementById('print-preview-iframe');
  pif.srcdoc = htmlContent;
  // 제목 표시
  document.getElementById('print-preview-title').textContent = title || '인쇄 미리보기';
  // 인쇄 버튼 클릭 시 실제 인쇄
  document.getElementById('print-preview-do-btn').onclick = function() {
    try { pif.contentWindow.focus(); pif.contentWindow.print(); } catch(e) {}
  };
  modal.style.display = 'flex';
}
function _closePrintPreview() {
  var modal = document.getElementById('print-preview-modal');
  if (modal) modal.style.display = 'none';
  var pif = document.getElementById('print-preview-iframe');
  if (pif) pif.srcdoc = '';
}

function printDiaryTemplate() {
  var panel = document.getElementById('diary-panel');
  if (!panel || panel.querySelector('.empty-state')) {
    alert('선택된 시험일지가 없습니다.'); return;
  }
  // 기록서 양식 수집 템플릿인 경우 → 전용 시험과정 양식으로 인쇄
  var ft = _filteredDiaryTemplates && _filteredDiaryTemplates[_selectedDiaryTmplIdx];
  if (ft && ft._isFormTemplate) {
    _printFormTemplateDiary(ft);
    return;
  }
  // 일반 시험일지 (기존 방식)
  var clone = panel.cloneNode(true);
  panel.querySelectorAll('input, textarea, select').forEach(function(el, i) {
    var c = clone.querySelectorAll('input, textarea, select')[i];
    if (!c) return;
    if (el.type === 'checkbox') c.checked = el.checked;
    else c.value = el.value;
  });
  panel.querySelectorAll('details').forEach(function(d, i) {
    var cd = clone.querySelectorAll('details')[i];
    if (cd) cd.open = d.open;
  });
  clone.querySelectorAll('button, .btn').forEach(function(b) { b.remove(); });
  var html = _buildPrintHtml(clone.innerHTML, '🧪 시험일지', false);
  _showPrintPreview(html, '시험일지 인쇄 미리보기');
}

/* ─────────────────────────────────────────────
   기록서 양식 수집 템플릿 전용 인쇄 레이아웃
   결과 입력 폼(testResultInput) 필드 제외,
   시험 과정 관련 내용(섹션·표준물질·계산식 등) 포함
   ───────────────────────────────────────────── */
function _printFormTemplateDiary(ft) {
  var a = ft.analyzed || {};
  var overrides = ft._overrides || {};

  // 계산식 변수로 사용되는 field ID = 결과 입력 측정 필드 → 시험일지에서 제외
  var resultFieldIds = [];
  (a.calculations || []).forEach(function(calc) {
    (calc.formula || '').replace(/[a-zA-Z_][a-zA-Z0-9_]*/g, function(v) {
      if (resultFieldIds.indexOf(v) < 0) resultFieldIds.push(v);
    });
  });

  // 결과 입력에만 사용되는 섹션명 패턴 (해당 섹션 전체 제외)
  var resultSectionKeywords = ['측정값', '검체측정', '시료측정'];
  function isResultSection(title) {
    return resultSectionKeywords.some(function(k) { return (title || '').indexOf(k) >= 0; });
  }

  var h = '';

  /* ── 헤더 테이블 ── */
  h += '<table style="width:100%;border-collapse:collapse;margin-bottom:16px">';
  h += '<tr><td colspan="4" style="background:#1e3a5f;color:#fff;font-size:15px;font-weight:700;padding:9px 14px;text-align:center;letter-spacing:1px">시험검사기록서</td></tr>';
  var rows = [
    ['검사항목', escH(ft.representativeItem || ''), '항목코드', escH(ft.representativeItemCode || '')],
    ['시험법근거', escH(ft.testBasis || ''), '시험유형', escH(a.testType || '')],
    ['SOP', escH(a.sop || ''), '장비', escH((a.equipment || []).join(', '))]
  ];
  if (a.judgmentRule && a.judgmentRule.standardText) {
    rows.push(['판정기준',
      '<span style="color:#dc2626;font-weight:700">' + escH(a.judgmentRule.standardText) + (a.judgmentRule.unit ? ' ' + escH(a.judgmentRule.unit) : '') + '</span>',
      '식품유형', escH(getFoodTypeFromForm(ft))]);
  }
  rows.forEach(function(r) {
    h += '<tr>';
    h += '<td style="width:13%;background:#f0f4ff;border:1px solid #cbd5e1;padding:5px 9px;font-size:10px;color:#475569;font-weight:600">' + r[0] + '</td>';
    h += '<td style="border:1px solid #cbd5e1;padding:5px 9px;font-size:12px">' + r[1] + '</td>';
    h += '<td style="width:13%;background:#f0f4ff;border:1px solid #cbd5e1;padding:5px 9px;font-size:10px;color:#475569;font-weight:600">' + r[2] + '</td>';
    h += '<td style="border:1px solid #cbd5e1;padding:5px 9px;font-size:12px">' + r[3] + '</td>';
    h += '</tr>';
  });
  h += '</table>';

  /* ── 검사방법 (시험절차) ── */
  if (a.testMethod) {
    h += '<div style="margin-bottom:14px;border:1.5px solid #bfdbfe;border-radius:7px;overflow:hidden">';
    h += '<div style="background:#1e40af;color:#fff;font-size:11px;font-weight:700;padding:6px 12px">📋 검사방법 (시험절차)</div>';
    var tmIsHtmlPrint = /<[a-z][\s\S]*>/i.test(a.testMethod);
    h += '<div style="padding:10px 14px;font-size:11px;line-height:1.8;color:#1e293b' + (tmIsHtmlPrint ? '' : ';white-space:pre-wrap') + '">';
    h += tmIsHtmlPrint ? a.testMethod : escH(a.testMethod);
    h += '</div>';
    h += '</div>';
  }

  /* ── 섹션별 필드 출력 ── */
  (a.sections || []).forEach(function(sec) {
    if (isResultSection(sec.title)) return; // 결과 입력 섹션 제외

    // 결과 측정 변수에 해당하는 필드를 제외한 나머지 필드
    var fields = (sec.fields || []).filter(function(f) {
      return resultFieldIds.indexOf(f.id) < 0;
    });
    if (!fields.length) return;

    h += '<div style="margin-bottom:14px">';
    if (sec.title) {
      h += '<div style="background:#334155;color:#fff;font-size:11px;font-weight:700;padding:5px 11px;border-radius:4px 4px 0 0">' + escH(sec.title) + '</div>';
    }
    h += '<table style="width:100%;border-collapse:collapse;border:1px solid #cbd5e1">';

    var perRow = 3; // 한 행에 최대 3개 필드
    for (var fi = 0; fi < fields.length; fi += perRow) {
      h += '<tr>';
      for (var ci = 0; ci < perRow; ci++) {
        var f = fields[fi + ci];
        if (!f) {
          // 빈 칸으로 채우기
          h += '<td style="border:1px solid #e2e8f0;padding:6px 8px" colspan="' + (2 * (perRow - ci)) + '"></td>';
          break;
        }
        var lbl = escH(f.label || '') + (f.unit ? ' <span style="color:#9ca3af;font-size:9px">(' + escH(f.unit) + ')</span>' : '');
        // 오버라이드 값 우선, 없으면 exampleValue
        var ovVal = '';
        if (sec.title === '표준물질정보' && overrides.stdInfo) ovVal = overrides.stdInfo[f.id] || '';
        if (sec.title === '표준용액농도' && overrides.stdConc) ovVal = overrides.stdConc[f.id] || '';
        var val = ovVal || f.exampleValue || '';
        var isFixed = (f.type === 'readonly' || !!ovVal);

        h += '<td style="background:#f8fafc;border:1px solid #e2e8f0;padding:4px 8px;font-size:10px;color:#64748b;width:12%">' + lbl + '</td>';
        if (isFixed) {
          h += '<td style="border:1px solid #e2e8f0;padding:6px 8px;font-size:12px;font-weight:600;color:#065f46;background:#f0fdf4">' + escH(val) + '</td>';
        } else {
          // 수기 입력용 빈 칸 (exampleValue는 연한 색으로)
          var display = val ? '<span style="color:#c0c0c0;font-size:11px">' + escH(val) + '</span>' : '&nbsp;';
          h += '<td style="border:1px solid #e2e8f0;padding:6px 8px;font-size:12px;min-height:24px">' + display + '</td>';
        }
      }
      h += '</tr>';
    }
    h += '</table></div>';
  });

  /* ── 계산식 ── */
  if (a.calculations && a.calculations.length) {
    h += '<div style="margin-bottom:14px;padding:10px 14px;background:#faf5ff;border:1px solid #e9d5ff;border-radius:6px">';
    h += '<div style="font-size:11px;font-weight:700;color:#6b21a8;margin-bottom:6px">계산식 (결과 산출)</div>';
    a.calculations.forEach(function(calc) {
      h += '<div style="font-size:11px;margin-bottom:4px">';
      h += '<span style="color:#7c3aed;font-weight:600">' + escH(calc.label || '') + '</span>';
      if (calc.unit) h += ' (' + escH(calc.unit) + ')';
      h += ' = <code style="font-size:11px;background:#f5f3ff;padding:2px 5px;border-radius:3px">' + escH(calc.formulaText || calc.formula || '') + '</code>';
      h += '</div>';
    });
    h += '</div>';
  }

  /* ── 결과 기록란 ── */
  h += '<table style="width:100%;border-collapse:collapse;border:2px solid #1e3a5f;margin-top:4px">';
  h += '<tr style="background:#1e3a5f;color:#fff">';
  h += '<th style="padding:6px 10px;font-size:11px;text-align:center">분석항목</th>';
  h += '<th style="padding:6px 10px;font-size:11px;text-align:center">기준규격</th>';
  h += '<th style="padding:6px 10px;font-size:11px;text-align:center">결과(측정값)</th>';
  h += '<th style="padding:6px 10px;font-size:11px;text-align:center">판정</th>';
  h += '<th style="padding:6px 10px;font-size:11px;text-align:center">검사자</th>';
  h += '</tr>';
  var jr = a.judgmentRule || {};
  h += '<tr>';
  h += '<td style="border:1px solid #cbd5e1;padding:8px 10px;font-size:12px;font-weight:600">' + escH(ft.representativeItem || '') + '</td>';
  h += '<td style="border:1px solid #cbd5e1;padding:8px 10px;font-size:12px;text-align:center">' + escH((jr.standardText || '') + (jr.unit ? ' ' + jr.unit : '')) + '</td>';
  h += '<td style="border:1px solid #cbd5e1;padding:8px 10px;min-width:80px">&nbsp;</td>';
  h += '<td style="border:1px solid #cbd5e1;padding:8px 10px;min-width:50px;text-align:center">&nbsp;</td>';
  h += '<td style="border:1px solid #cbd5e1;padding:8px 10px;min-width:80px">&nbsp;</td>';
  h += '</tr>';
  h += '</table>';

  var title = '시험검사기록서 — ' + escH(ft.representativeItem || '');
  _showPrintPreview(_buildPrintHtml(h, '🧪 ' + title, false), title + ' 인쇄 미리보기');
}

</script>

    <div style="padding:12px 18px;border-top:1px solid #e2e8f0;display:flex;gap:8px;justify-content:flex-end">
      <button onclick="document.getElementById('attach-config-modal').style.display='none'" style="padding:7px 18px;border:1px solid #cbd5e1;background:#fff;border-radius:7px;font-size:13px;cursor:pointer">취소</button>
      <button onclick="saveAttachConfig()" style="padding:7px 18px;background:#059669;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer">💾 저장</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     인쇄 미리보기 팝업
     ═══════════════════════════════════════ -->
<div id="print-preview-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.55);align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.35);width:860px;max-width:96vw;max-height:92vh;display:flex;flex-direction:column;overflow:hidden">
    <!-- 헤더 툴바 -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:#1e3a5f;border-radius:12px 12px 0 0">
      <span id="print-preview-title" style="color:#fff;font-size:14px;font-weight:700">인쇄 미리보기</span>
      <div style="display:flex;gap:8px">
        <button id="print-preview-do-btn" style="padding:6px 18px;background:#3b82f6;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer">🖨️ 인쇄</button>
        <button onclick="_closePrintPreview()" style="padding:6px 14px;background:#475569;color:#fff;border:none;border-radius:7px;font-size:13px;cursor:pointer">✕ 닫기</button>
      </div>
    </div>
    <!-- 미리보기 iframe -->
    <div style="flex:1;overflow:auto;background:#e5e7eb;padding:16px">
      <div style="background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.15);min-height:1000px;border-radius:4px">
        <iframe id="print-preview-iframe" style="width:100%;min-height:1000px;border:none;border-radius:4px" sandbox="allow-same-origin allow-modals"></iframe>
      </div>
    </div>
  </div>
</div>

</body>
</html>
