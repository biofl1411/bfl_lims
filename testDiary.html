  var purpose = purposeSel ? purposeSel.value : '자가품질위탁검사용';

  var sampleName = r.sploreNm || r.prductNm || '';
  var receiptNo = r.sploreRceptNo || r.sploreReqestNo || '';

  var html = '<div style="font-family:\'Malgun Gothic\',sans-serif;font-size:12px;max-width:800px">';
  html += '<h2 style="text-align:center;font-size:18px;margin-bottom:20px">시 험 검 사 기 록 서</h2>';
  html += '<h3>1. 시료정보</h3>';
  html += '<table border="1" style="width:100%;border-collapse:collapse;font-size:11px">';
  html += '<tr><td style="padding:4px 8px;background:#f0f0f0">검사항목</td><td style="padding:4px 8px">' + itemName + '</td>';
  html += '<td style="padding:4px 8px;background:#f0f0f0">검체번호</td><td style="padding:4px 8px">' + receiptNo + '</td></tr>';
  html += '<tr><td style="padding:4px 8px;background:#f0f0f0">검사자</td><td style="padding:4px 8px">' + tester + '</td>';
  html += '<td style="padding:4px 8px;background:#f0f0f0">시료명</td><td style="padding:4px 8px">' + sampleName + '</td></tr>';
  html += '<tr><td style="padding:4px 8px;background:#f0f0f0">검사목적</td><td colspan="3" style="padding:4px 8px">' + purpose + '</td></tr>';
  html += '<tr><td style="padding:4px 8px;background:#f0f0f0">시험법근거</td><td colspan="3" style="padding:4px 8px">' + itemMethod + '</td></tr>';
  html += '</table>';
  html += '<h3 style="margin-top:12px">2. 검사방법 (BFL-KQI-360 중금속류(유해물질) SOP)</h3>';
  html += '<div style="background:#f9f9f9;padding:8px;border:1px solid #ddd;font-size:11px">';
  html += 'Microwave 시료분해 → ICP-MS 분석 (BFL-KQI-360)</div>';
  html += '<h3 style="margin-top:12px">3. 검사결과</h3>';
  html += '<div style="background:#f9f9f9;padding:8px;border:1px solid #ddd;font-size:11px">';
  html += itemName + ' = (' + sampleConc + ' - ' + blankConc + ') × ' + finalVolume + ' × ' + dilution;
  html += ' / ' + sampleWeight + ' × 1/1000 ÷ ' + drinkDilution + ' = <strong>' + resultVal + ' mg/kg</strong></div>';
  html += '<table border="1" style="width:100%;border-collapse:collapse;font-size:11px;margin-top:8px">';
  html += '<tr style="background:#f0f0f0"><td>STD</td><td>STD1</td><td>STD2</td><td>STD3</td><td>STD4</td><td>STD5</td></tr>';
  html += '<tr><td>' + stdVals[0] + '</td><td>' + stdVals[1] + '</td><td>' + stdVals[2] + '</td><td>' + stdVals[3] + '</td><td>' + stdVals[4] + '</td><td>' + stdVals[5] + '</td></tr></table>';
  html += '<h3 style="margin-top:12px">4. 판정</h3>';
  html += '<table border="1" style="width:100%;border-collapse:collapse;font-size:11px">';
  html += '<tr style="background:#f0f0f0"><td>분석항목</td><td>기준(mg/kg)</td><td>결과(mg/kg)</td><td>판정</td></tr>';
  html += '<tr><td>' + itemName + '</td><td>' + itemLimit + ' 이하</td><td>' + resultVal + '</td>';
  html += '<td style="color:' + (judgment==='적합'?'green':'red') + '">' + judgment + '</td></tr></table>';
  html += '<p style="margin-top:8px;font-size:10px;color:#666">BFL-KQP-08-F02 (주)바이오푸드랩</p></div>';

  return html;
}

// ============================================================
// 모의 계산기 — 해당 항목 전용 (계산식 기반 동적 생성)
// ============================================================
var _simReserved = /^(Math|PI|E|abs|pow|sqrt|log|log10|round|ceil|floor|min|max|parseFloat|parseInt|NaN|Infinity|true|false|undefined|null|return)$/;

function _simParseVars(formula) {
  var vars = [], seen = {}, re = /([a-zA-Z_]\w*)/g, m;
  while ((m = re.exec(formula)) !== null) {
    if (!seen[m[1]] && !_simReserved.test(m[1])) { seen[m[1]] = true; vars.push(m[1]); }
  }
  return vars;
}

function simInit() {
  var el = document.getElementById('sim-body');
  if (!el || el.dataset.inited) return;
  el.dataset.inited = '1';
  var d = window._simCalcData;
  if (!d || !d.calcs || !d.calcs.length) { el.innerHTML = '<div style="padding:12px;text-align:center;color:#94a3b8;font-size:12px">계산식 없음</div>'; return; }

  var h = '';
  d.calcs.forEach(function(calc, ci) {
    var formula = calc.formula || '';
    var formulaText = calc.formulaText || formula || '';
    var vars = formula ? _simParseVars(formula) : [];

    // 계산식 표시
    h += '<div style="background:#faf5ff;border:1px solid #e9d5ff;border-radius:8px;padding:10px;margin-bottom:10px">';
    h += '<div style="font-size:12px;font-weight:600;color:#7c3aed;margin-bottom:4px">' + (calc.label || '결과') + (calc.unit ? ' (' + calc.unit + ')' : '') + '</div>';
    h += '<div style="font-family:monospace;font-size:11px;color:#4c1d95;background:white;padding:6px 10px;border-radius:6px;border:1px solid #e9d5ff;word-break:break-all">' + formulaText + '</div>';
    h += '</div>';

    if (vars.length > 0) {
      // 변수 입력 필드 (field map에서 라벨 조회)
      var cols = vars.length <= 2 ? '1fr 1fr' : vars.length <= 4 ? '1fr 1fr' : '1fr 1fr 1fr';
      h += '<div style="display:grid;grid-template-columns:' + cols + ';gap:6px;margin-bottom:8px">';
      vars.forEach(function(v) {
        var fi = d.fieldMap[v] || {};
        var lb = fi.label || v;
        var unitStr = fi.unit ? ' (' + fi.unit + ')' : '';
        var ph = fi.example || '0';
        h += '<div><label style="font-size:11px;color:#475569;display:block;margin-bottom:3px">' + lb + unitStr + '</label>';
        h += '<input type="number" step="any" id="sim-' + ci + '-' + v + '" placeholder="' + ph + '" value="' + (fi.example || '') + '" oninput="simCalc(' + ci + ')" style="width:100%;padding:6px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px"></div>';
      });
      h += '</div>';
    } else if (formula) {
      // 변수 없는 상수식
      h += '<div style="font-size:11px;color:#64748b;margin-bottom:8px">변수 없는 상수 수식</div>';
    } else {
      // formula가 없으면 수동 입력 모드
      h += '<div style="margin-bottom:8px">';
      h += '<label style="font-size:11px;color:#475569;display:block;margin-bottom:3px">수식 직접 입력 (변수: A~F)</label>';
      h += '<input type="text" id="sim-' + ci + '-custom" placeholder="(A - B) * C / (D * 1000)" oninput="simCalc(' + ci + ')" style="width:100%;padding:6px 8px;border:1px solid #94a3b8;border-radius:6px;font-size:12px;font-family:monospace;margin-bottom:6px">';
      h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">';
      ['A','B','C','D','E','F'].forEach(function(k) {
        h += '<div><label style="font-size:10px;color:#475569">' + k + '</label>';
        h += '<input type="number" step="any" id="sim-' + ci + '-' + k + '" placeholder="0" oninput="simCalc(' + ci + ')" style="width:100%;padding:5px 7px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px"></div>';
      });
      h += '</div></div>';
    }

    h += '<div id="sim-result-' + ci + '"></div>';
    if (ci < d.calcs.length - 1) h += '<hr style="border:none;border-top:1px dashed #e9d5ff;margin:12px 0">';
  });

  // 판정기준 표시
  if (d.judgment && d.judgment.standardText) {
    h += '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:8px 10px;margin-top:8px">';
    h += '<span style="font-size:11px;font-weight:600;color:#991b1b">⚖ 판정기준:</span> ';
    h += '<span style="font-size:12px;font-weight:600;color:#dc2626">' + d.judgment.standardText + (d.judgment.unit ? ' ' + d.judgment.unit : '') + '</span></div>';
  }

  el.innerHTML = h;
  d.calcs.forEach(function(_, ci) { simCalc(ci); });
}

function simCalc(ci) {
  var d = window._simCalcData;
  if (!d || !d.calcs[ci]) return;
  var calc = d.calcs[ci];
  var area = document.getElementById('sim-result-' + ci);
  if (!area) return;

  var formula = calc.formula || '';
  var isCustom = !formula;
  var vars, vals = {};

  if (isCustom) {
    // 수동 입력 모드
    var customEl = document.getElementById('sim-' + ci + '-custom');
    formula = customEl ? customEl.value : '';
    if (!formula) { area.innerHTML = ''; return; }
    vars = ['A','B','C','D','E','F'];
    vars.forEach(function(k) { vals[k] = parseFloat((document.getElementById('sim-' + ci + '-' + k) || {}).value) || 0; });
  } else {
    vars = _simParseVars(formula);
    vars.forEach(function(v) { vals[v] = parseFloat((document.getElementById('sim-' + ci + '-' + v) || {}).value) || 0; });
  }

  // 수식에 값 대입
  var expr = formula;
  vars.forEach(function(v) {
    expr = expr.replace(new RegExp('\\b' + v + '\\b', 'g'), '(' + vals[v] + ')');
  });

  try {
    var result = Function('"use strict"; return (' + expr + ')')();
    if (typeof result !== 'number' || !isFinite(result)) throw new Error('계산 불가');

    // 원시 결과 (전체 소수점)
    var rawStr = result.toString();
    var unit = calc.unit || '';

    // 규칙적용 결과 (반올림/버림/올림)
    var rules = d.roundingRules || [{ decimal: 2, mode: 'round' }];
    var ruleResult = result;
    rules.forEach(function(rule) {
      var dp = rule.decimal != null ? rule.decimal : 2;
      var factor = Math.pow(10, dp);
      if (rule.mode === 'floor') ruleResult = Math.floor(ruleResult * factor) / factor;
      else if (rule.mode === 'ceil') ruleResult = Math.ceil(ruleResult * factor) / factor;
      else ruleResult = Math.round(ruleResult * factor) / factor;
    });
    var lastRule = rules[rules.length - 1] || { decimal: 2 };
    var ruleStr = ruleResult.toFixed(lastRule.decimal != null ? lastRule.decimal : 2);
    var modeLabel = rules.map(function(r) {
      var m = r.mode === 'floor' ? '버림' : r.mode === 'ceil' ? '올림' : '반올림';
      return '소수점 ' + (r.decimal != null ? r.decimal : 2) + '자리 ' + m;
    }).join(' → ');

    // 대입 수식 표시
    var h = '<div style="background:#fffbeb;border:1px solid #fbbf24;border-radius:8px;padding:8px 10px;margin-bottom:8px">';
    h += '<div style="font-size:10px;font-weight:600;color:#92400e;margin-bottom:4px">📐 대입 결과</div>';
    h += '<div style="font-family:monospace;font-size:10px;color:#78716c;word-break:break-all">' + expr + '</div>';
    h += '</div>';

    // 원시값 + 규칙적용값 가로 배열
    var rawDisplay = result.toFixed(Math.min(3, rawStr.length));
    if (rawStr.indexOf('.') >= 0) {
      var parts = rawStr.split('.');
      rawDisplay = parts[0] + '.' + parts[1].substring(0, 3);
    } else {
      rawDisplay = rawStr;
    }
    var labelText = (calc.label || '결과') + (unit ? ' (' + unit + ')' : '');

    h += '<div style="display:flex;gap:6px;margin-bottom:6px">';
    h += '<div style="flex:1;background:#f0f9ff;border:1px solid #7dd3fc;border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between">';
    h += '<span style="font-size:11px;font-weight:600;color:#0c4a6e">' + labelText + ':</span>';
    h += '<span style="font-family:monospace;font-size:13px;font-weight:700;color:#0369a1">' + rawDisplay + '</span></div>';
    h += '<div style="flex:1;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:8px 12px;display:flex;align-items:center;justify-content:space-between">';
    h += '<span style="font-size:11px;font-weight:600;color:#166534">규칙적용:</span>';
    h += '<span style="font-family:monospace;font-size:16px;font-weight:800;color:#059669">' + ruleStr + '</span></div>';
    h += '</div>';

    // 규칙적용값 저장 (다음 계산에서 참조)
    if (!window._simCalcResults) window._simCalcResults = {};
    window._simCalcResults[ci] = { raw: result, rule: ruleResult, ruleStr: ruleStr, label: calc.label || '', unit: unit };

    // 다음 계산의 변수에 자동 대입 (이전 계산 결과 참조)
    for (var nci = ci + 1; nci < d.calcs.length; nci++) {
      var nextCalc = d.calcs[nci];
      var nextVars = nextCalc.formula ? _simParseVars(nextCalc.formula) : [];
      nextVars.forEach(function(v) {
        var vLow = v.toLowerCase();
        var labelLow = (calc.label || '').toLowerCase().replace(/[\s()]/g, '');
        // 매칭 조건: Result가 포함된 변수, 또는 이전 label 포함, 또는 결과값/결과 포함
        var isResultVar = vLow.indexOf('result') >= 0 || vLow.indexOf('결과') >= 0;
        var isLabelMatch = labelLow && vLow.indexOf(labelLow) >= 0;
        if (isResultVar || isLabelMatch) {
          var el = document.getElementById('sim-' + nci + '-' + v);
          if (el && (!el.value || parseFloat(el.value) === 0)) {
            el.value = ruleStr;
            el.style.background = '#f0fdf4';
            el.title = '규칙적용 ' + (calc.label || '') + ' 값 (' + ruleStr + ') 자동 반영';
            // 다음 계산도 자동 재계산
            setTimeout(function() { simCalc(nci); }, 100);
          }
        }
      });
    }

    h += '<div style="font-size:10px;color:#94a3b8;margin-bottom:8px;text-align:right">' + modeLabel + '</div>';

    // 판정 비교 (규칙적용값 기준)
    var jr = d.judgment;
    var limVal = null;
    if (jr && jr.standardText) {
      var limMatch = (jr.standardText + '').match(/([\d.]+)/);
      if (limMatch) limVal = parseFloat(limMatch[1]);
    }
    if (limVal !== null && !isNaN(limVal)) {
      var pass = ruleResult <= limVal;
      h += '<div style="background:' + (pass ? '#f0fdf4' : '#fef2f2') + ';border:2px solid ' + (pass ? '#22c55e' : '#ef4444') + ';border-radius:8px;padding:10px;text-align:center">';
      h += '<div style="font-size:22px;font-weight:800;color:' + (pass ? '#059669' : '#dc2626') + '">' + ruleStr + ' <span style="font-size:12px">' + unit + '</span></div>';
      h += '<div style="font-size:12px;font-weight:700;color:' + (pass ? '#16a34a' : '#dc2626') + ';margin-top:4px">' + (pass ? '✅ 적합' : '❌ 부적합') + ' <span style="font-size:10px;font-weight:400;color:#64748b">(기준: ' + jr.standardText + ')</span></div></div>';
    }
    area.innerHTML = h;
  } catch(e) {
    area.innerHTML = '<div style="padding:8px;text-align:center;color:#dc2626;font-size:11px;background:#fef2f2;border-radius:6px">⚠️ ' + e.message + '</div>';
  }
}

</script>
