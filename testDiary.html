<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioFoodLab LIMS - 시험일지</title>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/mfds-codes.js"></script>
<script src="js/firestore-helpers.js"></script>
<script src="js/mfds-api.js"></script>
<script src="js/mfds_diary_form.js"></script>
<style>
:root{--primary:#2563eb;--primary-light:#dbeafe;--success:#10b981;--success-light:#d1fae5;--warning:#f59e0b;--warning-light:#fef3c7;--danger:#ef4444;--danger-light:#fee2e2;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-600:#4b5563;--gray-700:#374151;--gray-900:#111827;--accent:#667eea;--accent2:#764ba2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:#f5f5f5;color:#1a1a1a}
.app-layout{display:flex;height:100vh}

/* ====== UNIFIED SIDEBAR STYLES ====== */
.sidebar{width:250px;background:#1a2332;color:white;position:fixed;left:0;top:0;bottom:0;z-index:1000;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}
.logo{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px}
.logo-text{display:flex;flex-direction:column}
.logo-title{font-size:18px;font-weight:700}
.logo-subtitle{font-size:11px;color:#94a3b8}
.sidebar-nav{flex:1;padding:8px 0;overflow-y:auto}
.nav-group{margin-bottom:2px}
.nav-parent{padding:10px 20px;display:flex;align-items:center;gap:10px;color:#8ea4c0;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:all .15s;border:none;background:none;width:100%}
.nav-parent:hover{background:rgba(255,255,255,0.05);color:#c8d6e5}
.nav-parent.active{color:#4fc3f7;background:rgba(79,195,247,0.1);font-weight:600}
.nav-parent.disabled{color:#4a6785;cursor:default}
.nav-parent.disabled:hover{background:transparent;color:#4a6785}
.nav-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.nav-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-arrow{font-size:10px;color:#5a6a7e;transition:transform .2s;margin-left:auto}
.nav-group.expanded .nav-arrow{transform:rotate(180deg)}
.nav-submenu{list-style:none;max-height:0;overflow:hidden;transition:max-height .25s ease;margin-left:32px;border-left:2px solid rgba(79,195,247,0.15);padding-left:10px}
.nav-group.expanded .nav-submenu{max-height:500px}
.nav-sub-item{display:block;padding:7px 12px;font-size:12px;color:#6b7d93;text-decoration:none;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-sub-item:hover{color:#8ea4c0;background:rgba(255,255,255,0.03)}
.nav-sub-item.active{color:#4fc3f7;font-weight:600;background:rgba(79,195,247,0.08)}
.nav-sub-item.disabled{color:#3d5068;cursor:default}
.nav-sub-item.disabled:hover{background:transparent;color:#3d5068}
/* ====== END UNIFIED SIDEBAR STYLES ====== */

.main-container{flex:1;margin-left:250px;display:flex;flex-direction:column;overflow:hidden}
.top-header{background:white;padding:16px 24px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:14px;color:#64748b}
.breadcrumb-current{color:#1e293b;font-weight:600}
.server-status{display:flex;align-items:center;gap:6px;font-size:12px;padding:4px 12px;border-radius:20px;background:#f1f5f9}
.server-status.online{color:#16a34a;background:#f0fdf4}
.server-status.offline{color:#dc2626;background:#fef2f2}
.main-content{flex:1;overflow-y:auto;padding:20px}

/* Toolbar */
.toolbar{background:white;padding:16px 20px;border-radius:12px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.toolbar-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.toolbar-row:last-child{margin-bottom:0}
.search-box{position:relative;flex:1;min-width:200px}
.search-box input{width:100%;padding:9px 14px 9px 36px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px}
.search-box input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.search-box::before{content:'';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px}
.form-select{padding:8px 12px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px;background:white}
.form-select:focus{outline:none;border-color:var(--primary)}
input[type="date"]{padding:7px 10px;border:1px solid var(--gray-300);border-radius:8px;font-size:12px}

/* 2-panel layout (항목 목록 + 일지 편집) */
.three-panel{display:grid;grid-template-columns:340px 1fr;gap:16px;height:calc(100vh - 180px);min-height:500px}
.panel{background:white;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.1);overflow:hidden;display:flex;flex-direction:column}
.panel-header{padding:14px 18px;border-bottom:1px solid var(--gray-200);font-weight:700;font-size:14px;display:flex;justify-content:space-between;align-items:center;background:var(--gray-50);flex-shrink:0}
.panel-header .count{font-size:12px;font-weight:500;color:var(--gray-600);background:var(--gray-200);padding:2px 8px;border-radius:10px}
.panel-body{overflow-y:auto;flex:1}

/* Sample list */
.sample-row{padding:12px 16px;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:background .15s}
.sample-row:hover{background:var(--gray-50)}
.sample-row.active{background:var(--primary-light);border-left:3px solid var(--primary)}
.sample-row .row-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sample-row .row-no{font-weight:600;font-size:13px;color:var(--gray-900)}
.sample-row .row-status{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.sample-row .row-bottom{font-size:11px;color:var(--gray-600);display:flex;gap:6px;flex-wrap:wrap}
.badge-progress{background:var(--warning-light);color:#b45309}
.badge-done{background:var(--success-light);color:#047857}
.badge-wait{background:var(--gray-200);color:var(--gray-600)}

/* Test item list - middle panel */
.item-row{padding:10px 16px;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:background .15s}
.item-row:hover{background:var(--gray-50)}
.item-row.active{background:#eef2ff;border-left:3px solid var(--accent)}
.item-row .item-name{font-weight:600;font-size:13px;margin-bottom:4px}
.item-row .item-meta{display:flex;gap:8px;font-size:11px;color:var(--gray-600);flex-wrap:wrap}
.item-row .item-code{font-family:monospace;font-size:11px;color:var(--primary);background:var(--primary-light);padding:1px 6px;border-radius:4px}
.item-row .item-std{font-size:11px;color:#6d28d9;background:#f5f3ff;padding:1px 6px;border-radius:4px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.diary-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.diary-badge.registered{background:var(--success-light);color:#047857}
.diary-badge.empty{background:var(--gray-200);color:var(--gray-600)}

/* Right panel - diary editor */
.diary-section{padding:16px}
.diary-section h4{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--gray-900);display:flex;align-items:center;gap:8px}
.diary-section h4 .icon{font-size:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--gray-300);border-radius:8px;font-size:13px;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}

/* Standard spec box */
.spec-box{background:#f8f7ff;border:1px solid #e0dbff;border-radius:8px;padding:12px;margin-bottom:14px}
.spec-box .spec-title{font-size:12px;font-weight:700;color:#5b21b6;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.spec-table{width:100%;font-size:12px;border-collapse:collapse}
.spec-table th{text-align:left;padding:4px 8px;color:var(--gray-600);font-weight:600;background:#ede9fe;border-radius:4px}
.spec-table td{padding:4px 8px;color:var(--gray-900)}
.spec-select{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.spec-chip{padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;border:1.5px solid var(--gray-300);background:white;transition:all .2s;font-weight:500}
.spec-chip:hover{border-color:var(--accent);color:var(--accent)}
.spec-chip.selected{background:var(--accent);color:white;border-color:var(--accent)}

/* Buttons */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.btn-primary{background:var(--primary);color:white}
.btn-success{background:var(--success);color:white}
.btn-danger{background:var(--danger);color:white}
.btn-outline{background:white;color:var(--gray-700);border:1px solid var(--gray-300)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Empty state */
.empty-state{padding:40px 20px;text-align:center;color:#999;font-size:14px}
.empty-state .icon{font-size:40px;margin-bottom:12px}

/* Diary content area */
.diary-content-area{border:1px solid var(--gray-300);border-radius:8px;min-height:180px;padding:12px;font-size:13px;white-space:pre-wrap;background:white}
.diary-content-area:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

/* Calc section */
.calc-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}
.calc-grid input{padding:6px 8px;border:1px solid var(--gray-300);border-radius:6px;font-size:12px;text-align:center}
.calc-grid label{font-size:10px;color:var(--gray-600);text-align:center;display:block}


/* Method/Form selector */
.method-list{display:flex;flex-direction:column;gap:4px;max-height:120px;overflow-y:auto}
.method-item{padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--gray-200);transition:all .15s;display:flex;justify-content:space-between}
.method-item:hover{border-color:var(--primary);background:var(--primary-light)}
.method-item.selected{border-color:var(--primary);background:var(--primary-light);font-weight:600}
.method-item .method-code{font-family:monospace;font-size:11px;color:var(--gray-600)}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:20px;gap:8px;color:var(--gray-600);font-size:13px}
.spinner{width:18px;height:18px;border:2px solid var(--gray-300);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:white;border-radius:16px;width:90%;max-width:600px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:18px;font-weight:700}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--gray-600)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-200);display:flex;justify-content:flex-end;gap:8px}
/* ====== 시험기록서 입력폼 스타일 ====== */
.rec-type-tabs{display:flex;gap:6px;margin-bottom:12px}
.rec-type-tab{padding:6px 14px;border-radius:18px;font-size:12px;background:#f1f5f9;border:2px solid transparent;cursor:pointer;transition:all .15s}
.rec-type-tab:hover{background:#e2e8f0}
.rec-type-tab.active{background:#2563eb;color:white;border-color:#2563eb}
.rec-form{background:#f0f4ff;border:1px solid #d0d8f0;border-radius:8px;padding:14px;margin-top:8px}
.rec-form-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}
.rec-form label{font-size:11px;color:#475569;display:block;margin-bottom:3px}
.rec-form input{width:100%;padding:6px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px}
.rec-formula-box{background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:8px;font-size:11px;color:#334155;margin-top:6px;font-family:monospace}
.rec-result-box{display:flex;gap:10px;align-items:center;margin-top:8px;padding:8px;background:#ecfdf5;border-radius:6px;border:1px solid #bbf7d0}
.rec-result-label{font-size:12px;font-weight:600;color:#065f46}
.rec-result-value{font-size:20px;font-weight:700;color:#059669}
.rec-std-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}

/* formTemplate 행 스타일 */
.ft-row{background:linear-gradient(to right,#faf5ff,#fff);transition:all .15s}
.ft-row:hover{background:linear-gradient(to right,#f3e8ff,#faf5ff)}
.ft-row.active{background:linear-gradient(to right,#ede9fe,#f5f3ff);border-left:3px solid #8b5cf6!important}
</style>
</head>
<body>
<div class="app-layout">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- Main -->
  <div class="main-container">
    <div class="top-header">
      <div class="breadcrumb">
        <span>시험 결재</span> <span>/</span> <span class="breadcrumb-current">시험 진행 현황</span>
      </div>
      <div class="server-status" id="server-status">
        <span id="server-status-icon">...</span>
        <span id="server-status-text">확인 중</span>
      </div>
    </div>

    <div class="main-content">
      <!-- Toolbar: 분야/검사목적/항목 필터 -->
      <div class="toolbar">
        <div class="toolbar-row" style="gap:8px;flex-wrap:wrap;align-items:center;">
          <select class="form-select" id="diary-filter-field" style="width:90px" onchange="onDiaryFieldChange()">
            <option value="">분야 전체</option>
            <!-- 동적 로드: Firestore settings/inspectionFields -->
          </select>
          <select class="form-select" id="diary-filter-purpose" style="width:200px" onchange="onDiaryPurposeChange()">
            <option value="">검사목적 전체</option>
          </select>
          <select class="form-select" id="diary-filter-cat" style="width:110px" onchange="filterDiaryItems()">
            <option value="">카테고리 전체</option>
            <option value="이화학">이화학</option>
            <option value="미생물">미생물</option>
            <option value="중금속">중금속</option>
            <option value="기타">기타</option>
          </select>
          <input type="text" id="diary-search-input" placeholder="항목명, 항목코드 검색..." style="padding:6px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:12px;flex:1;min-width:160px" oninput="filterDiaryItems()">
          <span style="font-size:12px;color:#999;margin-left:auto" id="diary-filter-count"></span>
        </div>
      </div>

      <!-- 2-Panel Layout: 항목 목록 + 일지 양식 -->
      <div class="three-panel">
        <!-- Left: 항목 목록 (diaryTemplates) -->
        <div class="panel">
          <div class="panel-header">
            시험항목 양식
            <span class="count" id="item-count">0건</span>
          </div>
          <div class="panel-body" id="item-list">
            <div class="empty-state"><div class="icon">📋</div>등록된 일지 양식을 불러오는 중...</div>
          </div>
        </div>

        <!-- Right: 일지 양식 상세/편집 -->
        <div class="panel">
          <div class="panel-header">
            시험일지 양식
            <div style="display:flex;gap:4px">
              <button class="btn btn-sm btn-outline" onclick="loadDiaryDetail()" title="식약처 일지 조회">조회</button>
              <button class="btn btn-sm btn-primary" onclick="saveDiaryTemplate()" title="양식 저장">저장</button>
            </div>
          </div>
          <div class="panel-body" id="diary-panel">
            <div class="empty-state"><div class="icon">📓</div>시험항목을 선택하세요</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->

<!-- 기준규격 선택 모달 -->
<div class="modal-overlay" id="spec-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>기준규격 선택</h3>
      <button class="modal-close" onclick="closeSpecModal()">&times;</button>
    </div>
    <div class="modal-body" id="spec-modal-body">
      <div class="loading"><div class="spinner"></div>기준규격 조회 중...</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeSpecModal()">닫기</button>
      <button class="btn btn-primary" onclick="applySelectedSpec()">적용</button>
    </div>
  </div>
</div>

<script src="js/toast.js"></script>
<script src="js/sidebar.js?v=3"></script>
<script>
/* ============================================================
   전역 변수
   ============================================================ */
var allSamples = [];           // 시료 목록 (API 또는 Firestore)
var currentSample = null;      // 선택된 시료
var allExprItems = [];         // 현재 시료의 시험항목 목록
var currentExprItem = null;    // 선택된 시험항목
var currentExprItemIdx = -1;
var currentDiaryData = {};     // 현재 일지 데이터
var _specResults = [];         // 기준규격 조회 결과
var _selectedSpecIdx = -1;     // 선택된 기준규격 인덱스

// 마스터 데이터
var masterPurposes = [];           // settings/inspectionPurposes
var masterFields = [];             // settings/inspectionFields
var masterItemsByPurpose = {};     // { purposeName: [item1, item2, ...] }

/* ============================================================
   초기화
   ============================================================ */
window.addEventListener('firebase-ready', function() {
  initDiary();
});

var _allDiaryTemplates = [];
var _allFormTemplates = [];   // formCollector에서 등록된 기록서 양식
var _filteredDiaryTemplates = [];
var _selectedDiaryTmplIdx = -1;

async function initDiary() {
  checkMfdsStatus();
  if (typeof MFDS_CODES !== 'undefined') await MFDS_CODES.loadTestItems();
  // 마스터 데이터 + diaryTemplates + formTemplates 로드
  await loadMasterData();
  populateDiaryFilterDropdowns();
  await Promise.all([loadAllDiaryTemplates(), loadFormTemplates()]);
  filterDiaryItems();
}

/* 마스터 데이터 로드 (검사목적, 검사항목 연동) */
async function loadMasterData() {
  // 0. 검사 분야
  try {
    var fieldsDoc = await db.collection('settings').doc('inspectionFields').get();
    if (fieldsDoc.exists && fieldsDoc.data().fields) {
      masterFields = fieldsDoc.data().fields;
      // 분야 필터 select 동적 생성
      var fieldSel = document.getElementById('diary-filter-field');
      if (fieldSel) {
        var prevVal = fieldSel.value;
        fieldSel.innerHTML = '<option value="">분야 전체</option>';
        masterFields.forEach(function(f) {
          var opt = document.createElement('option');
          opt.value = f.name;
          opt.textContent = f.name;
          if (f.name === prevVal) opt.selected = true;
          fieldSel.appendChild(opt);
        });
      }
    }
  } catch(e) { console.warn('검사분야 로드 실패:', e); }

  // 1. 검사목적
  try {
    var doc = await db.collection('settings').doc('inspectionPurposes').get();
    if (doc.exists && doc.data().purposes) {
      masterPurposes = doc.data().purposes.filter(function(p) { return p.o === 1; });
      masterPurposes.sort(function(a,b) { return (a.c||999) - (b.c||999); });
    }
  } catch(e) { console.warn('검사목적 로드 실패:', e); }

  // 2. 검사항목을 목적별로 그룹핑
  try {
    var snap = await db.collection('itemGroups').get();
    snap.docs.forEach(function(d) {
      var data = d.data();
      var purpose = data['검사목적'] || '';
      var item = data['항목명'] || '';
      if (purpose && item) {
        if (!masterItemsByPurpose[purpose]) masterItemsByPurpose[purpose] = [];
        if (masterItemsByPurpose[purpose].indexOf(item) === -1) masterItemsByPurpose[purpose].push(item);
      }
    });
    var tmplItems = [];
    window._mfdsTemplatesCache = [];
    var tmplSnap = await db.collection('mfdsTemplates').get();
    tmplSnap.docs.forEach(function(d) {
      var data = d.data();
      window._mfdsTemplatesCache.push(data);
      if (data.testItems) data.testItems.forEach(function(ti) {
        if (ti.testItemName && tmplItems.indexOf(ti.testItemName) === -1) tmplItems.push(ti.testItemName);
      });
    });
    masterPurposes.forEach(function(p) {
      if (p.itemSource === 'mfdsTemplates' && !masterItemsByPurpose[p.n]) {
        masterItemsByPurpose[p.n] = tmplItems;
      }
    });
  } catch(e) { console.warn('검사항목 로드 실패:', e); }
}

/* diaryTemplates 로드 */
async function loadAllDiaryTemplates() {
  try {
    var snap = await db.collection('diaryTemplates').orderBy('itemName').get();
    _allDiaryTemplates = [];
    snap.forEach(function(doc) {
      var d = doc.data();
      d._id = doc.id;
      _allDiaryTemplates.push(d);
    });
  } catch(e) {
    console.error('diaryTemplates 로드 실패:', e);
  }
}

/* formTemplates 로드 (기록서 양식 수집기에서 등록, appliedToLims=true) */
async function loadFormTemplates() {
  try {
    var snap = await db.collection('formTemplates').where('appliedToLims', '==', true).get();
    _allFormTemplates = [];
    snap.forEach(function(doc) {
      var d = doc.data();
      d._id = doc.id;
      d._isFormTemplate = true;
      _allFormTemplates.push(d);
    });
    // 식품유형 카운트
    _allFormTemplates.forEach(function(ft) {
      var counts = countAppliedFoodTypes(ft);
      ft._appliedCount = counts.applied;
      ft._totalCount = counts.total;
    });
  } catch(e) {
    console.error('formTemplates 로드 실패:', e);
  }
}

/* 적용 식품유형 카운트: 실제 생성된 기록서 문서 수 (동일 항목코드) */
function countAppliedFoodTypes(ft) {
  var code = ft.representativeItemCode || '';
  if (!code) return { applied: 0, total: 0 };
  // 실제 적용된 수: _allFormTemplates에서 동일 항목코드 문서 수
  var applied = _allFormTemplates.filter(function(f) {
    return f.representativeItemCode === code;
  }).length;
  // 적용 가능한 전체 수: mfdsTemplates에서 해당 항목 보유 식품유형 수 (중복명 제거)
  var total = 0;
  var seen = {};
  if (window._mfdsTemplatesCache) {
    window._mfdsTemplatesCache.forEach(function(tmpl) {
      var name = tmpl.foodTypeName || tmpl.templateName || '';
      if (seen[name]) return;
      if (tmpl.testItems && tmpl.testItems.some(function(ti) { return ti.testItemCode === code; })) {
        seen[name] = true;
        total++;
      }
    });
  }
  return { applied: applied, total: total };
}

/* 필터링 */
function filterDiaryItems() {
  var fieldVal = (document.getElementById('diary-filter-field').value || '').trim();
  var purposeVal = (document.getElementById('diary-filter-purpose').value || '').trim();
  var catVal = (document.getElementById('diary-filter-cat').value || '').trim();
  var searchVal = (document.getElementById('diary-search-input').value || '').trim().toLowerCase();

  // diaryTemplates 필터
  var filteredDiary = _allDiaryTemplates.filter(function(t) {
    if (fieldVal && t.field !== fieldVal) return false;
    if (purposeVal && t.purpose !== purposeVal) return false;
    if (catVal && t.category !== catVal) return false;
    if (searchVal) {
      var s = ((t.itemName || '') + ' ' + (t.itemCode || '')).toLowerCase();
      return s.indexOf(searchVal) >= 0;
    }
    return true;
  });

  // formTemplates 필터
  var filteredForm = _allFormTemplates.filter(function(ft) {
    if (fieldVal && (ft.fieldName || '') !== fieldVal) return false;
    if (purposeVal && (ft.purposeName || '') !== purposeVal) return false;
    if (catVal) {
      var testType = (ft.analyzed && ft.analyzed.testType) || '';
      if (testType !== catVal) return false;
    }
    if (searchVal) {
      var s = ((ft.representativeItem || '') + ' ' + (ft.representativeItemCode || '') + ' ' + (ft.testBasis || '')).toLowerCase();
      return s.indexOf(searchVal) >= 0;
    }
    return true;
  });

  // formTemplates를 앞에, diaryTemplates를 뒤에 병합
  _filteredDiaryTemplates = filteredForm.concat(filteredDiary);

  var totalCount = _allFormTemplates.length + _allDiaryTemplates.length;
  document.getElementById('diary-filter-count').textContent = _filteredDiaryTemplates.length + '건' + (totalCount !== _filteredDiaryTemplates.length ? ' / ' + totalCount : '');
  renderDiaryItemList();
}

/* 항목 목록 렌더링 */

  document.getElementById('item-count').textContent = _filteredDiaryTemplates.length + '건';

      html += '<span style="background:' + catColor + ';color:#fff;font-size:10px;padding:1px 6px;border-radius:3px;">' + (t.category || '') + '</span>';
      html += '</div>';
      html += '<div class="item-meta">';

      if (t.field) html += '<span style="font-size:10px;color:#4361ee;background:#e8f0ff;padding:1px 4px;border-radius:3px">' + escH(t.field) + '</span>';
      if (t.purpose) html += '<span style="font-size:10px;color:#666;background:#f0f0f0;padding:1px 4px;border-radius:3px">' + escH(t.purpose) + '</span>';
      html += formulaTag;

/* formTemplates 행 렌더링 */
function renderFormTemplateRow(ft, idx, cls, catColors) {
  var a = ft.analyzed || {};

  html += '<span style="background:#8b5cf6;color:#fff;font-size:9px;padding:1px 6px;border-radius:3px">기록서</span>';
  html += '<span style="background:' + catColor + ';color:#fff;font-size:10px;padding:1px 6px;border-radius:3px">' + escH(a.testType || '') + '</span>';
  html += '</div></div>';

  // 2행: 코드 + 분야 + 검사목적
  html += '<div class="item-meta" style="margin-bottom:5px">';
  if (ft.representativeItemCode) html += '<span class="item-code">' + escH(ft.representativeItemCode) + '</span>';
  if (ft.fieldName) html += '<span style="font-size:10px;color:' + (ft.fieldColor || '#4361ee') + ';background:#e8f0ff;padding:1px 4px;border-radius:3px">' + escH(ft.fieldName) + '</span>';

  if (hasCalc) html += '<span style="font-size:10px;color:#8e44ad;background:#f3e8ff;padding:1px 4px;border-radius:3px">fx</span>';

  // 3행: 시험법근거
  if (ft.testBasis) {

    html += '📖 ' + escH(ft.testBasis);
    html += '</div>';
  }

  // 4행: 식품유형 + 코드 + 카운트
  if (foodType) {
    var ftCode = getFoodTypeCode(foodType);
    html += '<div style="font-size:11px;color:#0369a1;margin-bottom:4px">';
    html += '🍽 ' + escH(foodType);
    if (ftCode) html += ' <span style="font-size:10px;color:#9ca3af;font-family:monospace">' + escH(ftCode) + '</span>';

      html += ' <span style="font-size:10px;color:#0ea5e9;background:#e0f2fe;padding:0 5px;border-radius:8px;font-weight:600">' + appliedCount + '/' + totalCount + '</span>';
    }

  // 5행: 표준물질 + 표준용액 + 판정기준
  var detailParts = [];

  if (detailParts.length) {
    html += '<div style="font-size:10px;color:#64748b;display:flex;gap:8px;flex-wrap:wrap">';

    });

  }

  html += '</div>';
  return html;
}

/* formTemplates에서 식품유형 추출 */
function getFoodTypeFromForm(ft) {
  var a = ft.analyzed || {};
  if (a.sections) {
    for (var si = 0; si < a.sections.length; si++) {
      var sec = a.sections[si];
      if (sec.fields) {
        for (var fi = 0; fi < sec.fields.length; fi++) {
          var f = sec.fields[fi];
          if (f.id === 'sampleType' && f.exampleValue) return f.exampleValue;
        }
      }
    }
  }
  return ft.sampleType || '';
}

function getFoodTypeCode(foodTypeName) {
  if (!foodTypeName || !window._mfdsTemplatesCache) return '';
  for (var i = 0; i < window._mfdsTemplatesCache.length; i++) {
    var t = window._mfdsTemplatesCache[i];
    if ((t.foodTypeName || t.templateName || '') === foodTypeName) return t.foodTypeCode || '';
  }
  return '';
}

/* 표준물질정보 요약 */
function getStdInfoSummary(a) {
  if (!a.sections) return '';
  for (var i = 0; i < a.sections.length; i++) {
    if (a.sections[i].title === '표준물질정보') {
      var fields = a.sections[i].fields || [];
      var parts = [];
      fields.forEach(function(f) {
        if (f.exampleValue && f.label) {
          parts.push(f.exampleValue + (f.unit ? ' ' + f.unit : ''));
        }
      });
      return parts.join(', ');
    }
  }
  return '';
}

/* 표준용액농도 요약 */
function getStdConcSummary(a) {
  if (!a.sections) return '';
  for (var i = 0; i < a.sections.length; i++) {
    if (a.sections[i].title === '표준용액농도') {
      var fields = a.sections[i].fields || [];
      return fields.length + '포인트';
    }
  }
  return '';
}

function escH(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* 항목 선택 → 우측 패널에 양식 표시 */
function selectDiaryItem(idx) {
  _selectedDiaryTmplIdx = idx;
  // 목록 active 표시
  document.querySelectorAll('.item-row').forEach(function(r, i) { r.classList.toggle('active', i === idx); });

  var t = _filteredDiaryTemplates[idx];
  if (!t) return;

  if (t._isFormTemplate) {
    renderFormTemplateDetail(t);
  } else {
    renderDiaryTemplateDetail(t);
  }
}

/* formTemplates 상세 */
function renderFormTemplateDetail(ft) {
  var panel = document.getElementById('diary-panel');
  var a = ft.analyzed || {};
  var foodType = getFoodTypeFromForm(ft);
  var appliedCount = ft._appliedCount || 0;
  var totalCount = ft._totalCount || 0;
  // Firestore에 저장된 오버라이드 값 로드
  var overrides = ft._overrides || {};

  // 헤더: 기록서 뱃지
  html += '<h4><span class="icon">📄</span>시험검사기록서 — ' + escH(ft.representativeItem || '') + '</h4>';

  var foodTypeCode = getFoodTypeCode(foodType);
  html += '<div class="form-row"><div class="form-group" style="flex:2"><label>식품유형</label>';
  html += '<div style="display:flex;align-items:center;gap:8px">';

  html += '</div></div>';

  // SOP + 장비
  html += '<div class="form-row"><div class="form-group"><label>SOP</label><input type="text" value="' + escA(a.sop) + '" readonly></div>';
  html += '<div class="form-group"><label>장비</label><input type="text" value="' + escA((a.equipment || []).join(', ')) + '" readonly></div></div>';

  // 표준물질정보 (수정 가능)
  var stdSection = getSectionByTitle(a, '표준물질정보');
  if (stdSection && stdSection.fields && stdSection.fields.length) {
    html += '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px;margin-bottom:14px">';

    html += '<div style="display:grid;grid-template-columns:repeat(' + Math.min(stdSection.fields.length, 3) + ',1fr);gap:8px">';
    stdSection.fields.forEach(function(f) {
      var ovVal = (overrides.stdInfo && overrides.stdInfo[f.id]) || f.exampleValue || '';
      html += '<div class="form-group" style="margin-bottom:4px"><label>' + escH(f.label) + (f.unit ? ' (' + escH(f.unit) + ')' : '') + '</label>';
      html += '<input type="text" data-ft-field="stdInfo.' + escA(f.id) + '" value="' + escA(ovVal) + '" style="font-size:12px;padding:5px 8px"></div>';
    });
    html += '</div></div>';
  }

  // 표준용액농도 + 값 적용 기간 (나란히)
  var concSection = getSectionByTitle(a, '표준용액농도');

  var createdDate = ft.createdAt ? new Date(ft.createdAt) : new Date();

/* 소수점/처리방식 다중 규칙 렌더링 */
function renderRoundingRules(rules) {
  var html = '';
  rules.forEach(function(rule, idx) {
    var ruleNum = idx + 1;
    html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;padding:8px;background:' + (idx % 2 === 0 ? '#faf5ff' : '#f5f3ff') + ';border-radius:6px">';
    html += '<span style="font-size:11px;font-weight:700;color:#6b21a8;min-width:45px">' + ruleNum + '규칙</span>';
    html += '<span style="font-size:10px;color:#7c3aed">소수점</span>';
    [1,2,3,4].forEach(function(n) {
      var sel = (rule.decimal == n);
      html += '<button class="btn btn-sm' + (sel ? ' btn-primary' : ' btn-outline') + '" onclick="setRuleDecimal(' + idx + ',' + n + ')" style="min-width:40px;font-size:10px;padding:2px 6px">' + n + '자리</button>';
    });
    html += '<span style="font-size:10px;color:#7c3aed;margin-left:4px">처리</span>';
    var modes = [{k:'floor',l:'버림'},{k:'round',l:'반올림'},{k:'ceil',l:'내림'}];
    modes.forEach(function(m) {
      var sel = (rule.mode === m.k);
      html += '<button class="btn btn-sm' + (sel ? ' btn-primary' : ' btn-outline') + '" onclick="setRuleMode(' + idx + ',\'' + m.k + '\')" style="min-width:44px;font-size:10px;padding:2px 6px">' + m.l + '</button>';
    });
    if (rules.length > 1) {
      html += '<button class="btn btn-sm btn-outline" onclick="removeRoundingRule(' + idx + ')" style="font-size:10px;padding:2px 6px;color:#ef4444;border-color:#fca5a5" title="삭제">✕</button>';
    }
    html += '</div>';
  });
  html += '<button class="btn btn-sm btn-outline" onclick="addRoundingRule()" style="font-size:10px;margin-top:4px">+ 규칙 추가</button>';
  return html;
}

function getRoundingRules() {
  var ft = _filteredDiaryTemplates[_selectedDiaryTmplIdx];
  if (!ft || !ft._overrides) return [{ decimal: 2, mode: 'round' }];
  return ft._overrides._roundingRules || [{ decimal: 2, mode: 'round' }];
}

function setRuleDecimal(idx, n) {
  var ft = _filteredDiaryTemplates[_selectedDiaryTmplIdx];
  if (!ft || !ft._isFormTemplate) return;
  if (!ft._overrides) ft._overrides = {};
  var rules = ft._overrides._roundingRules || [{ decimal: 2, mode: 'round' }];
  if (rules[idx]) rules[idx].decimal = n;
  ft._overrides._roundingRules = rules;
  var area = document.getElementById('rounding-rules-area');
  if (area) area.innerHTML = renderRoundingRules(rules);
}

function setRuleMode(idx, mode) {
  var ft = _filteredDiaryTemplates[_selectedDiaryTmplIdx];
  if (!ft || !ft._isFormTemplate) return;
  if (!ft._overrides) ft._overrides = {};
  var rules = ft._overrides._roundingRules || [{ decimal: 2, mode: 'round' }];
  if (rules[idx]) rules[idx].mode = mode;
  ft._overrides._roundingRules = rules;
  var area = document.getElementById('rounding-rules-area');
  if (area) area.innerHTML = renderRoundingRules(rules);
}

function addRoundingRule() {
  var ft = _filteredDiaryTemplates[_selectedDiaryTmplIdx];
  if (!ft || !ft._isFormTemplate) return;
  if (!ft._overrides) ft._overrides = {};
  var rules = ft._overrides._roundingRules || [{ decimal: 2, mode: 'round' }];
  rules.push({ decimal: 2, mode: 'round' });
  ft._overrides._roundingRules = rules;
  var area = document.getElementById('rounding-rules-area');
  if (area) area.innerHTML = renderRoundingRules(rules);
}

function removeRoundingRule(idx) {
  var ft = _filteredDiaryTemplates[_selectedDiaryTmplIdx];
  if (!ft || !ft._isFormTemplate) return;
  var rules = ft._overrides._roundingRules || [];
  if (rules.length <= 1) return;
  rules.splice(idx, 1);
  ft._overrides._roundingRules = rules;
  var area = document.getElementById('rounding-rules-area');
  if (area) area.innerHTML = renderRoundingRules(rules);
}

/* formTemplates 오버라이드 값 저장 */
async function saveFormTemplateOverrides() {
  var ft = _filteredDiaryTemplates[_selectedDiaryTmplIdx];
  if (!ft || !ft._isFormTemplate) { showToast('기록서를 선택하세요', 'error'); return; }

  var a = ft.analyzed || {};

  // 수정된 값 수집
  var curOverrides = ft._overrides || {};
  var newOverrides = {
    applyFrom: (document.getElementById('ft-apply-from') || {}).value || '',
    applyTo: (document.getElementById('ft-apply-to') || {}).value || '',
    stdInfo: {},
    stdConc: {},
    _roundingRules: curOverrides._roundingRules || [{ decimal: 2, mode: 'round' }],
    updatedAt: new Date().toISOString()
  };

  // 표준물질/표준용액 값 수집
  document.querySelectorAll('[data-ft-field]').forEach(function(inp) {
    var path = inp.getAttribute('data-ft-field');
    var parts = path.split('.');
    if (parts.length === 2) {
      newOverrides[parts[0]] = newOverrides[parts[0]] || {};
      newOverrides[parts[0]][parts[1]] = inp.value;
    }
  });

  // 변경 내용 비교 → 이력 생성
  var oldOverrides = ft._overrides || {};
  var changes = [];
  var stdSection = getSectionByTitle(a, '표준물질정보');
  if (stdSection) {
    stdSection.fields.forEach(function(f) {
      var oldVal = (oldOverrides.stdInfo && oldOverrides.stdInfo[f.id]) || f.exampleValue || '';
      var newVal = (newOverrides.stdInfo[f.id]) || '';
      if (oldVal !== newVal) changes.push(f.label + ': ' + oldVal + ' → ' + newVal);
    });
  }
  var concSection = getSectionByTitle(a, '표준용액농도');
  if (concSection) {
    concSection.fields.forEach(function(f) {
      var oldVal = (oldOverrides.stdConc && oldOverrides.stdConc[f.id]) || f.exampleValue || '';
      var newVal = (newOverrides.stdConc[f.id]) || '';
      if (oldVal !== newVal) changes.push(f.label + ': ' + oldVal + ' → ' + newVal);
    });
  }
  if (oldOverrides.applyFrom !== newOverrides.applyFrom || oldOverrides.applyTo !== newOverrides.applyTo) {
    changes.push('적용기간 변경');
  }

  // 이력 추가
  var history = ft._changeHistory || [];
  if (changes.length) {
    history.push({
      date: new Date().toLocaleString('ko-KR'),
      detail: changes.join(', '),
      applyFrom: newOverrides.applyFrom,
      applyTo: newOverrides.applyTo
    });
  }

  try {
    await db.collection('formTemplates').doc(ft._id).set({
      _overrides: newOverrides,
      _changeHistory: history
    }, { merge: true });
    ft._overrides = newOverrides;
    ft._changeHistory = history;
    showToast('값 저장 완료' + (changes.length ? ' (' + changes.length + '건 변경)' : ''), 'success');
    renderFormTemplateDetail(ft);
  } catch(e) {
    showToast('저장 실패: ' + e.message, 'error');
  }
}

/* 시작일 변경 시 종료일 자동 +3개월 */
function ftAutoSetEndDate() {
  var fromEl = document.getElementById('ft-apply-from');
  var toEl = document.getElementById('ft-apply-to');
  if (!fromEl || !toEl || !fromEl.value) return;
  var d = new Date(fromEl.value);
  if (isNaN(d.getTime())) return;
  d.setMonth(d.getMonth() + 3);
  toEl.value = formatDateISO(d);
}

/* 날짜를 YYYY-MM-DD 형식으로 변환 */
function formatDateISO(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

/* 섹션명으로 analyzed.sections 검색 */
function getSectionByTitle(a, title) {
  if (!a.sections) return null;
  for (var i = 0; i < a.sections.length; i++) {
    if (a.sections[i].title === title) return a.sections[i];
  }
  return null;
}

/* 적용 식품유형 목록 팝업 */

/* 식품유형 적용: 기록서 양식 수집기와 동일 방식 — 식품유형별 개별 문서 복사 생성 */
async function saveFtAppliedFoodTypes() {
  var ft = _filteredDiaryTemplates[_selectedDiaryTmplIdx];
  if (!ft || !ft._isFormTemplate) return;

  var itemCode = ft.representativeItemCode || '';

  // 선택된 식품유형 수집
  var selectedNames = [];
  document.querySelectorAll('#ft-food-list input[type="checkbox"]:checked').forEach(function(cb) {
    var name = cb.getAttribute('data-ft-food-name');
    if (name) selectedNames.push({ name: name, code: cb.getAttribute('data-ft-food-code') || '' });
  });

  // 이미 적용된 식품유형 (기존 문서)
  var existingByName = {};
  _allFormTemplates.forEach(function(f) {
    if (f.representativeItemCode === itemCode) {
      var fName = getFoodTypeFromForm(f);
      if (fName) existingByName[fName] = f._id;
    }
  });

  var btn = document.getElementById('btn-ft-apply');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 적용 중...'; }

  try {
    var created = 0, removed = 0;

    // 새로 추가할 식품유형: 선택됨 + 기존 문서 없음
    for (var i = 0; i < selectedNames.length; i++) {
      var sn = selectedNames[i];
      if (!existingByName[sn.name]) {
        // 원본 문서 복사하여 새 문서 생성 (기록서 양식 수집기와 동일)
        var newRow = JSON.parse(JSON.stringify(ft));
        delete newRow._id; delete newRow._isFormTemplate; delete newRow._appliedCount; delete newRow._totalCount;
        newRow.sampleType = sn.name;
        newRow.docId = (ft.savedFileName || ft._id).replace(/[^a-zA-Z0-9가-힣_·]/g, '_') + '_' + sn.code + '_' + Date.now();
        newRow.createdAtStr = new Date().toLocaleString('ko-KR');
        newRow.appliedFrom = ft._id;
        // analyzed 내 sampleType exampleValue도 변경
        if (newRow.analyzed && newRow.analyzed.sections) {
          newRow.analyzed.sections.forEach(function(sec) {
            (sec.fields || []).forEach(function(f) {
              if (f.id === 'sampleType') f.exampleValue = sn.name;
            });
          });
        }
        await db.collection('formTemplates').doc(newRow.docId).set(newRow);
        created++;
      }
    }

    // 해제된 식품유형: 기존 문서 있음 + 선택 해제됨 + 현재 문서 아님
    var selectedSet = {};
    selectedNames.forEach(function(sn) { selectedSet[sn.name] = true; });
    var currentFoodType = getFoodTypeFromForm(ft);
    for (var name in existingByName) {
      if (!selectedSet[name] && name !== currentFoodType) {
        await db.collection('formTemplates').doc(existingByName[name]).delete();
        removed++;
      }
    }

    // 목록 새로고침
    await loadFormTemplates();
    filterDiaryItems();

    showToast((created ? created + '개 추가' : '') + (created && removed ? ', ' : '') + (removed ? removed + '개 해제' : '') + (!created && !removed ? '변경 없음' : ''), 'success');
    closeSpecModal();

    // 상세 패널 갱신
    var updatedFt = _allFormTemplates.find(function(f) { return f._id === ft._id; });
    if (updatedFt) renderFormTemplateDetail(updatedFt);

  } catch(e) {
    showToast('적용 실패: ' + e.message, 'error');
  }

  if (btn) { btn.disabled = false; btn.textContent = '선택 적용'; }
}

function escA(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* 계산식 실행 */
function calcDiaryFormula() {
  var t = _filteredDiaryTemplates[_selectedDiaryTmplIdx];
  if (!t || !t.calcFormula) return;
  var vals = {};
  for (var i = 1; i <= 15; i++) {
    var inp = document.getElementById('dtmpl-calc-x' + i);
    vals['X' + i] = inp ? parseFloat(inp.value) || 0 : 0;
  }
  var expr = t.calcFormula.replace(/X(\d+)/gi, function(m, n) { return vals['X' + n]; });
  try {
    var result = eval(expr);
    var valid = t.calcValid || 3;
    result = parseFloat(result.toFixed(valid));
    document.getElementById('dtmpl-calc-result').textContent = result;
  } catch(e) {
    document.getElementById('dtmpl-calc-result').textContent = 'ERR';
  }
}

/* 양식 저장 (우측 패널에서 수정 후) */
async function saveDiaryTemplate() {
  var t = _filteredDiaryTemplates[_selectedDiaryTmplIdx];
  if (!t) { showToast('항목을 선택하세요', 'error'); return; }
  // formTemplates 문서인 경우 전용 저장 함수 호출
  if (t._isFormTemplate) { return saveFormTemplateOverrides(); }
  try {
    var updates = {
      standard: (document.getElementById('dtmpl-ed-std') || {}).value || '',
      unit: (document.getElementById('dtmpl-ed-unit') || {}).value || '',
      diaryCn: (document.getElementById('dtmpl-ed-content') || {}).innerHTML || '',
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    await db.collection('diaryTemplates').doc(t._id || t.itemCode).update(updates);
    // 로컬 업데이트
    Object.assign(t, updates);
    showToast('양식 저장 완료', 'success');
  } catch(e) {
    showToast('저장 실패: ' + e.message, 'error');
  }
}

function formatDateCompact(d) {

/* ============================================================
   시료 목록 조회 (식약처 API - 0201)
   ============================================================ */
async function searchSamplesFromAPI() {
  var fromVal = document.getElementById('date-from').value;
  var toVal = document.getElementById('date-to').value;
  var progress = document.getElementById('progress-filter').value;

  if (!fromVal || !toVal) { showToast('조회 기간을 입력하세요', 'error'); return; }

  document.getElementById('sample-list').innerHTML = '<div class="loading"><div class="spinner"></div>식약처 API 조회 중...</div>';

  try {
    var params = {
      rceptDeStart: formatDateCompact(fromVal),
      rceptDeEnd: formatDateCompact(toVal),
      jobSeCode: 'IM18000001',
      exprIemProgrsSittnCode: progress || 'IM04000004'
    };
    var res = await MFDS.selectListExprDiarySplore(params);
    if (res && res.resultFlag === '1' && res.resultData) {
      allSamples = Array.isArray(res.resultData) ? res.resultData : [res.resultData];
      renderSampleList();
      showToast(allSamples.length + '건 조회 완료', 'success');
    } else {
      allSamples = [];
      renderSampleList();
      showToast('조회 결과 없음: ' + (res.errorMessage || ''), 'info');
    }
  } catch(e) {
    console.error('시료 조회 오류:', e);
    showToast('API 오류: ' + (e.message || e), 'error');
    document.getElementById('sample-list').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>API 연결 실패</div>';
  }
}

/* Firestore 기반 조회 */
async function searchFromFirestore() {
  document.getElementById('sample-list').innerHTML = '<div class="loading"><div class="spinner"></div>조회 중...</div>';
  try {
    var fromVal = document.getElementById('date-from').value;
    var toVal = document.getElementById('date-to').value;
    var progressVal = document.getElementById('progress-filter').value;

    var query = db.collection('receipts').orderBy('createdAt','desc').limit(500);
    var snap = await query.get();
    allSamples = [];
    snap.docs.forEach(function(d) {
      var data = d.data();
      // 날짜 필터
      var rd = data.receiptDate || '';
      if (fromVal && rd < fromVal) return;
      if (toVal && rd > toVal) return;
      // 진행상황 필터
      if (progressVal) {
        var statusMap = {'IM04000001':'접수완료','IM04000002':'시험중','IM04000003':'결과입력완료','IM04000004':'결재완료'};
        var targetStatus = statusMap[progressVal] || '';
        if (targetStatus && (data.status || '') !== targetStatus) return;
      }
      allSamples.push({
        _firestoreId: d.id,
        sploreRceptNo: data.receiptNo || d.id,
        sploreNm: data.productName || data.sampleName || '-',
        prductNm: data.productName || '-',
        prdlstNm: data.foodType || data.testField || '-',
        entrpsNm: data.companyName || '-',
        rceptDe: (data.receiptDate || '').replace(/-/g, ''),
        rceptDeStr: data.receiptDate || '-',
        progrsSittnCode: data.status || '-',
        exprIemJnlCnt: '0',
        totExprIemCnt: String((data.testItems || []).length),
        testPurpose: data.testPurpose || '',
        testerName: data.testerName || '',
        _firestore: true,
        _data: data
      });
    });
    renderSampleList();
    showToast(allSamples.length + '건 조회 완료', 'success');
  } catch(e) {
    showToast('조회 실패: ' + e.message, 'error');
  }
}

function renderSampleList() {
  var el = document.getElementById('sample-list');
  var displayed = getFilteredSamples();
  document.getElementById('sample-count').textContent = displayed.length + '건';
  var countEl = document.getElementById('diary-filter-count');
  if (countEl) {
    if (displayed.length !== allSamples.length) {
      countEl.textContent = '필터: ' + displayed.length + '/' + allSamples.length + '건';
    } else {
      countEl.textContent = '';
    }
  }

  if (!displayed.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📭</div>조회 결과가 없습니다</div>';
    return;
  }

  var html = '';
  displayed.forEach(function(item) {
    var s = item.sample;
    var i = item.idx;
    var jnlCnt = parseInt(s.exprIemJnlCnt) || 0;
    var totCnt = parseInt(s.totExprIemCnt) || 0;
    var statusCls = jnlCnt > 0 ? (jnlCnt >= totCnt ? 'badge-done' : 'badge-progress') : 'badge-wait';
    var statusTxt = jnlCnt > 0 ? (jnlCnt >= totCnt ? '완료' : jnlCnt+'/'+totCnt) : '미작성';

    html += '<div class="sample-row" onclick="selectSample('+i+')" id="sample-'+i+'">';
    html += '<div class="row-top"><span class="row-no">' + (s.sploreRceptNo || '-') + '</span>';
    html += '<span class="row-status '+statusCls+'">' + statusTxt + '</span></div>';
    html += '<div class="row-bottom">';
    html += '<span>' + (s.sploreNm || s.prductNm || '-') + '</span>';
    html += '<span>' + (s.entrpsNm || '') + '</span>';
    html += '<span>' + (s.rceptDeStr || s.rceptDe || '') + '</span>';
    html += '</div></div>';
  });
  el.innerHTML = html;

  // 필터 드롭다운 채우기
  populateDiaryFilterDropdowns();
}

function getFilteredSamples() {
  var searchVal = (document.getElementById('diary-search-input') || {}).value || '';
  var purposeVal = (document.getElementById('diary-filter-purpose') || {}).value || '';
  var itemVal = (document.getElementById('diary-filter-item') || {}).value || '';
  var q = searchVal.trim().toLowerCase();

  var result = [];
  allSamples.forEach(function(s, i) {
    // 텍스트 검색 (접수번호, 시료명, 거래처)
    if (q) {
      var haystack = ((s.sploreRceptNo || '') + ' ' + (s.sploreNm || '') + ' ' + (s.prductNm || '') + ' ' + (s.entrpsNm || '')).toLowerCase();
      if (haystack.indexOf(q) === -1) return;
    }
    // 검사목적 필터
    if (purposeVal) {
      var purpose = s.testPurpose || (s._data && s._data.testPurpose) || '';
      if (purpose !== purposeVal) return;
    }
    // 검사항목 필터
    if (itemVal) {
      var itemNames = getDiaryTestItemNames(s);
      if (itemNames.toLowerCase().indexOf(itemVal.toLowerCase()) === -1) return;
    }
    result.push({ sample: s, idx: i });
  });
  return result;
}

function getDiaryTestItemNames(s) {
  var names = [];
  var data = s._data || s;
  if (data.testItems && data.testItems.length) {
    data.testItems.forEach(function(ti) {
      if (ti.itemName) names.push(ti.itemName);
      if (ti.testItemName) names.push(ti.testItemName);
    });
  }
  if (data.samples && data.samples.length) {
    data.samples.forEach(function(sam) {
      if (sam.testItems && sam.testItems.length) {
        sam.testItems.forEach(function(ti) {
          if (ti.itemName) names.push(ti.itemName);
          if (ti.testItemName) names.push(ti.testItemName);
        });
      }
    });
  }
  return names.join(' ');
}

function filterDiarySamples() {
  renderSampleList();
}

function getFieldCode(name) {
  if (!name) return '';
  // masterFields가 로드되었으면 동적으로 매핑
  if (masterFields.length > 0) {
    var f = masterFields.find(function(field) { return field.name === name; });
    return f ? (f.code || f.id || '') : '';
  }
  // 폴백
  if (name === '식품') return 'F';
  if (name === '축산') return 'L';
  if (name === '기타') return 'E';
  return '';
}

/* 분야 변경 → 검사목적 → 검사항목 연동 */
function onDiaryFieldChange() {
  populateDiaryFilterDropdowns();
  filterDiaryItems();
}

function onDiaryPurposeChange() {
  filterDiaryItems();
}

function populateDiaryFilterDropdowns() {
  var fieldVal = (document.getElementById('diary-filter-field') || {}).value || '';
  var fieldCode = getFieldCode(fieldVal);

  // 검사목적 (분야 연동)
  var purposeSel = document.getElementById('diary-filter-purpose');
  if (purposeSel) {
    var prev = purposeSel.value;
    var addedP = {};
    var opts = '<option value="">검사목적 전체</option>';
    masterPurposes.forEach(function(p) {
      if (fieldCode && p.fields && p.fields.indexOf(fieldCode) === -1) return;
      opts += '<option value="' + p.n + '"' + (p.n === prev ? ' selected' : '') + '>' + p.n + '</option>';
      addedP[p.n] = true;
    });
    purposeSel.innerHTML = opts;
  }
}

function populateDiaryItemDropdown() {
  var itemSel = document.getElementById('diary-filter-item');
  if (!itemSel) return;
  var prevItem = itemSel.value;
  var selectedPurpose = (document.getElementById('diary-filter-purpose') || {}).value || '';
  var addedI = {};
  var opts = '<option value="">검사항목 전체</option>';

  if (selectedPurpose && masterItemsByPurpose[selectedPurpose]) {
    masterItemsByPurpose[selectedPurpose].sort().forEach(function(n) {
      opts += '<option value="' + n + '"' + (n === prevItem ? ' selected' : '') + '>' + n + '</option>';
      addedI[n] = true;
    });
  } else if (!selectedPurpose) {
    Object.keys(masterItemsByPurpose).forEach(function(p) {
      masterItemsByPurpose[p].forEach(function(n) {
        if (!addedI[n]) {
          opts += '<option value="' + n + '">' + n + '</option>';
          addedI[n] = true;
        }
      });
    });
  }
  // 데이터 항목 보충
  allSamples.forEach(function(s) {
    if (s._data) {
      var add = function(name) {
        if (name && !addedI[name]) { opts += '<option value="' + name + '">' + name + '</option>'; addedI[name] = true; }
      };
      if (s._data.testItems) s._data.testItems.forEach(function(ti) { add(ti.itemName); });
      if (s._data.samples) s._data.samples.forEach(function(sam) {
        if (sam.testItems) sam.testItems.forEach(function(ti) { add(ti.itemName); });
      });
    }
  });
  itemSel.innerHTML = opts;
}

/* ============================================================
   시료 선택 → 시험항목 조회 (0202)
   ============================================================ */
async function selectSample(idx) {
  currentSample = allSamples[idx];
  currentExprItem = null;
  currentExprItemIdx = -1;

  // UI 활성화
  document.querySelectorAll('.sample-row').forEach(function(el) { el.classList.remove('active'); });
  var row = document.getElementById('sample-'+idx);
  if (row) row.classList.add('active');

  // 일지 패널 초기화
  document.getElementById('diary-panel').innerHTML = '<div class="empty-state"><div class="icon">📓</div>시험항목을 선택하세요</div>';

  // 시험항목 조회
  document.getElementById('item-list').innerHTML = '<div class="loading"><div class="spinner"></div>시험항목 조회 중...</div>';

  if (currentSample._firestore) {
    // Firestore 데이터 → 로컬 항목
    var items = currentSample._data.testItems || currentSample._data.samples || [];
    if (items.length === 0 && currentSample._data.samples) {
      items = [];
      (currentSample._data.samples || []).forEach(function(s) {
        (s.testItems || []).forEach(function(t) { items.push(t); });
      });
    }
    allExprItems = items.map(function(t, i) {
      return {
        exprIemSn: String(i+1),
        exprIemNm: t.testItemName || t.name || '-',
        exprIemCode: t.testItemCode || '',
        stndrdValue: t.standard || t.stndrdValue || '',
        resultValue: t.measuredValue || '',
        diaryCn: '',
        jnlRegistAt: '',
        exprDiarySn: '',
        _local: true
      };
    });
    renderExprItems();
  } else {
    // 식약처 API (0202)
    try {
      var params = {
        sploreReqestNo: currentSample.sploreReqestNo || currentSample.sploreRceptNo,
        sploreSn: currentSample.sploreSn || '1'
      };
      var res = await MFDS.selectListExprDiaryExprIem(params);
      if (res && res.resultFlag === '1' && res.resultData) {
        allExprItems = Array.isArray(res.resultData) ? res.resultData : [res.resultData];
      } else {
        allExprItems = [];
      }
      renderExprItems();
    } catch(e) {
      console.error('항목 조회 오류:', e);
      document.getElementById('item-list').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>항목 조회 실패</div>';
    }
  }
}

/* ============================================================
   시험방법 조회 (I-LMS-0241)
   ============================================================ */
async function loadTestMethods(exprIemCode) {
  if (!exprIemCode) { showToast('항목코드를 입력하세요', 'error'); return; }

  var el = document.getElementById('method-list');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>시험방법 조회 중...</div>';

  try {
    var res = await MFDS.selectListExprMth({ exprIemCode: exprIemCode });
    if (res && res.resultData) {
      var methods = Array.isArray(res.resultData) ? res.resultData : [res.resultData];
      if (methods.length === 0) {
        el.innerHTML = '<div style="font-size:12px;color:#999">시험방법 없음</div>';
        return;
      }
      var html = '';
      methods.forEach(function(m, i) {
        html += '<div class="method-item" onclick="selectMethod(this,'+i+',\''+m.codeNo+'\')" data-sn="'+m.codeNo+'">';
        html += '<span>' + (m.codeName || '-') + '</span>';
        html += '<span class="method-code">' + (m.codeNo || '') + '</span>';
        html += '</div>';
      });
      el.innerHTML = html;
      // 첫번째 자동 선택하여 양식 드롭다운 업데이트
      if (methods.length > 0) {
        loadDiaryFormsForMethod(methods[0].codeNo);
      }
    } else {
      el.innerHTML = '<div style="font-size:12px;color:#999">시험방법 없음</div>';
    }
  } catch(e) {
    el.innerHTML = '<div style="font-size:12px;color:#e44">조회 실패: ' + (e.message || e) + '</div>';
  }
}

function selectMethod(el, idx, sn) {
  document.querySelectorAll('.method-item').forEach(function(m) { m.classList.remove('selected'); });
  el.classList.add('selected');
  loadDiaryFormsForMethod(sn);
}

/* ============================================================
   일지 양식 조회 (I-LMS-0242) - 시험방법순번 기반
   ============================================================ */
async function loadDiaryFormsForMethod(exprMthSn) {
  var sel = document.getElementById('diary-form-select');
  if (!sel) return;

  try {
    // 사용범위: 개인 → 부서 → 기관 순서
    var scopes = ['SY05000003','SY05000002','SY05000001'];
    var allForms = [];
    for (var i = 0; i < scopes.length; i++) {
      var res = await MFDS.selectListExprDiaryForm({ exprMthSn: String(exprMthSn), useScopeCode: scopes[i] });
      if (res && res.resultData) {
        var forms = Array.isArray(res.resultData) ? res.resultData : [res.resultData];
        forms.forEach(function(f) { f._scope = scopes[i]; allForms.push(f); });
      }
    }

    // 기본 내장 양식 유지 + API 양식 추가
    var html = '<option value="">-- 양식 선택 --</option>';
    html += '<optgroup label="기본 양식">';
    html += '<option value="general">일반 시험일지</option>';
    html += '<option value="chem">이화학 시험일지</option>';
    html += '<option value="micro">미생물 시험일지</option>';
    html += '<option value="metal">중금속 시험일지</option>';
    html += '<option value="memo">간이 메모</option>';
    html += '</optgroup>';
    if (allForms.length > 0) {
      html += '<optgroup label="식약처 양식 ('+allForms.length+'건)">';
      allForms.forEach(function(f, i) {
        html += '<option value="mfds_'+i+'" data-idx="'+i+'">' + (f.codename || '양식 '+(i+1)) + '</option>';
      });
      html += '</optgroup>';
    }
    sel.innerHTML = html;
    sel._mfdsForms = allForms;
  } catch(e) {
    console.warn('양식 조회 실패:', e);
  }
}

function onFormSelect(val) {
  var contentEl = document.getElementById('diary-content');

  var templates = {
    'general': '1. 시험 목적\n\n2. 시험 방법\n\n3. 시험 과정\n\n4. 시험 결과\n\n5. 고찰',
    'chem': '1. 시험 목적\n\n2. 시약 및 기구\n  - 시약:\n  - 기구:\n\n3. 시험 방법\n  - 전처리:\n  - 분석:\n\n4. 시험 결과\n  - 측정값:\n  - 계산:\n\n5. 판정',
    'micro': '1. 시험 목적\n\n2. 배지 및 기구\n  - 배지:\n  - 기구:\n\n3. 시험 방법\n  - 검체 조제:\n  - 접종:\n  - 배양 조건:\n\n4. 시험 결과\n  - 집락수:\n  - 계산:\n\n5. 판정',
    'metal': '1. 시험 목적\n\n2. 시약 및 기구\n  - 표준용액:\n  - 기기: ICP / AAS\n\n3. 전처리\n  - 습식분해 / 건식회화 / 마이크로웨이브\n\n4. 분석 조건\n  - 파장:\n  - 검량선:\n\n5. 시험 결과\n  - 측정값:\n  - 환산값:\n\n6. 판정',
    'memo': ''
  };

  if (templates[val] !== undefined) {
    contentEl.innerText = templates[val];
  } else if (val.startsWith('mfds_')) {
    var sel = document.getElementById('diary-form-select');
    var forms = sel._mfdsForms || [];
    var fidx = parseInt(val.replace('mfds_',''));
    if (forms[fidx] && forms[fidx].codename2) {
      contentEl.innerHTML = forms[fidx].codename2;
    }
  }
}

async function openSpecModal() {
  var modal = document.getElementById('spec-modal');
  var body = document.getElementById('spec-modal-body');
  modal.classList.add('active');
  body.innerHTML = '<div class="loading"><div class="spinner"></div>기준규격 조회 중...</div>';

  _specResults = [];
  _selectedSpecIdx = -1;

  try {
    // 1) 공통기준규격종류 조회 (0113) - 업무분야별
    var kndRes = await MFDS.selectListCmmnStdrStndrdKnd({
      jobRealmCode: 'IM36000001', // 식품
      useAt: 'Y'
    });
    var kndList = [];
    if (kndRes && kndRes.resultData) {
      kndList = Array.isArray(kndRes.resultData) ? kndRes.resultData : [kndRes.resultData];
    }

    // 2) 시험항목공통기준규격 조회 (0708)
    var specRes = await MFDS.selectListExprIemCmmnStdrStndrd({
      jobRealmCode: 'IM36000001',
      useAt: 'Y'
    });
    var specList = [];
    if (specRes && specRes.resultData) {
      specList = Array.isArray(specRes.resultData) ? specRes.resultData : [specRes.resultData];
    }

    // 현재 항목명으로 필터링
    var itemName = currentExprItem ? (currentExprItem.exprIemNm || '') : '';
    if (itemName) {
      var filtered = specList.filter(function(s) {
        return (s.exprIemNm || '').indexOf(itemName) >= 0;
      });
      if (filtered.length > 0) specList = filtered;
    }

    _specResults = specList;

    // 렌더링
    var html = '';

    // 규격종류 선택 (필터)
    if (kndList.length > 0) {
      html += '<div class="form-group"><label>규격종류 필터</label>';
      html += '<select id="spec-knd-filter" onchange="filterSpecByKnd(this.value)" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:8px">';
      html += '<option value="">전체 (' + specList.length + '건)</option>';
      kndList.forEach(function(k) {
        html += '<option value="'+k.cmmnKndCode+'">'+k.cmmnKndNm+' ('+k.prdlstCode+')</option>';
      });
      html += '</select></div>';
    }

    html += '<div id="spec-table-wrap">';
    html += renderSpecTable(specList);
    html += '</div>';

    body.innerHTML = html || '<div style="padding:20px;text-align:center;color:#999">기준규격 데이터가 없습니다</div>';
  } catch(e) {
    body.innerHTML = '<div style="padding:20px;text-align:center;color:#e44">조회 실패: ' + (e.message||e) + '</div>';
  }
}

function renderSpecTable(list) {

  var html = '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:8px">';

  html += '<th style="padding:6px 8px;border:1px solid #ddd">최대값</th>';
  html += '<th style="padding:6px 8px;border:1px solid #ddd">단위</th>';
  html += '<th style="padding:6px 8px;border:1px solid #ddd">종류</th>';
  html += '</tr></thead><tbody>';

  list.forEach(function(s, i) {
    html += '<tr style="cursor:pointer;' + (_selectedSpecIdx===i?'background:#dbeafe':'') + '" onclick="selectSpecRow('+i+')" id="spec-row-'+i+'">';
    html += '<td style="padding:4px 8px;border:1px solid #eee;text-align:center"><input type="radio" name="spec-radio" ' + (_selectedSpecIdx===i?'checked':'') + '></td>';

}

/* ============================================================
   계산식 결과 계산
   ============================================================ */
function calculateResult() {
  var formula = (document.getElementById('calc-formula') || {}).value || '';
  if (!formula) return;

  var vals = {};
  for (var i = 1; i <= 15; i++) {
    var inp = document.getElementById('calc-x'+i);
    vals['X'+i] = inp ? parseFloat(inp.value) || 0 : 0;
    vals['x'+i] = vals['X'+i];
  }

  try {
    var expr = formula;
    Object.keys(vals).forEach(function(k) {
      expr = expr.replace(new RegExp(k, 'g'), vals[k]);
    });
    var result = eval(expr);
    var validCphr = parseInt((document.getElementById('calc-valid') || {}).value) || 3;
    result = parseFloat(result.toFixed(validCphr));
    document.getElementById('calc-result').value = result;
  } catch(e) {
    document.getElementById('calc-result').value = 'ERR';
  }
}

async function saveDiary() {
  if (!currentSample || !currentExprItem) { showToast('시료와 시험항목을 선택하세요', 'error'); return; }

  var diaryCn = generateDiaryCn();

  }
  if (!diaryCn.trim()) { showToast('일지 내용을 입력하세요', 'error'); return; }

  try {

    var sploreReqestNo = currentSample.sploreReqestNo || currentSample.sploreRceptNo;
    var sploreSn = currentSample.sploreSn || '1';
    var exprIemSn = currentExprItem.exprIemSn || String(currentExprItemIdx + 1);

    var params = {
      sploreReqestNo: sploreReqestNo,

      currentExprItem.exprDiarySn = sn;
      currentExprItem.jnlRegistAt = 'Y';
      currentExprItem.diaryCn = diaryCn;

      // 계산식 결과도 있으면 등록
      var calcResult = (document.getElementById('calc-result') || {}).value;
      var calcFormula = (document.getElementById('calc-formula') || {}).value;
      if (calcResult && calcResult !== 'ERR' && calcFormula) {
        await saveCalcResult(sploreReqestNo, sploreSn, exprIemSn, sn, calcFormula, calcResult);
      }

      renderExprItems(); // 목록 갱신
      // Firestore에도 exprDiarySn 포함하여 자동 저장
      try { await saveDiaryLocal(); } catch(e2) { console.warn('로컬 저장 실패:', e2); }

    console.error('일지 등록 오류:', e);
    showToast('일지 등록 실패: ' + (e.message || e), 'error');
  }

/* ============================================================
   시험기록서 — 중금속 자동계산
   ============================================================ */
function calcHeavyMetal() {
  var sampleConc = parseFloat(document.getElementById('rec-sample-conc').value) || 0;
  var blankConc = parseFloat(document.getElementById('rec-blank-conc').value) || 0;
  var finalVolume = parseFloat(document.getElementById('rec-final-volume').value) || 50;
  var dilution = parseFloat(document.getElementById('rec-dilution').value) || 1;
  var sampleWeight = parseFloat(document.getElementById('rec-sample-weight').value) || 0;
  var drinkDilution = parseFloat(document.getElementById('rec-drink-dilution').value) || 1;
  if (sampleWeight <= 0) return;

  // 단계별 계산
  var step1 = sampleConc - blankConc;                   // 농도차
  var step2 = step1 * finalVolume;                       // × 최종볼륨
  var step3 = step2 * dilution;                          // × 희석배수
  var step4 = sampleWeight * 1000;                       // 검체채취량 × 1000
  var step5 = step3 / step4;                             // 나누기
  var step6 = step5 / drinkDilution;                     // ÷ 음용희석배수
  var result = Math.max(0, step6);
  var resultStr = result < 0.01 ? '0.0' : result.toFixed(4);
  var resultDisplay = result < 0.01 ? '0.0' : result.toFixed(2);

  document.getElementById('rec-result-value').value = resultDisplay;

  var preview = '(' + sampleConc + ' - ' + blankConc + ') × ' + finalVolume + ' × ' + dilution + ' ÷ (' + sampleWeight + ' × 1000)';
  if (drinkDilution !== 1) preview += ' ÷ ' + drinkDilution;
  var previewEl = document.getElementById('rec-formula-preview');
  if (previewEl) previewEl.textContent = preview + ' = ' + resultDisplay + ' mg/kg';

  // 계산 값 검증 (단계별)
  var verifyBox = document.getElementById('rec-calc-verify');
  var stepsEl = document.getElementById('rec-verify-steps');
  if (verifyBox && stepsEl) {
    verifyBox.style.display = '';
    var sHtml = '<table style="width:100%;border-collapse:collapse;font-size:11px;font-family:monospace">';
    sHtml += '<tr style="background:#fef3c7;font-weight:600"><td style="padding:3px 6px;border-bottom:1px solid #fcd34d">단계</td><td style="padding:3px 6px;border-bottom:1px solid #fcd34d">계산</td><td style="padding:3px 6px;border-bottom:1px solid #fcd34d;text-align:right">결과</td></tr>';
    sHtml += '<tr><td style="padding:3px 6px;color:#78716c">①</td><td style="padding:3px 6px">시료(' + sampleConc + ') - Blank(' + blankConc + ')</td><td style="padding:3px 6px;text-align:right;font-weight:600;color:#0369a1">' + step1.toFixed(6) + ' µg/L</td></tr>';
    sHtml += '<tr style="background:#fffbeb"><td style="padding:3px 6px;color:#78716c">②</td><td style="padding:3px 6px">① × 최종볼륨(' + finalVolume + 'mL)</td><td style="padding:3px 6px;text-align:right;font-weight:600;color:#0369a1">' + step2.toFixed(6) + '</td></tr>';
    sHtml += '<tr><td style="padding:3px 6px;color:#78716c">③</td><td style="padding:3px 6px">② × 희석배수(' + dilution + ')</td><td style="padding:3px 6px;text-align:right;font-weight:600;color:#0369a1">' + step3.toFixed(6) + '</td></tr>';
    sHtml += '<tr style="background:#fffbeb"><td style="padding:3px 6px;color:#78716c">④</td><td style="padding:3px 6px">검체채취량(' + sampleWeight + 'g) × 1000</td><td style="padding:3px 6px;text-align:right;font-weight:600;color:#0369a1">' + step4.toFixed(4) + '</td></tr>';
    sHtml += '<tr><td style="padding:3px 6px;color:#78716c">⑤</td><td style="padding:3px 6px">③ ÷ ④ = ' + step3.toFixed(6) + ' ÷ ' + step4.toFixed(4) + '</td><td style="padding:3px 6px;text-align:right;font-weight:600;color:#0369a1">' + step5.toFixed(6) + '</td></tr>';
    if (drinkDilution !== 1) {
      sHtml += '<tr style="background:#fffbeb"><td style="padding:3px 6px;color:#78716c">⑥</td><td style="padding:3px 6px">⑤ ÷ 음용희석배수(' + drinkDilution + ')</td><td style="padding:3px 6px;text-align:right;font-weight:600;color:#0369a1">' + step6.toFixed(6) + '</td></tr>';
    }
    // 최종 결과 + 역검증
    var reverseCheck = result * sampleWeight * 1000 * drinkDilution / (finalVolume * dilution) + blankConc;
    sHtml += '<tr style="background:#dcfce7;border-top:2px solid #16a34a"><td style="padding:4px 6px;font-weight:700" colspan="2">최종 결과</td><td style="padding:4px 6px;text-align:right;font-size:14px;font-weight:700;color:#059669">' + resultStr + ' mg/kg</td></tr>';
    sHtml += '<tr style="background:#f0fdf4"><td style="padding:3px 6px;color:#78716c">검증</td><td style="padding:3px 6px;font-size:10px">역산 시료농도 = 결과×채취량×1000÷볼륨+Blank</td><td style="padding:3px 6px;text-align:right;font-weight:600;color:' + (Math.abs(reverseCheck - sampleConc) < 0.0001 ? '#16a34a' : '#dc2626') + '">' + reverseCheck.toFixed(6) + ' µg/L ' + (Math.abs(reverseCheck - sampleConc) < 0.0001 ? '✅' : '⚠️') + '</td></tr>';
    sHtml += '</table>';
    stepsEl.innerHTML = sHtml;
  }

  // 선택된 항목의 기준값 사용
  var itemInfo = getRecItemInfo();
  var maxVal = itemInfo.limit;
  var judgmentEl = document.getElementById('rec-judgment');
  if (judgmentEl) {
    judgmentEl.value = (result <= maxVal || resultDisplay === '0.0') ? '적합' : '부적합';
    judgmentEl.style.color = (result <= maxVal || resultDisplay === '0.0') ? '#10b981' : '#ef4444';
  }
}
