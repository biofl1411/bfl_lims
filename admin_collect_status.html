<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 갱신 현황 - BioFoodLab 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --border: #e2e6ed;
  --text: #1a2332;
  --text2: #5f6b7a;
  --text3: #8892a4;
  --primary: #1a73e8;
  --primary-light: #e8f0fe;
  --success: #0d9f6e;
  --success-light: #def7ec;
  --warning: #f59e0b;
  --warning-light: #fef3c7;
  --danger: #e53e3e;
  --danger-light: #fee2e2;
  --cat-biz: #4f46e5;
  --cat-prd: #0891b2;
  --cat-mat: #16a34a;
  --cat-chg: #d97706;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 4px 14px rgba(0,0,0,.1);
  --radius: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

/* ─── Sidebar Layout ─── */
.app-layout { display:flex; min-height:100vh; }
.main-wrapper { flex:1; margin-left:250px; min-height:100vh; }
@media(max-width:768px) { .main-wrapper { margin-left:0; } }

.header {
  background: linear-gradient(135deg, #1a2332 0%, #2d3a4a 100%);
  color: #fff;
  padding: 24px 32px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,.15);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -.3px;
}
.header h1 span { color: #90caf9; font-weight: 400; }
.header-actions { display: flex; gap: 10px; align-items: center; }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
}
.btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-outline {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,.35);
  color: #fff;
}
.btn-outline:hover { border-color: #fff; background: rgba(255,255,255,.1); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 32px 60px;
}

/* ─── Summary Cards ─── */
.summary-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.summary-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  text-align: center;
}
.summary-card .num {
  font-size: 28px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.2;
}
.summary-card .label {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
}
.summary-card.completed .num { color: var(--success); }
.summary-card.progress .num { color: var(--warning); }
.summary-card.waiting .num { color: var(--text3); }

/* ─── API Table ─── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: visible;
  margin-bottom: 24px;
}
.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-header h2 {
  font-size: 15px;
  font-weight: 600;
}

.api-table {
  width: 100%;
  min-width: 1150px;
  border-collapse: collapse;
}
.api-table th {
  background: #f8f9fb;
  padding: 8px 10px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.api-table td {
  padding: 10px 10px;
  font-size: 12px;
  border-bottom: 1px solid #f0f2f5;
  vertical-align: middle;
  white-space: nowrap;
}
.api-table tr:hover td { background: #fafbfc; }

.api-id {
  font-family: 'Consolas', 'Monaco', monospace;
  font-size: 12px;
  background: #f0f2f5;
  padding: 2px 8px;
  border-radius: 4px;
  color: var(--text2);
}

/* Category badges */
.cat-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 600;
}
.cat-biz { background: #eef2ff; color: var(--cat-biz); }
.cat-prd { background: #ecfeff; color: var(--cat-prd); }
.cat-mat { background: #f0fdf4; color: var(--cat-mat); }
.cat-chg { background: #fffbeb; color: var(--cat-chg); }

/* Progress bar */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}
.progress-bar {
  flex: 1;
  height: 8px;
  background: #e5e7eb;
  border-radius: 4px;
  overflow: hidden;
  min-width: 80px;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width .5s ease;
}
.progress-fill.full { background: var(--success); }
.progress-fill.partial { background: var(--warning); }
.progress-fill.zero { background: #e5e7eb; }
.progress-pct {
  font-size: 12px;
  font-weight: 600;
  min-width: 42px;
  text-align: right;
}

/* Status badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
}
.status-completed { background: var(--success-light); color: var(--success); }
.status-progress { background: var(--warning-light); color: #b45309; }
.status-waiting { background: #f3f4f6; color: var(--text3); }

.count-cell {
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}

.time-cell {
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
}

/* ─── Toast ─── */
.toast {
  position: fixed;
  top: 80px;
  right: 24px;
  background: #1a2332;
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 13px;
  box-shadow: var(--shadow-lg);
  transform: translateX(120%);
  transition: transform .3s;
  z-index: 999;
}
.toast.show { transform: translateX(0); }

/* ─── Loading ─── */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--text3);
}
.loading::before {
  content: '';
  display: block;
  width: 32px;
  height: 32px;
  border: 3px solid #e5e7eb;
  border-top-color: var(--primary);
  border-radius: 50%;
  margin: 0 auto 12px;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Auto refresh indicator ─── */
.refresh-info {
  font-size: 12px;
  color: rgba(255,255,255,.6);
}

@media (max-width: 768px) {
  .container { padding: 16px; }
  .header { padding: 16px; }
  .summary-row { grid-template-columns: repeat(2, 1fr); }
  .api-table { font-size: 12px; }
  .api-table th, .api-table td { padding: 8px 10px; }
}
</style>
</head>
<body>
<div class="app-layout">
<aside class="sidebar" id="sidebar"></aside>
<script src="js/sidebar.js?v=2"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="js/firebase-init.js"></script>
<div class="main-wrapper">

<div class="header">
  <div class="header-inner">
    <h1>🔄 API 갱신 현황 <span>BioFoodLab 관리자</span></h1>
    <div class="header-actions">
      <span class="refresh-info" id="refreshInfo">30초마다 자동 갱신</span>
      <button class="btn btn-outline btn-sm" onclick="loadData()">↻ 새로고침</button>
      <button class="btn btn-success btn-sm" id="btnAutoCollect" onclick="triggerCollect('auto')">
        ▶ 자동 수집 시작
      </button>
      <a href="admin_api_settings.html" class="btn btn-outline btn-sm">← 설정으로</a>
    </div>
  </div>
</div>

<div class="container">
  <!-- Summary -->
  <div class="summary-row" id="summaryRow">
    <div class="summary-card">
      <div class="num" id="totalApis">-</div>
      <div class="label">전체 API</div>
    </div>
    <div class="summary-card completed">
      <div class="num" id="completedApis">-</div>
      <div class="label">수집 완료</div>
    </div>
    <div class="summary-card progress">
      <div class="num" id="progressApis">-</div>
      <div class="label">수집 중</div>
    </div>
    <div class="summary-card waiting">
      <div class="num" id="waitingApis">-</div>
      <div class="label">미시작</div>
    </div>
    <div class="summary-card">
      <div class="num" id="totalRecords">-</div>
      <div class="label">총 DB 건수</div>
    </div>
  </div>

  <!-- API Table -->
  <div class="card">
    <div class="card-header">
      <h2>API별 수집 현황</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary btn-sm" onclick="triggerCollect('auto')">🔄 전체 자동갱신</button>
        <button class="btn btn-warning btn-sm" onclick="triggerCollect('resume')">⏩ 이어서 수집</button>
      </div>
    </div>
    <div id="tableWrap" style="overflow-x:auto">
      <div class="loading">데이터를 불러오는 중...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// API 서버 주소 (수동 수집 트리거용만 사용)
var API_BASE = (function() {
  if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
    return 'http://localhost:5003/api';
  }
  if (location.hostname.includes('github.io')) {
    return 'https://14.7.14.31:8443/fss';
  }
  return '/fss';
})();
var refreshTimer = null;

// 16개 API 정의
var ALL_APIS = {
  'I1220':  { name: '식품제조가공업',               collection: 'fss_businesses' },
  'I2829':  { name: '즉석판매제조가공업',           collection: 'fss_businesses' },
  'I-0020': { name: '건강기능식품 전문/벤처제조업',  collection: 'fss_businesses' },
  'I1300':  { name: '축산물 가공업',                collection: 'fss_businesses' },
  'I1320':  { name: '축산물 식육포장처리업',        collection: 'fss_businesses' },
  'I2835':  { name: '식육즉석판매가공업',           collection: 'fss_businesses' },
  'I2831':  { name: '식품소분업',                   collection: 'fss_businesses' },
  'C001':   { name: '수입식품등영업신고',           collection: 'fss_businesses' },
  'I1260':  { name: '식품등수입판매업',             collection: 'fss_businesses' },
  'I1250':  { name: '식품(첨가물)품목제조보고',     collection: 'fss_products' },
  'I1310':  { name: '축산물 품목제조정보',          collection: 'fss_products' },
  'C002':   { name: '식품(첨가물)품목제조보고(원재료)', collection: 'fss_materials' },
  'C003':   { name: '건강기능식품 품목제조신고(원재료)', collection: 'fss_materials' },
  'C006':   { name: '축산물품목제조보고(원재료)',    collection: 'fss_materials' },
  'I2859':  { name: '식품업소 인허가 변경 정보',    collection: 'fss_changes' },
  'I2860':  { name: '건강기능식품업소 인허가 변경 정보', collection: 'fss_changes' },
};

var CAT_MAP = {
  'fss_businesses': { label: '업소인허가', cls: 'cat-biz' },
  'fss_products':   { label: '품목제조', cls: 'cat-prd' },
  'fss_materials':  { label: '원재료', cls: 'cat-mat' },
  'fss_changes':    { label: '변경이력', cls: 'cat-chg' },
};

function numberFormat(n) {
  if (n === null || n === undefined) return '-';
  return Number(n).toLocaleString('ko-KR');
}

function formatTime(dtStr) {
  if (!dtStr || dtStr === 'None') return '-';
  var d = new Date(dtStr.endsWith('Z') || dtStr.includes('+') ? dtStr : dtStr + 'Z');
  if (isNaN(d.getTime())) return '-';
  return d.toLocaleString('ko-KR', {
    timeZone: 'Asia/Seoul',
    month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit',
    hour12: false
  });
}

// ISO datetime → MM-DD 형식
function formatDate10(dtStr) {
  if (!dtStr) return '-';
  try {
    var d = new Date(dtStr);
    if (isNaN(d.getTime())) return '-';
    var mm = String(d.getMonth() + 1).padStart(2, '0');
    var dd = String(d.getDate()).padStart(2, '0');
    return mm + '-' + dd;
  } catch(e) { return '-'; }
}

// YYYYMMDD → YYYY-MM-DD 형식
function formatDate8d(s) {
  if (!s || s.length < 8) return s || '-';
  return s.substring(0, 4) + '-' + s.substring(4, 6) + '-' + s.substring(6, 8);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// fss_config/data_counts 문서에서 카운트 조회 (경량)
async function loadDataCounts() {
  try {
    var doc = await db.collection('fss_config').doc('data_counts').get();
    if (doc.exists) return doc.data();
    return { counts: {}, total: {} };
  } catch(e) {
    console.warn('카운트 문서 로드 실패:', e.message);
    return { counts: {}, total: {} };
  }
}

// 수집 로그 전체 조회 (소량 데이터) → API별 최신 로그 맵 생성
async function loadAllLogs() {
  try {
    var snap = await db.collection('fss_collect_log')
      .orderBy('started_at', 'desc').get();
    var latestLogs = {};
    snap.docs.forEach(function(doc) {
      var data = doc.data();
      var src = data.api_source;
      if (src && !latestLogs[src]) latestLogs[src] = data;
    });
    return latestLogs;
  } catch(e) {
    console.warn('수집 로그 조회 실패:', e.message);
    // orderBy 인덱스 없을 경우 → 인덱스 없이 재시도
    try {
      var snap2 = await db.collection('fss_collect_log').get();
      var latestLogs2 = {};
      snap2.docs.forEach(function(doc) {
        var data = doc.data();
        var src = data.api_source;
        if (!src) return;
        var existing = latestLogs2[src];
        if (!existing || (data.started_at && (!existing.started_at || data.started_at > existing.started_at))) {
          latestLogs2[src] = data;
        }
      });
      return latestLogs2;
    } catch(e2) {
      console.error('수집 로그 재시도 실패:', e2.message);
      return {};
    }
  }
}

async function loadApiFreshness() {
  try {
    var doc = await db.collection('fss_config').doc('api_freshness').get();
    if (doc.exists) return doc.data();
    return {};
  } catch(e) {
    console.warn('freshness 로드 실패:', e.message);
    return {};
  }
}

async function loadData() {
  if (!isFirebaseReady()) {
    document.getElementById('refreshInfo').textContent = 'Firebase 연결 대기 중...';
    return;
  }

  document.getElementById('refreshInfo').textContent = '데이터 로딩 중...';

  try {
    // 1. 카운트 메타데이터 + 수집 로그 + freshness를 동시에 조회
    var results = await Promise.all([loadDataCounts(), loadAllLogs(), loadApiFreshness()]);
    var dataCounts = results[0];
    var latestLogs = results[1];
    var freshness = results[2];
    var apiCounts = dataCounts.counts || {};

    var apis = [];
    var apiIds = Object.keys(ALL_APIS);

    apiIds.forEach(function(sid) {
      var info = ALL_APIS[sid];
      var dbCount = apiCounts[sid] || 0;
      var lastLog = latestLogs[sid] || null;

      var fresh = freshness[sid] || {};
      var apiData = {
        api_source: sid,
        name: info.name,
        table: info.collection,
        db_count: dbCount,
        last_api_total: lastLog ? (lastLog.total_count || 0) : 0,
        last_collect: null,
        total_count_changed_at: fresh.total_count_changed_at || '',
        latest_data_date: fresh.latest_data_date || '',
      };

      if (lastLog) {
        apiData.last_collect = {
          type: lastLog.collect_type || '',
          fetched: lastLog.fetched_count || 0,
          inserted: lastLog.inserted_count || 0,
          updated: lastLog.updated_count || 0,
          errors: lastLog.error_count || 0,
          error_msg: lastLog.error_msg || '',
          started_at: lastLog.started_at || '',
          finished_at: lastLog.finished_at || '',
          duration_sec: lastLog.duration_sec || 0,
        };
      }

      // 상태 판단
      if (dbCount === 0 && (!lastLog || !lastLog.total_count)) {
        apiData.status = 'not_started';
      } else if (lastLog && lastLog.total_count && dbCount < lastLog.total_count) {
        apiData.status = 'in_progress';
      } else {
        apiData.status = 'completed';
      }

      apis.push(apiData);
    });

    renderSummary(apis);
    renderTable(apis);
    document.getElementById('refreshInfo').textContent =
      '마지막 갱신: ' + new Date().toLocaleTimeString('ko-KR') + ' (30초마다) [Firestore]';

  } catch(e) {
    console.error('loadData 오류:', e);
    document.getElementById('refreshInfo').textContent = '⚠️ Firestore 조회 오류: ' + e.message;
  }
}

function renderSummary(apis) {
  var completed = 0, progress = 0, waiting = 0, totalRec = 0;
  apis.forEach(function(a) {
    if (a.status === 'completed') completed++;
    else if (a.status === 'in_progress') progress++;
    else waiting++;
    totalRec += a.db_count || 0;
  });
  document.getElementById('totalApis').textContent = apis.length;
  document.getElementById('completedApis').textContent = completed;
  document.getElementById('progressApis').textContent = progress;
  document.getElementById('waitingApis').textContent = waiting;
  document.getElementById('totalRecords').textContent = numberFormat(totalRec);
}

function renderTable(apis) {
  var html = '<table class="api-table">';
  html += '<thead><tr>'
    + '<th>API</th>'
    + '<th>이름</th>'
    + '<th>분류</th>'
    + '<th style="text-align:right">Firestore 건수</th>'
    + '<th style="text-align:right">API 총건수</th>'
    + '<th>진행률</th>'
    + '<th>상태</th>'
    + '<th>최근 수집</th>'
    + '<th>건수 변동일</th>'
    + '<th>최신 데이터</th>'
    + '</tr></thead><tbody>';

  apis.forEach(function(a) {
    var cat = CAT_MAP[a.table] || { label: '-', cls: '' };
    var apiTotal = a.last_api_total || 0;
    var pct = apiTotal > 0 ? Math.min(100, (a.db_count / apiTotal * 100)) : 0;
    var pctStr = apiTotal > 0 ? pct.toFixed(1) + '%' : '-';
    var fillCls = pct >= 100 ? 'full' : (pct > 0 ? 'partial' : 'zero');

    var statusHtml = '';
    if (a.status === 'completed') {
      statusHtml = '<span class="status-badge status-completed">✅ 완료</span>';
    } else if (a.status === 'in_progress') {
      statusHtml = '<span class="status-badge status-progress">🔄 수집중</span>';
    } else {
      statusHtml = '<span class="status-badge status-waiting">⬜ 미시작</span>';
    }

    var lastTime = '-';
    var duration = '-';
    if (a.last_collect) {
      lastTime = formatTime(a.last_collect.started_at);
      duration = a.last_collect.duration_sec !== null
        ? (a.last_collect.duration_sec >= 60
            ? Math.floor(a.last_collect.duration_sec/60) + '분'
            : a.last_collect.duration_sec + '초')
        : '-';
      if (a.last_collect.error_msg) {
        lastTime += ' <span style="color:var(--danger);font-size:11px;" title="'
          + a.last_collect.error_msg + '">⚠️</span>';
      }
    }

    // 건수 변동일
    var changedAt = a.total_count_changed_at ? formatDate10(a.total_count_changed_at) : '-';
    // 최신 데이터 날짜
    var latestDate = a.latest_data_date ? formatDate8d(a.latest_data_date) : '-';

    html += '<tr>'
      + '<td><span class="api-id">' + a.api_source + '</span></td>'
      + '<td>' + a.name + '</td>'
      + '<td><span class="cat-badge ' + cat.cls + '">' + cat.label + '</span></td>'
      + '<td class="count-cell" style="text-align:right">' + numberFormat(a.db_count) + '</td>'
      + '<td class="count-cell" style="text-align:right">' + numberFormat(apiTotal || null) + '</td>'
      + '<td><div class="progress-wrap">'
      +   '<div class="progress-bar"><div class="progress-fill ' + fillCls + '" style="width:' + pct + '%"></div></div>'
      +   '<span class="progress-pct">' + pctStr + '</span>'
      + '</div></td>'
      + '<td>' + statusHtml + '</td>'
      + '<td class="time-cell">' + lastTime + '</td>'
      + '<td class="time-cell">' + changedAt + '</td>'
      + '<td class="time-cell">' + latestDate + '</td>'
      + '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('tableWrap').innerHTML = html;
}

function triggerCollect(mode) {
  var btn = document.getElementById('btnAutoCollect');
  btn.disabled = true;
  btn.textContent = '⏳ 수집 실행 중...';

  fetch(API_BASE + '/admin/collect', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ mode: mode })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.success) {
      showToast('수집이 백그라운드에서 시작되었습니다 (' + mode + ')');
    } else {
      showToast('수집 시작 실패: ' + (data.error || ''));
    }
    setTimeout(function() {
      btn.disabled = false;
      btn.textContent = '▶ 자동 수집 시작';
    }, 5000);
  })
  .catch(function(e) {
    showToast('서버 오류: ' + e.message);
    btn.disabled = false;
    btn.textContent = '▶ 자동 수집 시작';
  });
}

// Firebase 준비 후 초기 로드
waitForFirebase().then(function() {
  loadData();
  refreshTimer = setInterval(loadData, 30000);
});
</script>
