server {
    listen 8443 ssl;
    server_name 192.168.0.96;

    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /home/biofl/bfl_lims;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # receipt_api: Flask routes = /api/...
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ocr_proxy: Flask routes = /api/ocr/...
    location /ocr/ {
        proxy_pass http://127.0.0.1:5002/api/ocr/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # api_server (fss): Flask routes = /api/...
    location /fss/ {
        proxy_pass http://127.0.0.1:5003/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # MFDS (food safety) API -> Tomcat LMS_CLIENT_API
    location /mfds/ {
        proxy_pass http://127.0.0.1:8080/LMS_CLIENT_API/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30;
        proxy_read_timeout 120;
    }
}
