<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioFoodLab LIMS - 입금 통계</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;height:100vh;background:#f8f9fb;font-size:13px;overflow:hidden;display:flex}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;margin-left:250px;height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e2e6ed;padding:0 24px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;color:#1a2332}
.topbar-sep{color:#c8d6e5}
.topbar-sub{font-size:13px;color:#5f6b7a}
.content{flex:1;padding:24px;overflow-y:auto}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#1a73e8;color:#fff}.btn-primary:hover{background:#1557b0}
.btn-secondary{background:#fff;color:#5f6b7a;border:1px solid #e2e6ed}.btn-secondary:hover{background:#f0f2f5}
.btn-sm{padding:5px 10px;font-size:11px}
.card{background:#fff;border-radius:12px;border:1px solid #e2e6ed;margin-bottom:16px}
.card-hd{padding:16px 20px;border-bottom:1px solid #eef0f4;display:flex;align-items:center;gap:10px}
.card-hd h3{font-size:15px;font-weight:700;color:#1a2332}
.card-hd .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.card-bd{padding:20px}
.text-right{text-align:right}
.text-center{text-align:center}

/* 탭 바 */
.tab-bar{display:flex;gap:0;border-bottom:2px solid #e2e6ed;margin-bottom:20px;background:#fff;border-radius:10px 10px 0 0;padding:0 8px}
.tab-item{padding:12px 20px;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;user-select:none}
.tab-item:hover{color:#1a73e8}
.tab-item.active{color:#1a73e8;border-bottom-color:#1a73e8}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* 필터 바 */
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;padding:10px 16px;background:#fff;border:1px solid #e2e6ed;border-radius:10px}
.filter-bar input,.filter-bar select{padding:7px 10px;border:1px solid #e2e6ed;border-radius:8px;font-size:12px;font-family:inherit}
.filter-bar input:focus,.filter-bar select:focus{outline:none;border-color:#1a73e8}
.filter-bar input[type="date"]{width:130px}

/* KPI */
.kpi-row{display:flex;gap:16px;margin-bottom:16px}
.kpi-card{flex:1;padding:16px 20px;background:#fff;border:1px solid #e2e6ed;border-radius:10px;text-align:center}
.kpi-card .kpi-label{font-size:12px;color:#6b7280;margin-bottom:4px}
.kpi-card .kpi-value{font-size:22px;font-weight:700;color:#1a2332}

/* 테이블 */
.tbl-wrap{overflow-x:auto;border:1px solid #e2e6ed;border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:#f8f9fb;position:sticky;top:0}
th{padding:8px 10px;text-align:left;font-weight:600;color:#5f6b7a;border-bottom:2px solid #e2e6ed;white-space:nowrap;font-size:11px}
td{padding:8px 10px;border-bottom:1px solid #f0f2f5;color:#1a2332}
tr:hover{background:#f8f9fb}
.row-total{background:#f8f9fb;font-weight:700}

/* 신호등 */
.traffic-light{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}
.traffic-green{background:#ecfdf5;color:#059669}
.traffic-yellow{background:#fffbeb;color:#d97706}
.traffic-orange{background:#fff7ed;color:#ea580c}
.traffic-red{background:#fef2f2;color:#dc2626}
.traffic-black{background:#1f2937;color:#fff}

/* 펼치기 행 */
.aging-parent{cursor:pointer;transition:background .15s}
.aging-parent:hover{background:#f0f4ff!important}
.aging-parent td:first-child::before{content:'▶';display:inline-block;margin-right:6px;font-size:9px;color:#9ca3af;transition:transform .2s}
.aging-parent.expanded td:first-child::before{transform:rotate(90deg);color:#1a73e8}
.aging-detail{display:none}
.aging-detail.show{display:table-row}
.aging-detail td{padding:0!important;border-bottom:2px solid #e2e6ed}
.aging-detail-inner{background:#f8f9fb;padding:10px 16px}
.aging-detail-inner .company-info{display:flex;gap:20px;margin-bottom:8px;font-size:11px;color:#5f6b7a;flex-wrap:wrap}
.aging-detail-inner .company-info span{display:inline-flex;gap:4px}
.aging-detail-inner .company-info .lbl{color:#9ca3af;font-weight:600}
.sub-tbl{width:100%;border-collapse:collapse;font-size:11px;background:#fff;border-radius:6px;overflow:hidden;border:1px solid #e2e6ed}
.sub-tbl th{padding:5px 8px;background:#eef0f4;font-size:10px;font-weight:600;color:#5f6b7a;border-bottom:1px solid #e2e6ed}
.sub-tbl td{padding:5px 8px;border-bottom:1px solid #f0f2f5;font-size:11px}
.sub-tbl tr:last-child td{border-bottom:none}

/* 결제수단 바 */
.method-bar{display:flex;height:24px;border-radius:6px;overflow:hidden;margin-bottom:4px}
.method-bar-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;min-width:20px}

/* 차트 placeholder */
.chart-wrap{width:100%;height:300px;display:flex;align-items:center;justify-content:center;background:#f8f9fb;border-radius:10px;border:1px solid #e2e6ed}

.empty-msg{text-align:center;padding:40px;color:#9ca3af}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:#1f2937;color:#fff;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;z-index:1100}
.toast.show{opacity:1}
</style>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/firestore-helpers.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="js/sidebar.js?v=4"></script>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
    <div class="topbar">
        <span class="topbar-title">재무 관리</span>
        <span class="topbar-sep">&#8250;</span>
        <span class="topbar-sub">입금 통계</span>
    </div>
    <div class="content">
        <!-- 공통 필터 -->
        <div class="filter-bar">
            <input type="date" id="filter-from">
            <span style="color:#9ca3af">~</span>
            <input type="date" id="filter-to">
            <button class="btn btn-primary" onclick="loadStats()">조회</button>
            <button class="btn btn-secondary" onclick="loadStats()">새로고침</button>
        </div>

        <!-- 탭 바 -->
        <div class="tab-bar">
            <div class="tab-item active" data-tab="aging" onclick="switchTab('aging')">결제주기</div>
            <div class="tab-item" data-tab="method" onclick="switchTab('method')">결제수단별</div>
            <div class="tab-item" data-tab="dept" onclick="switchTab('dept')">부서별</div>
            <div class="tab-item" data-tab="card" onclick="switchTab('card')">카드 수수료</div>
        </div>

        <!-- ===== 탭1: 결제주기 (신호등 UI) ===== -->
        <div class="tab-panel active" id="panel-aging">
            <!-- 결제주기 KPI (입금 패턴) -->
            <div style="margin-bottom:6px;font-size:13px;font-weight:700;color:#1a2332">결제주기 <span style="font-weight:400;font-size:11px;color:#6b7280">(접수→입금 평균 소요일수)</span></div>
            <div class="kpi-row" id="cycle-kpi"></div>
            <!-- 채권주기 KPI (미수금 에이징) -->
            <div style="margin-bottom:6px;font-size:13px;font-weight:700;color:#1a2332">채권주기 <span style="font-weight:400;font-size:11px;color:#6b7280">(미수금 경과기간)</span></div>
            <div class="kpi-row" id="aging-kpi"></div>
            <div class="card">
                <div class="card-hd"><h3>업체별 결제·채권 현황</h3></div>
                <div class="card-bd">
                    <div class="tbl-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>업체명</th>
                                    <th class="text-right">총 청구</th>
                                    <th class="text-right">입금액</th>
                                    <th class="text-right">미수금</th>
                                    <th class="text-center">결제주기</th>
                                    <th class="text-center">최종입금일</th>
                                    <th class="text-center">경과일수</th>
                                    <th class="text-center">채권주기</th>
                                </tr>
                            </thead>
                            <tbody id="aging-body">
                                <tr><td colspan="8" class="empty-msg" style="padding:30px">로딩 중...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 탭2: 결제수단별 ===== -->
        <div class="tab-panel" id="panel-method">
            <div class="kpi-row" id="method-kpi"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="card">
                    <div class="card-hd"><h3>결제수단별 분포</h3></div>
                    <div class="card-bd">
                        <canvas id="method-chart" height="250"></canvas>
                    </div>
                </div>
                <div class="card">
                    <div class="card-hd"><h3>월별 결제수단 추이</h3></div>
                    <div class="card-bd">
                        <canvas id="method-trend-chart" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-hd"><h3>상세 내역</h3></div>
                <div class="card-bd">
                    <div class="tbl-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>결제수단</th>
                                    <th class="text-right">건수</th>
                                    <th class="text-right">금액</th>
                                    <th class="text-right">비율</th>
                                    <th>분포</th>
                                </tr>
                            </thead>
                            <tbody id="method-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 탭3: 부서별 ===== -->
        <div class="tab-panel" id="panel-dept">
            <div class="kpi-row" id="dept-kpi"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div class="card">
                    <div class="card-hd"><h3>부서별 매출/입금</h3></div>
                    <div class="card-bd">
                        <canvas id="dept-chart" height="250"></canvas>
                    </div>
                </div>
                <div class="card">
                    <div class="card-hd"><h3>부서별 입금률</h3></div>
                    <div class="card-bd">
                        <canvas id="dept-rate-chart" height="250"></canvas>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-hd"><h3>상세 내역</h3></div>
                <div class="card-bd">
                    <div class="tbl-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>부서</th>
                                    <th class="text-right">접수건수</th>
                                    <th class="text-right">매출합계</th>
                                    <th class="text-right">입금합계</th>
                                    <th class="text-right">미수금</th>
                                    <th class="text-right">입금률</th>
                                </tr>
                            </thead>
                            <tbody id="dept-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===== 탭4: 카드 수수료 ===== -->
        <div class="tab-panel" id="panel-card">
            <div class="kpi-row" id="card-kpi"></div>
            <div class="card">
                <div class="card-hd">
                    <h3>카드 결제 내역 및 수수료</h3>
                    <div class="right">
                        <span style="font-size:11px;color:#6b7280">수수료율</span>
                        <input type="number" id="card-fee-rate" value="2.2" step="0.1" min="0" max="10"
                            style="width:60px;padding:5px 8px;border:1px solid #e2e6ed;border-radius:6px;font-size:12px;text-align:right"
                            onchange="renderCardStats()">
                        <span style="font-size:11px;color:#6b7280">%</span>
                    </div>
                </div>
                <div class="card-bd">
                    <div class="tbl-wrap">
                        <table>
                            <thead>
                                <tr>
                                    <th>월</th>
                                    <th class="text-right">카드결제 건수</th>
                                    <th class="text-right">카드결제 금액</th>
                                    <th class="text-right">수수료 (추정)</th>
                                    <th class="text-right">실수령 (추정)</th>
                                </tr>
                            </thead>
                            <tbody id="card-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
var _receipts = [];
var _companiesMap = {};
var _methodChart = null;
var _methodTrendChart = null;
var _deptChart = null;
var _deptRateChart = null;

// ---- 탭 전환 ----
function switchTab(tabId) {
    document.querySelectorAll('.tab-item').forEach(function(el) { el.classList.toggle('active', el.dataset.tab === tabId); });
    document.querySelectorAll('.tab-panel').forEach(function(el) { el.classList.toggle('active', el.id === 'panel-' + tabId); });
}

// ---- 초기화 ----
document.addEventListener('DOMContentLoaded', function() {
    var now = new Date();
    var y = now.getFullYear();
    document.getElementById('filter-from').value = y + '-01-01';
    document.getElementById('filter-to').value = y + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
    loadStats();
});

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function fmtMoney(n) { return (n||0).toLocaleString('ko-KR') + '원'; }

// ---- 데이터 로드 ----
async function loadStats() {
    try {
        // 업체 정보 로드 (첫 1회)
        if (Object.keys(_companiesMap).length === 0) {
            try {
                var cSnap = await db.collection('companies').get();
                cSnap.forEach(function(doc) {
                    var cd = doc.data();
                    var name = cd.companyName || cd.name || '';
                    if (name) _companiesMap[name] = cd;
                });
            } catch(e) { console.log('companies 로드 생략:', e.message); }
        }

        var snap = await db.collection('receipts').orderBy('createdAt', 'desc').limit(1000).get();
        _receipts = [];
        snap.forEach(function(doc) { _receipts.push({ id: doc.id, data: doc.data() }); });

        var from = document.getElementById('filter-from').value;
        var to = document.getElementById('filter-to').value;
        _receipts = _receipts.filter(function(r) {
            var d = r.data.receiptDate || '';
            return d >= from && d <= to;
        });

        renderAgingStats();
        renderMethodStats();
        renderDeptStats();
        renderCardStats();
    } catch(e) {
        console.error('통계 로드 실패:', e);
        showToast('로드 실패: ' + e.message);
    }
}

function _getTotalFee(d) { return Number(d.discountFinalPrice || d.feeTotal || d.feeOriginal || d.totalFee || d.totalAmount || 0); }
function _getPaidAmount(d) {
    var s = 0;
    (d.payments || []).forEach(function(p) { s += Number(p.amount || 0); });
    return s;
}
function _getLastPayDate(d) {
    var payments = d.payments || [];
    if (!payments.length) return '';
    var dates = payments.map(function(p){ return p.date || ''; }).filter(Boolean).sort();
    return dates.length ? dates[dates.length-1] : '';
}

// ---- 탭1: 결제주기 + 채권주기 ----
function renderAgingStats() {
    var companyMap = {};
    var today = new Date();

    _receipts.forEach(function(r) {
        var d = r.data;
        var company = d.companyName || d.company || '(미상)';
        if (!companyMap[company]) companyMap[company] = {
            total: 0, paid: 0, lastPay: '', oldestReceipt: '', receipts: [],
            bizNo: '', tel: '', manager: '', email: '', companyId: '', address: '',
            payDaysSum: 0, payDaysCount: 0 // 결제주기 계산용
        };
        var fee = _getTotalFee(d);
        var paid = _getPaidAmount(d);
        companyMap[company].total += fee;
        companyMap[company].paid += paid;

        // 업체 정보 (접수 데이터에서 + companies 컬렉션에서 보완)
        var ci = _companiesMap[company] || {};
        if (!companyMap[company].bizNo) companyMap[company].bizNo = d.businessNo || d.bizNo || ci.businessNo || ci.bizNo || '';
        if (!companyMap[company].tel) companyMap[company].tel = d.companyTel || d.tel || d.phone || ci.tel || ci.phone || ci.companyTel || '';
        if (!companyMap[company].manager) companyMap[company].manager = d.managerName || d.manager || d.contactPerson || ci.manager || ci.managerName || ci.contactPerson || '';
        if (!companyMap[company].email) companyMap[company].email = d.email || ci.email || '';
        if (!companyMap[company].companyId) companyMap[company].companyId = d.companyId || d.companyCode || ci.companyId || ci.companyCode || '';
        if (!companyMap[company].address) companyMap[company].address = ci.address || ci.companyAddress || d.companyAddress || '';

        // 결제주기 계산: 접수일 → 최초입금일까지 소요일수
        var rd = d.receiptDate || '';
        var payments = d.payments || [];
        if (rd && payments.length > 0) {
            var firstPayDate = '';
            payments.forEach(function(p) {
                var pd = p.date || '';
                if (pd && (!firstPayDate || pd < firstPayDate)) firstPayDate = pd;
            });
            if (firstPayDate && firstPayDate >= rd) {
                var diffDays = Math.floor((new Date(firstPayDate) - new Date(rd)) / 86400000);
                companyMap[company].payDaysSum += diffDays;
                companyMap[company].payDaysCount++;
            }
        }

        // 접수 건별 정보
        var remain = Math.max(0, fee - paid);
        var lp = _getLastPayDate(d);
        if (lp > companyMap[company].lastPay) companyMap[company].lastPay = lp;

        // 미수금이 있는 접수 중 가장 오래된 접수일 추적
        if (remain > 0 && rd) {
            if (!companyMap[company].oldestReceipt || rd < companyMap[company].oldestReceipt) {
                companyMap[company].oldestReceipt = rd;
            }
        }

        companyMap[company].receipts.push({
            id: r.id,
            receiptNo: d.receiptNo || r.id,
            receiptDate: d.receiptDate || '',
            productName: d.productName || d.sampleName || '',
            purpose: d.purpose || d.testPurpose || '',
            department: d.department || d.salesDept || '',
            fee: fee,
            paid: paid,
            remain: remain,
            lastPay: lp,
            payCount: (d.payments || []).length,
            status: d.status || d.receiptStatus || ''
        });
    });

    var rows = Object.keys(companyMap).map(function(name) {
        var c = companyMap[name];
        var unpaid = Math.max(0, c.total - c.paid);
        var days = 0;
        var daysBase = '';
        if (c.lastPay) {
            days = Math.floor((today - new Date(c.lastPay)) / 86400000);
            daysBase = 'pay';
        } else if (unpaid > 0 && c.oldestReceipt) {
            days = Math.floor((today - new Date(c.oldestReceipt)) / 86400000);
            daysBase = 'receipt';
        } else if (unpaid > 0) {
            days = 999;
            daysBase = 'unknown';
        }
        // 결제주기 평균 (접수→입금 소요일)
        var avgPayDays = c.payDaysCount > 0 ? Math.round(c.payDaysSum / c.payDaysCount) : -1;
        return {
            name: name, total: c.total, paid: c.paid, unpaid: unpaid,
            lastPay: c.lastPay, days: days, daysBase: daysBase,
            oldestReceipt: c.oldestReceipt, receipts: c.receipts,
            avgPayDays: avgPayDays, payDaysCount: c.payDaysCount,
            bizNo: c.bizNo, tel: c.tel, manager: c.manager, email: c.email, companyId: c.companyId, address: c.address
        };
    }).filter(function(r) { return r.unpaid > 0; })
      .sort(function(a, b) { return b.days - a.days; });

    // ── 결제주기 KPI (입금 패턴: 접수→입금 평균 소요일) ──
    var allCompanies = Object.keys(companyMap);
    var cy30 = 0, cy60 = 0, cy90 = 0, cy180 = 0, cy270 = 0, cy365 = 0, cyOver = 0, cyNone = 0;
    var totalAvgDays = 0, totalAvgCount = 0;
    allCompanies.forEach(function(name) {
        var c = companyMap[name];
        if (c.payDaysCount === 0) { cyNone++; return; }
        var avg = Math.round(c.payDaysSum / c.payDaysCount);
        totalAvgDays += avg;
        totalAvgCount++;
        if (avg <= 30) cy30++;
        else if (avg <= 60) cy60++;
        else if (avg <= 90) cy90++;
        else if (avg <= 180) cy180++;
        else if (avg <= 270) cy270++;
        else if (avg <= 365) cy365++;
        else cyOver++;
    });
    var overallAvg = totalAvgCount > 0 ? Math.round(totalAvgDays / totalAvgCount) : 0;

    document.getElementById('cycle-kpi').innerHTML =
        '<div class="kpi-card"><div class="kpi-label">평균 결제주기</div><div class="kpi-value" style="color:#1a73e8">' + (overallAvg > 0 ? overallAvg + '일' : '-') + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">30일 이내</div><div class="kpi-value" style="color:#059669">' + cy30 + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">31~60일</div><div class="kpi-value" style="color:#2563eb">' + cy60 + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">61~90일</div><div class="kpi-value" style="color:#d97706">' + cy90 + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">~6개월</div><div class="kpi-value" style="color:#ea580c">' + cy180 + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">~9개월</div><div class="kpi-value" style="color:#dc2626">' + cy270 + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">~12개월</div><div class="kpi-value" style="color:#9333ea">' + cy365 + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">12개월+</div><div class="kpi-value" style="color:#fff;background:#1f2937;border-radius:6px;padding:2px 8px;display:inline-block">' + cyOver + '</div></div>';

    // ── 채권주기 KPI (미수금 에이징) ──
    var m3 = 0, m6 = 0, m9 = 0, m12 = 0, mOver = 0;
    var totalUnpaid = 0;
    var m3Amt = 0, m6Amt = 0, m9Amt = 0, m12Amt = 0, mOverAmt = 0;
    rows.forEach(function(r) {
        totalUnpaid += r.unpaid;
        if (r.days <= 90) { m3++; m3Amt += r.unpaid; }
        else if (r.days <= 180) { m6++; m6Amt += r.unpaid; }
        else if (r.days <= 270) { m9++; m9Amt += r.unpaid; }
        else if (r.days <= 365) { m12++; m12Amt += r.unpaid; }
        else { mOver++; mOverAmt += r.unpaid; }
    });

    document.getElementById('aging-kpi').innerHTML =
        '<div class="kpi-card"><div class="kpi-label">미수 업체수</div><div class="kpi-value" style="color:#ef4444">' + rows.length + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">미수금 합계</div><div class="kpi-value" style="color:#ef4444;font-size:18px">' + fmtMoney(totalUnpaid) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">3개월 이내</div><div class="kpi-value" style="color:#059669">' + m3 + '</div><div style="font-size:11px;color:#6b7280;margin-top:2px">' + fmtMoney(m3Amt) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">3~6개월</div><div class="kpi-value" style="color:#d97706">' + m6 + '</div><div style="font-size:11px;color:#6b7280;margin-top:2px">' + fmtMoney(m6Amt) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">6~9개월</div><div class="kpi-value" style="color:#ea580c">' + m9 + '</div><div style="font-size:11px;color:#6b7280;margin-top:2px">' + fmtMoney(m9Amt) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">9~12개월</div><div class="kpi-value" style="color:#dc2626">' + m12 + '</div><div style="font-size:11px;color:#6b7280;margin-top:2px">' + fmtMoney(m12Amt) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">12개월 초과</div><div class="kpi-value" style="color:#fff;background:#1f2937;border-radius:6px;padding:2px 8px;display:inline-block">' + mOver + '</div><div style="font-size:11px;color:#6b7280;margin-top:2px">' + fmtMoney(mOverAmt) + '</div></div>';

    var tbody = document.getElementById('aging-body');
    if (rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-msg">미수금 업체가 없습니다</td></tr>';
        return;
    }

    var html = '';
    rows.forEach(function(r, idx) {
        var light = getTrafficLight(r.days);
        var unpaidReceipts = r.receipts.filter(function(rc) { return rc.remain > 0; });
        var receiptCount = unpaidReceipts.length;

        // 경과일수 표시
        var daysText = r.days + '일';
        var daysTitle = '';
        if (r.daysBase === 'pay') {
            daysTitle = '최종입금일(' + r.lastPay + ') 기준';
        } else if (r.daysBase === 'receipt') {
            daysTitle = '최초접수일(' + r.oldestReceipt + ') 기준 (입금 없음)';
            daysText = r.days + '일 <span style="font-size:9px;color:#9ca3af">(접수)</span>';
        } else {
            daysText = '-';
        }

        // 결제주기 표시
        var cycleText = r.avgPayDays >= 0 ? r.avgPayDays + '일' : '<span style="color:#9ca3af">-</span>';
        var cycleColor = r.avgPayDays < 0 ? '' : r.avgPayDays <= 30 ? 'color:#059669' : r.avgPayDays <= 60 ? 'color:#2563eb' : r.avgPayDays <= 90 ? 'color:#d97706' : 'color:#ef4444';
        var cycleTitle = r.payDaysCount > 0 ? '입금 ' + r.payDaysCount + '건 기준 평균' : '입금 이력 없음';

        // 업체 요약 행
        html += '<tr class="aging-parent" onclick="toggleAgingDetail(' + idx + ')" id="aging-row-' + idx + '">' +
            '<td style="font-weight:600">' + r.name +
                '<span style="color:#9ca3af;font-weight:400;font-size:11px;margin-left:6px">' + receiptCount + '건</span>' +
            '</td>' +
            '<td class="text-right">' + fmtMoney(r.total) + '</td>' +
            '<td class="text-right" style="color:#2563eb">' + fmtMoney(r.paid) + '</td>' +
            '<td class="text-right" style="color:#ef4444;font-weight:600">' + fmtMoney(r.unpaid) + '</td>' +
            '<td class="text-center" style="font-weight:600;' + cycleColor + '" title="' + cycleTitle + '">' + cycleText + '</td>' +
            '<td class="text-center">' + (r.lastPay || '<span style="color:#9ca3af">없음</span>') + '</td>' +
            '<td class="text-center" style="font-weight:600" title="' + daysTitle + '">' + daysText + '</td>' +
            '<td class="text-center">' + light + '</td>' +
            '</tr>';

        // 상세 펼치기 행
        html += '<tr class="aging-detail" id="aging-detail-' + idx + '">' +
            '<td colspan="8">' +
            '<div class="aging-detail-inner">';

        // 업체 정보
        var infoItems = [];
        if (r.bizNo) infoItems.push('<span><span class="lbl">사업자번호</span> ' + r.bizNo + '</span>');
        if (r.tel) infoItems.push('<span><span class="lbl">연락처</span> ' + r.tel + '</span>');
        if (r.manager) infoItems.push('<span><span class="lbl">담당자</span> ' + r.manager + '</span>');
        if (r.email) infoItems.push('<span><span class="lbl">이메일</span> ' + r.email + '</span>');
        if (r.companyId) infoItems.push('<span><span class="lbl">업체코드</span> ' + r.companyId + '</span>');
        if (r.address) infoItems.push('<span><span class="lbl">주소</span> ' + r.address + '</span>');
        if (infoItems.length > 0) {
            html += '<div class="company-info">' + infoItems.join('') + '</div>';
        }

        // 미수 접수건 테이블
        html += '<table class="sub-tbl"><thead><tr>' +
            '<th>접수번호</th><th>접수일</th><th>제품명</th><th>검사목적</th><th>부서</th>' +
            '<th class="text-right">청구액</th><th class="text-right">입금액</th><th class="text-right">잔액</th>' +
            '<th class="text-center">입금횟수</th><th>최종입금일</th>' +
            '</tr></thead><tbody>';

        unpaidReceipts.sort(function(a, b) { return (a.receiptDate > b.receiptDate) ? -1 : 1; });
        unpaidReceipts.forEach(function(rc) {
            html += '<tr>' +
                '<td style="font-weight:600;color:#1a73e8">' + rc.receiptNo + '</td>' +
                '<td>' + rc.receiptDate + '</td>' +
                '<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + rc.productName + '">' + (rc.productName || '-') + '</td>' +
                '<td>' + (rc.purpose || '-') + '</td>' +
                '<td>' + (rc.department || '-') + '</td>' +
                '<td class="text-right">' + fmtMoney(rc.fee) + '</td>' +
                '<td class="text-right" style="color:#2563eb">' + fmtMoney(rc.paid) + '</td>' +
                '<td class="text-right" style="color:#ef4444;font-weight:600">' + fmtMoney(rc.remain) + '</td>' +
                '<td class="text-center">' + (rc.payCount > 0 ? rc.payCount + '회' : '-') + '</td>' +
                '<td>' + (rc.lastPay || '-') + '</td>' +
                '</tr>';
        });

        html += '</tbody></table></div></td></tr>';
    });

    tbody.innerHTML = html;
}

function toggleAgingDetail(idx) {
    var parent = document.getElementById('aging-row-' + idx);
    var detail = document.getElementById('aging-detail-' + idx);
    if (!parent || !detail) return;
    var isOpen = parent.classList.contains('expanded');
    parent.classList.toggle('expanded', !isOpen);
    detail.classList.toggle('show', !isOpen);
}

function getTrafficLight(days) {
    if (days <= 90) return '<span class="traffic-light traffic-green">3개월</span>';
    if (days <= 180) return '<span class="traffic-light traffic-yellow">6개월</span>';
    if (days <= 270) return '<span class="traffic-light traffic-orange">9개월</span>';
    if (days <= 365) return '<span class="traffic-light traffic-red">12개월</span>';
    return '<span class="traffic-light traffic-black">12개월+</span>';
}

// ---- 탭2: 결제수단별 ----
function renderMethodStats() {
    var methodMap = {};
    var monthMethodMap = {};
    var totalAmount = 0;

    _receipts.forEach(function(r) {
        (r.data.payments || []).forEach(function(p) {
            var m = p.method || '기타';
            var amt = Number(p.amount || 0);
            if (!methodMap[m]) methodMap[m] = { count: 0, amount: 0 };
            methodMap[m].count++;
            methodMap[m].amount += amt;
            totalAmount += amt;

            var mon = (p.date || '').substring(0, 7);
            if (mon) {
                if (!monthMethodMap[mon]) monthMethodMap[mon] = {};
                if (!monthMethodMap[mon][m]) monthMethodMap[mon][m] = 0;
                monthMethodMap[mon][m] += amt;
            }
        });
    });

    var methods = Object.keys(methodMap).sort(function(a, b) { return methodMap[b].amount - methodMap[a].amount; });

    document.getElementById('method-kpi').innerHTML =
        '<div class="kpi-card"><div class="kpi-label">총 입금액</div><div class="kpi-value" style="color:#2563eb">' + fmtMoney(totalAmount) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">결제수단 종류</div><div class="kpi-value">' + methods.length + '종</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">최다 수단</div><div class="kpi-value" style="font-size:16px">' + (methods[0] || '-') + '</div></div>';

    // 테이블
    var colors = { '카드': '#3b82f6', '현금': '#10b981', '계좌이체': '#f59e0b', '은행매칭': '#8b5cf6' };
    var tbody = document.getElementById('method-body');
    var html = methods.map(function(m) {
        var d = methodMap[m];
        var pct = totalAmount > 0 ? (d.amount / totalAmount * 100).toFixed(1) : 0;
        var color = colors[m] || '#6b7280';
        return '<tr>' +
            '<td><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + color + ';margin-right:6px"></span>' + m + '</td>' +
            '<td class="text-right">' + d.count.toLocaleString() + '건</td>' +
            '<td class="text-right" style="font-weight:600">' + fmtMoney(d.amount) + '</td>' +
            '<td class="text-right">' + pct + '%</td>' +
            '<td><div style="width:100%;height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden"><div style="height:100%;width:' + pct + '%;background:' + color + ';border-radius:4px"></div></div></td>' +
            '</tr>';
    }).join('');

    html += '<tr class="row-total"><td>합계</td>' +
        '<td class="text-right">' + methods.reduce(function(s,m){ return s + methodMap[m].count; }, 0).toLocaleString() + '건</td>' +
        '<td class="text-right">' + fmtMoney(totalAmount) + '</td>' +
        '<td class="text-right">100%</td><td></td></tr>';
    tbody.innerHTML = html;

    // 파이 차트
    if (_methodChart) _methodChart.destroy();
    var ctx = document.getElementById('method-chart').getContext('2d');
    _methodChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: methods,
            datasets: [{ data: methods.map(function(m){ return methodMap[m].amount; }),
                backgroundColor: methods.map(function(m){ return colors[m] || '#9ca3af'; }),
                borderWidth: 2, borderColor: '#fff' }]
        },
        options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
    });

    // 월별 추이
    var months = Object.keys(monthMethodMap).sort();
    if (_methodTrendChart) _methodTrendChart.destroy();
    var ctx2 = document.getElementById('method-trend-chart').getContext('2d');
    _methodTrendChart = new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: months,
            datasets: methods.map(function(m) {
                return {
                    label: m,
                    data: months.map(function(mon) { return (monthMethodMap[mon] && monthMethodMap[mon][m]) || 0; }),
                    backgroundColor: colors[m] || '#9ca3af'
                };
            })
        },
        options: {
            responsive: true,
            scales: { x: { stacked: true }, y: { stacked: true, ticks: { callback: function(v) { return (v/10000).toLocaleString() + '만'; } } } },
            plugins: { legend: { position: 'bottom' } }
        }
    });
}

// ---- 탭3: 부서별 ----
function renderDeptStats() {
    var deptMap = {};

    _receipts.forEach(function(r) {
        var d = r.data;
        var dept = d.department || d.salesDept || d.dept || '(미지정)';
        if (!deptMap[dept]) deptMap[dept] = { count: 0, sales: 0, paid: 0 };
        deptMap[dept].count++;
        deptMap[dept].sales += _getTotalFee(d);
        deptMap[dept].paid += _getPaidAmount(d);
    });

    var depts = Object.keys(deptMap).sort(function(a, b) { return deptMap[b].sales - deptMap[a].sales; });

    var totalSales = 0, totalPaid = 0;
    depts.forEach(function(d) { totalSales += deptMap[d].sales; totalPaid += deptMap[d].paid; });
    var totalRate = totalSales > 0 ? Math.round(totalPaid / totalSales * 100) : 0;

    document.getElementById('dept-kpi').innerHTML =
        '<div class="kpi-card"><div class="kpi-label">부서 수</div><div class="kpi-value">' + depts.length + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">총 매출</div><div class="kpi-value" style="color:#ef4444">' + fmtMoney(totalSales) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">총 입금</div><div class="kpi-value" style="color:#2563eb">' + fmtMoney(totalPaid) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">전체 입금률</div><div class="kpi-value" style="color:' + (totalRate >= 80 ? '#10b981' : '#f59e0b') + '">' + totalRate + '%</div></div>';

    var tbody = document.getElementById('dept-body');
    var html = depts.map(function(dept) {
        var d = deptMap[dept];
        var unpaid = Math.max(0, d.sales - d.paid);
        var rate = d.sales > 0 ? Math.round(d.paid / d.sales * 100) : 0;
        return '<tr>' +
            '<td style="font-weight:600">' + dept + '</td>' +
            '<td class="text-right">' + d.count.toLocaleString() + '</td>' +
            '<td class="text-right">' + fmtMoney(d.sales) + '</td>' +
            '<td class="text-right" style="color:#2563eb">' + fmtMoney(d.paid) + '</td>' +
            '<td class="text-right" style="color:#ef4444">' + fmtMoney(unpaid) + '</td>' +
            '<td class="text-right" style="font-weight:600;color:' + (rate >= 80 ? '#10b981' : rate >= 50 ? '#d97706' : '#ef4444') + '">' + rate + '%</td>' +
            '</tr>';
    }).join('');

    html += '<tr class="row-total"><td>합계</td>' +
        '<td class="text-right">' + _receipts.length.toLocaleString() + '</td>' +
        '<td class="text-right">' + fmtMoney(totalSales) + '</td>' +
        '<td class="text-right">' + fmtMoney(totalPaid) + '</td>' +
        '<td class="text-right">' + fmtMoney(Math.max(0, totalSales - totalPaid)) + '</td>' +
        '<td class="text-right">' + totalRate + '%</td></tr>';
    tbody.innerHTML = html;

    // 차트
    var deptColors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];
    if (_deptChart) _deptChart.destroy();
    var ctx = document.getElementById('dept-chart').getContext('2d');
    _deptChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: depts,
            datasets: [
                { label: '매출', data: depts.map(function(d){ return deptMap[d].sales; }), backgroundColor: '#fca5a5' },
                { label: '입금', data: depts.map(function(d){ return deptMap[d].paid; }), backgroundColor: '#93c5fd' }
            ]
        },
        options: {
            responsive: true,
            scales: { y: { ticks: { callback: function(v) { return (v/10000).toLocaleString() + '만'; } } } },
            plugins: { legend: { position: 'bottom' } }
        }
    });

    if (_deptRateChart) _deptRateChart.destroy();
    var ctx2 = document.getElementById('dept-rate-chart').getContext('2d');
    _deptRateChart = new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: depts,
            datasets: [{ label: '입금률(%)', data: depts.map(function(d){ var dd = deptMap[d]; return dd.sales > 0 ? Math.round(dd.paid/dd.sales*100) : 0; }),
                backgroundColor: depts.map(function(d, i){ return deptColors[i % deptColors.length]; }) }]
        },
        options: {
            responsive: true,
            indexAxis: 'y',
            scales: { x: { max: 100, ticks: { callback: function(v){ return v + '%'; } } } },
            plugins: { legend: { display: false } }
        }
    });
}

// ---- 탭4: 카드 수수료 ----
function renderCardStats() {
    var rate = parseFloat(document.getElementById('card-fee-rate').value) || 2.2;
    var monthMap = {};
    var totalAmt = 0, totalCount = 0;

    _receipts.forEach(function(r) {
        (r.data.payments || []).forEach(function(p) {
            if ((p.method || '').indexOf('카드') < 0) return;
            var amt = Number(p.amount || 0);
            var mon = (p.date || '').substring(0, 7);
            if (!mon) return;
            if (!monthMap[mon]) monthMap[mon] = { count: 0, amount: 0 };
            monthMap[mon].count++;
            monthMap[mon].amount += amt;
            totalAmt += amt;
            totalCount++;
        });
    });

    var months = Object.keys(monthMap).sort();
    var totalFee = Math.round(totalAmt * rate / 100);

    document.getElementById('card-kpi').innerHTML =
        '<div class="kpi-card"><div class="kpi-label">카드결제 총액</div><div class="kpi-value" style="color:#2563eb">' + fmtMoney(totalAmt) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">카드 건수</div><div class="kpi-value">' + totalCount.toLocaleString() + '건</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">수수료 합계 (추정)</div><div class="kpi-value" style="color:#ef4444">' + fmtMoney(totalFee) + '</div></div>' +
        '<div class="kpi-card"><div class="kpi-label">실수령 (추정)</div><div class="kpi-value" style="color:#10b981">' + fmtMoney(totalAmt - totalFee) + '</div></div>';

    var tbody = document.getElementById('card-body');
    if (months.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">카드 결제 내역이 없습니다</td></tr>';
        return;
    }

    var html = months.map(function(mon) {
        var d = monthMap[mon];
        var fee = Math.round(d.amount * rate / 100);
        return '<tr>' +
            '<td style="font-weight:600">' + mon + '</td>' +
            '<td class="text-right">' + d.count.toLocaleString() + '건</td>' +
            '<td class="text-right" style="font-weight:600">' + fmtMoney(d.amount) + '</td>' +
            '<td class="text-right" style="color:#ef4444">' + fmtMoney(fee) + '</td>' +
            '<td class="text-right" style="color:#10b981">' + fmtMoney(d.amount - fee) + '</td>' +
            '</tr>';
    }).join('');

    html += '<tr class="row-total"><td>합계</td>' +
        '<td class="text-right">' + totalCount.toLocaleString() + '건</td>' +
        '<td class="text-right">' + fmtMoney(totalAmt) + '</td>' +
        '<td class="text-right">' + fmtMoney(totalFee) + '</td>' +
        '<td class="text-right">' + fmtMoney(totalAmt - totalFee) + '</td></tr>';
    tbody.innerHTML = html;
}
</script>
</body>
</html>
