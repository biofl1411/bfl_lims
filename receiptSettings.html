<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioFoodLab LIMS - 접수 설정</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;height:100vh;background:#f8f9fb;font-size:13px;overflow:hidden;display:flex}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;margin-left:250px;height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e2e6ed;padding:0 24px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;color:#1a2332}
.topbar-sep{color:#c8d6e5}
.topbar-sub{font-size:13px;color:#5f6b7a}

/* 탭 */
.settings-tabs{display:flex;background:#fff;border-bottom:1px solid #e2e6ed;padding:0 24px;flex-shrink:0}
.settings-tab{padding:12px 20px;font-size:13px;font-weight:500;color:#5f6b7a;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.settings-tab:hover{color:#1a2332;background:#f8f9fb}
.settings-tab.active{color:#1a73e8;font-weight:700;border-bottom:2px solid #1a73e8}
.settings-tab .tab-icon{margin-right:6px}

/* 탭 콘텐츠 */
.tab-content{flex:1;overflow:hidden;display:none}
.tab-content.active{display:flex;flex-direction:column}
.tab-content iframe{flex:1;border:none;width:100%;height:100%}

/* 준비중 */
.tab-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#94a3b8;gap:12px}
.tab-placeholder .ph-icon{font-size:48px;opacity:.5}
.tab-placeholder .ph-title{font-size:16px;font-weight:700;color:#64748b}
.tab-placeholder .ph-desc{font-size:13px}
</style>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/firestore-helpers.js"></script>
<script src="js/sidebar.js"></script>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
    <div class="topbar">
        <span class="topbar-title">접수 관리</span>
        <span class="topbar-sep">›</span>
        <span class="topbar-sub">설정</span>
    </div>

    <div class="settings-tabs">
        <button class="settings-tab active" onclick="switchSettingsTab('notice')"><span class="tab-icon">📢</span>접수 공지</button>
        <button class="settings-tab" onclick="switchSettingsTab('mobile')"><span class="tab-icon">📱</span>모바일</button>
        <button class="settings-tab" onclick="switchSettingsTab('ledger')"><span class="tab-icon">📒</span>접수대장</button>
        <button class="settings-tab" onclick="switchSettingsTab('stats')"><span class="tab-icon">📊</span>접수 통계</button>
        <button class="settings-tab" onclick="switchSettingsTab('ocrtpl')"><span class="tab-icon">🎯</span>OCR 템플릿</button>
    </div>

    <!-- 접수 공지 (iframe) -->
    <div class="tab-content active" id="tab-notice">
        <iframe src="receiptNotice.html?embed=1" id="iframe-notice"></iframe>
    </div>

    <!-- 모바일 설정 -->
    <div class="tab-content" id="tab-mobile">
        <iframe src="mobilePhoto.html?embed=1" id="iframe-mobile"></iframe>
    </div>

    <!-- 접수대장 (준비중) -->
    <div class="tab-content" id="tab-ledger">
        <div class="tab-placeholder">
            <div class="ph-icon">📒</div>
            <div class="ph-title">접수대장</div>
            <div class="ph-desc">준비중입니다</div>
        </div>
    </div>

    <!-- 접수 통계 (준비중) -->
    <div class="tab-content" id="tab-stats">
        <div class="tab-placeholder">
            <div class="ph-icon">📊</div>
            <div class="ph-title">접수 통계</div>
            <div class="ph-desc">준비중입니다</div>
        </div>
    </div>

    <!-- OCR 템플릿 관리 -->
    <div class="tab-content" id="tab-ocrtpl">
        <iframe src="ocrTemplateManager.html?embed=1" id="iframe-ocrtpl"></iframe>
    </div>
</div>

<script>
function switchSettingsTab(tabName) {
    document.querySelectorAll('.settings-tab').forEach(function(btn) {
        btn.classList.remove('active');
    });
    document.querySelectorAll('.tab-content').forEach(function(pane) {
        pane.classList.remove('active');
    });
    // 클릭한 탭 활성화
    event.currentTarget.classList.add('active');
    document.getElementById('tab-' + tabName).classList.add('active');
}

// URL 파라미터로 탭 지정
var urlParams = new URLSearchParams(window.location.search);
var initTab = urlParams.get('tab');
if (initTab) {
    var tabBtn = document.querySelector('.settings-tab[onclick*="' + initTab + '"]');
    if (tabBtn) tabBtn.click();
}
</script>
</body>
</html>
