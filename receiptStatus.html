<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioFoodLab LIMS - 접수 현황</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;height:100vh;background:#f8f9fb;font-size:13px;overflow:hidden;display:flex}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;margin-left:250px;height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e2e6ed;padding:0 24px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;color:#1a2332}
.topbar-sep{color:#c8d6e5}
.topbar-sub{font-size:13px;color:#5f6b7a}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#1a73e8;color:#fff}.btn-primary:hover{background:#1557b0}
.btn-secondary{background:#fff;color:#5f6b7a;border:1px solid #e2e6ed}.btn-secondary:hover{background:#f0f2f5}
.btn-sm{padding:6px 12px;font-size:11px}

/* 필터바 */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.filter-bar input,.filter-bar select{padding:8px 12px;border:1px solid #e2e6ed;border-radius:8px;font-size:12px;font-family:inherit}

/* 테이블 */
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:#f8f9fb;padding:10px 8px;text-align:left;font-weight:600;color:#344054;border-bottom:2px solid #e2e6ed;white-space:nowrap;cursor:grab;user-select:none;position:sticky;top:0;z-index:2}
.tbl th:active{cursor:grabbing}
.tbl th:hover{background:#eef0f4}
.tbl th.drag-over-left{border-left:3px solid #1a73e8}
.tbl th.drag-over-right{border-right:3px solid #1a73e8}
.tbl th .sort-icon{font-size:10px;color:#c8d6e5;margin-left:2px}
.tbl th.sorted-asc .sort-icon,.tbl th.sorted-desc .sort-icon{color:#1a73e8}
.tbl td{padding:10px 8px;border-bottom:1px solid #f0f2f5;white-space:nowrap;color:#344054}
.tbl tr:hover{background:#f0f6ff}
.tbl tr{cursor:pointer;transition:background .1s}

/* 태그 */
.tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.tag-complete{background:#e8f5e9;color:#2e7d32}
.tag-inprogress{background:#e3f2fd;color:#1565c0}
.tag-waiting{background:#f3e5f5;color:#7b1fa2}
.tag-vip{background:linear-gradient(135deg,#ff6b35,#f7c948);color:#fff}
.tag-a{background:#e3f2fd;color:#1565c0}
.tag-b{background:#f1f1f1;color:#555}
.tag-c{background:#fce4ec;color:#c62828}

/* 컬럼 설정 */
.col-settings-wrap{position:relative}
.col-settings-panel{display:none;position:absolute;right:0;top:100%;background:#fff;border:1px solid #e2e6ed;border-radius:10px;padding:12px;width:220px;z-index:100;box-shadow:0 4px 12px rgba(0,0,0,.08);max-height:400px;overflow-y:auto}
.col-settings-panel.active{display:block}
.col-settings-panel label{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;color:#344054;cursor:pointer}

/* 페이지네이션 */
.pagination{display:flex;align-items:center;gap:4px;justify-content:center;padding:12px 0}
.pagination button{padding:6px 10px;border:1px solid #e2e6ed;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#344054;font-family:inherit}
.pagination button:hover{background:#f0f2f5}
.pagination button.active{background:#1a73e8;color:#fff;border-color:#1a73e8}
.pagination button:disabled{opacity:.4;cursor:not-allowed}
.pagination .page-info{font-size:11px;color:#5f6b7a}

/* 신호등 */
.tl{display:inline-block;width:14px;height:14px;border-radius:50%;vertical-align:middle;position:relative;cursor:default}
.tl-green{background:#4caf50}.tl-blue{background:#2196f3}.tl-yellow{background:#ffeb3b;border:1px solid #f9a825}.tl-orange{background:#ff9800}.tl-red{background:#f44336}
.tl[data-tooltip]:hover::after{content:attr(data-tooltip);position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 6px);background:#1a2332;color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;white-space:pre;z-index:999;pointer-events:none}

/* 로딩 */
.loading{text-align:center;padding:40px;color:#5f6b7a;font-size:13px}

/* 모달 (숨김 처리) */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;justify-content:center;align-items:center}
.modal{background:#fff;border-radius:12px;width:90%;max-width:720px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column}
.modal-hd{padding:16px 20px;border-bottom:1px solid #eef0f4;display:flex;align-items:center;justify-content:space-between}
.modal-hd h3{font-size:15px;font-weight:700;color:#1a2332}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#5f6b7a;padding:4px 8px}
.modal-bd{padding:20px;overflow-y:auto;flex:1}
.modal-bd .detail-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.modal-bd .detail-item{flex:0 0 calc(25% - 6px);min-width:150px}
.modal-bd .detail-item label{display:block;font-size:11px;color:#5f6b7a;margin-bottom:2px}
.modal-bd .detail-item .val{font-size:13px;color:#1a2332;font-weight:500}

/* KPI 바 */

/* 필터 존 */
#filter-zone{background:#fff;border-bottom:1px solid #e2e6ed;padding:10px 20px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
#filter-zone select{padding:8px 12px;border:1px solid #e2e6ed;border-radius:8px;font-size:12px;font-family:inherit}
.filter-row2{display:flex;gap:8px;align-items:center}
.filter-row2-right{margin-left:auto;display:flex;gap:8px;align-items:center}

/* 바디 존 */
#body-zone{flex:1;display:flex;overflow:hidden;min-height:0}
#table-zone{flex:1;overflow-y:auto;padding:16px 20px 0 20px}

/* 상세 패널 */
#detail-panel{width:360px;flex-shrink:0;border-left:1px solid #e2e6ed;background:#fff;overflow-y:auto;display:flex;flex-direction:column}
#detail-panel-empty{padding:40px 20px;text-align:center;color:#999;font-size:13px}
#detail-panel-content{display:none;flex:1;flex-direction:column}
.dp-header{padding:16px;border-bottom:1px solid #eef0f4;position:relative}
.dp-header .dp-receipt-no{font-size:15px;font-weight:700;color:#1a2332}
.dp-header .dp-status-row{margin-top:6px;display:flex;gap:8px;align-items:center}
.dp-close{position:absolute;right:12px;top:12px;background:none;border:none;font-size:18px;cursor:pointer;color:#5f6b7a;padding:4px 8px}
.dp-tabs{display:flex;border-bottom:1px solid #eef0f4;padding:0 8px;flex-wrap:nowrap;overflow-x:auto}
.dp-tab-btn{padding:8px 10px;font-size:11px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:#5f6b7a;font-family:inherit;white-space:nowrap;flex-shrink:0}
.dp-tab-btn.active{border-bottom:2px solid #1a73e8;color:#1a73e8;font-weight:600}
.dp-tab-pane{display:none;padding:16px;font-size:12px}
.dp-tab-pane.active{display:block}
.dp-grid{display:grid;grid-template-columns:100px 1fr;gap:6px 8px;margin-bottom:12px}
.dp-grid .dp-lbl{color:#5f6b7a;font-size:11px;padding:4px 0}
.dp-grid .dp-val{color:#1a2332;font-size:13px;font-weight:500;padding:4px 0}
.dp-section-title{font-size:12px;font-weight:700;color:#1a2332;margin:12px 0 8px;padding-top:8px;border-top:1px solid #eef0f4}
.dp-sample-card{border:1px solid #e2e6ed;border-radius:8px;padding:10px;margin-bottom:8px}
.dp-memo-area{width:100%;min-height:60px;border:1px solid #e2e6ed;border-radius:6px;padding:8px;font-size:12px;resize:vertical;background:#f8f9fb;font-family:inherit;transition:border-color .15s,background .15s}
.dp-memo-area[readonly]{color:#6b7a8d;cursor:default}
.dp-memo-area:not([readonly]){background:#fff;border-color:#cbd5e1}
.dp-memo-area:not([readonly]):focus{border-color:#1a73e8;outline:none;background:#fff;box-shadow:0 0 0 2px rgba(26,115,232,.1)}
.dp-memo-save-btn{padding:4px 12px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:#1a73e8;color:#fff;font-family:inherit;margin-top:4px}
.dp-memo-save-btn:hover{background:#1557b0}
.dp-memo-author{margin-top:3px;font-size:11px;color:#94a3b8}

/* 인라인 편집 */
.dp-edit-input{width:100%;padding:4px 6px;border:1px solid #d0d5dd;border-radius:4px;font-size:12px;font-family:inherit;background:#fff;color:#1a2332}
.dp-edit-input:focus{border-color:#1a73e8;outline:none;box-shadow:0 0 0 2px rgba(26,115,232,.15)}
.dp-edit-select{width:100%;padding:4px 6px;border:1px solid #d0d5dd;border-radius:4px;font-size:12px;font-family:inherit;background:#fff;color:#1a2332}
.dp-edit-btn-row{display:flex;gap:6px;justify-content:flex-end;margin-top:10px;padding-top:10px;border-top:1px solid #eef0f4}
.dp-edit-btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.dp-edit-save{background:#1a73e8;color:#fff}.dp-edit-save:hover{background:#1557b0}
.dp-edit-cancel{background:#f0f2f5;color:#5f6b7a;border:1px solid #e2e6ed}.dp-edit-cancel:hover{background:#e2e6ed}
.dp-edit-toggle{background:none;border:none;font-size:14px;cursor:pointer;padding:2px 4px;color:#5f6b7a;position:absolute;right:0;top:0}
.dp-edit-toggle:hover{color:#1a73e8}
.dp-goto-edit{display:flex;align-items:center;gap:6px;padding:10px 14px;background:#f8f9fb;border:1px solid #e2e6ed;border-radius:8px;cursor:pointer;font-size:12px;color:#344054;margin-top:12px;text-decoration:none;font-family:inherit;width:100%;justify-content:center}
.dp-goto-edit:hover{background:#e3f2fd;border-color:#1a73e8;color:#1a73e8}
</style>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/mfds-codes.js"></script>
<script src="js/sub-chip-fee.js"></script>
<script src="js/firestore-helpers.js"></script>
<script src="js/grade-calculator.js"></script>
<script src="js/toast.js"></script>
<script src="js/sidebar.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
    <div class="topbar">
        <span class="topbar-title">접수 관리</span>
        <span class="topbar-sep">›</span>
        <span class="topbar-sub">접수 현황</span>
    </div>

    <!-- 필터 존 -->
    <div id="filter-zone">
        <!-- 1열: 날짜 범위 + 빠른 날짜 버튼 -->
        <div class="filter-bar">
            <input type="date" id="filter-from" onchange="applyFilter()">
            <span style="color:#999">~</span>
            <input type="date" id="filter-to" onchange="applyFilter()">
            <button class="btn btn-secondary btn-sm" onclick="setDateRangeDays(-1)">전일</button>
            <button class="btn btn-secondary btn-sm" onclick="var t=new Date().toISOString().slice(0,10);document.getElementById('filter-from').value=t;document.getElementById('filter-to').value=t;applyFilter()">오늘</button>
            <button class="btn btn-secondary btn-sm" onclick="setDateRangeDays(7)">1주일</button>
            <button class="btn btn-secondary btn-sm" onclick="var n=new Date();document.getElementById('filter-from').value=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-01';document.getElementById('filter-to').value=n.toISOString().slice(0,10);applyFilter()">이번달</button>
            <button class="btn btn-secondary btn-sm" onclick="setDateRange(3)">3개월</button>
            <button class="btn btn-secondary btn-sm" onclick="setDateRange(6)">6개월</button>
            <button class="btn btn-secondary btn-sm" onclick="setDateRange(9)">9개월</button>
            <button class="btn btn-secondary btn-sm" onclick="setDateRange(12)">12개월</button>
            <button class="btn btn-secondary btn-sm" onclick="setDateRange(24)">2년</button>
            <button class="btn btn-secondary btn-sm" onclick="setDateRange(36)">3년</button>
            <button class="btn btn-secondary btn-sm" onclick="document.getElementById('filter-from').value='';document.getElementById('filter-to').value='';applyFilter()">전체</button>
        </div>
        <!-- 2열: 상태/분야/긴급/신호등/담당자/초기화 + 검색 + 우측 컨트롤 -->
        <div class="filter-row2">
            <select id="filter-status" onchange="applyFilter()">
                <option value="">전체 상태</option>
                <option value="대기중">대기중</option>
                <option value="접수중">접수중</option>
                <option value="접수완료">접수완료</option>
            </select>
            <select id="filter-field" onchange="applyFilter()">
                <option value="">전체 분야</option>
                <!-- 동적 로드: Firestore settings/inspectionFields -->
            </select>
            <select id="filter-urgent" onchange="applyFilter()">
                <option value="">전체 긴급</option>
                <option value="Y">긴급만</option>
                <option value="시간긴급">시간긴급</option>
                <option value="미생물긴급">미생물긴급</option>
            </select>
            <select id="filter-traffic" onchange="applyFilter()">
                <option value="">전체 신호등</option>
                <option value="red">위험(빨강)</option>
                <option value="orange">경고(주황)</option>
                <option value="yellow">주의(노랑)</option>
            </select>
            <select id="filter-rep" onchange="applyFilter()">
                <option value="">전체 담당자</option>
            </select>
            <select id="filter-pay" onchange="applyFilter()">
                <option value="">전체 결제</option>
                <option value="완납">완납</option>
                <option value="부분입금">부분입금</option>
                <option value="미입금">미입금</option>
                <option value="미결제">미결제(부분+미입금)</option>
            </select>
            <button class="btn btn-secondary btn-sm" onclick="resetFilters()">초기화</button>
            <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:0">
                <div style="position:relative;display:flex;align-items:center">
                    <input type="text" id="filter-search" placeholder="검색 후 Enter로 태그 추가..." onkeydown="onSearchKeydown(event)" oninput="applyFilter()" style="width:100%;padding:8px 32px 8px 12px;border:1px solid #e2e6ed;border-radius:8px;font-size:12px;font-family:inherit">
                    <button id="voice-btn" onclick="toggleVoiceSearch()" style="position:absolute;right:6px;background:none;border:none;cursor:pointer;font-size:16px;color:#5f6b7a;padding:2px" title="음성 검색">🎤</button>
                </div>
                <div id="search-tags" style="display:flex;flex-wrap:wrap;gap:4px;min-height:0"></div>
            </div>
            <div class="filter-row2-right">
                <span id="total-count" style="font-size:12px;color:#5f6b7a"></span>
                <button class="btn btn-secondary btn-sm" onclick="loadReceipts()">🔄 새로고침</button>
                <span id="select-count" style="font-size:12px;color:#5f6b7a;display:none">0개 선택</span>
                <button class="btn btn-sm" id="btn-delete-selected" style="background:#ef4444;color:#fff;border:none;display:none" onclick="deleteSelectedReceipts()">🗑️ 선택 삭제</button>
                <button class="btn btn-secondary btn-sm" onclick="downloadExcel()">📥 엑셀</button>
                <div class="col-settings-wrap">
                    <button class="btn btn-secondary btn-sm" onclick="toggleColSettings()" id="col-settings-btn">⚙️ 컬럼</button>
                    <div class="col-settings-panel" id="col-settings-panel"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 바디 존 -->
    <div id="body-zone">
        <div id="table-zone">
            <div id="table-scroll-wrap" style="overflow-x:hidden">
                <table class="tbl" id="receipt-table">
                    <thead id="receipt-thead"></thead>
                    <tbody id="receipt-tbody"></tbody>
                </table>
            </div>
            <!-- sticky 가로 스크롤바 -->
            <div id="sticky-hscroll" style="position:sticky;bottom:0;z-index:10;overflow-x:auto;overflow-y:hidden;height:12px;margin:0;padding:0">
                <div id="sticky-hscroll-inner" style="height:1px"></div>
            </div>
            <div id="loading" class="loading">데이터를 불러오는 중...</div>
            <div class="pagination" id="pagination"></div>
            <div id="summary-bar" style="display:none;position:sticky;bottom:0;background:#1a2332;color:#fff;padding:10px 20px;border-radius:8px 8px 0 0;align-items:center;gap:20px;font-size:13px;margin-top:8px">
                <span id="summary-count" style="font-weight:700"></span>
                <span id="summary-supply"></span>
                <span id="summary-vat"></span>
                <span id="summary-total" style="font-weight:700;color:#4fc3f7"></span>
                <button onclick="clearSelection()" style="margin-left:auto;background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px">선택 해제 (ESC)</button>
            </div>
        </div>
        <div id="detail-panel">
            <div id="detail-panel-empty">행을 클릭하면 상세 정보가 표시됩니다</div>
            <div id="detail-panel-content">
                <div class="dp-header">
                    <div class="dp-receipt-no" id="dp-receipt-no"></div>
                    <div class="dp-status-row" id="dp-status-row"></div>
                    <button class="dp-close" onclick="closeDetailPanel()">✕</button>
                </div>
                <div class="dp-tabs">
                    <button class="dp-tab-btn active" data-tab="basic" onclick="switchDpTab('basic')">기본정보</button>
                    <button class="dp-tab-btn" data-tab="sample" onclick="switchDpTab('sample')">시료정보</button>
                    <button class="dp-tab-btn" data-tab="fee" onclick="switchDpTab('fee')">수수료/결제</button>
                    <button class="dp-tab-btn" data-tab="memo" onclick="switchDpTab('memo')">메모</button>
                    <button class="dp-tab-btn" data-tab="editlog" onclick="switchDpTab('editlog')">수정이력</button>
                </div>
                <div class="dp-tab-pane active" id="dp-tab-basic"></div>
                <div class="dp-tab-pane" id="dp-tab-sample"></div>
                <div class="dp-tab-pane" id="dp-tab-fee"></div>
                <div class="dp-tab-pane" id="dp-tab-memo"></div>
                <div class="dp-tab-pane" id="dp-tab-editlog"></div>
            </div>
        </div>
    </div>

    <!-- 리사이즈 핸들 -->
    <div id="resize-handle" style="height:6px;background:#e2e6ed;cursor:row-resize;flex-shrink:0;transition:background .15s"
         onmouseover="this.style.background='#1a73e8'" onmouseout="this.style.background='#e2e6ed'"></div>

    <!-- 비교 패널 -->
    <div id="compare-zone" style="height:280px;min-height:120px;display:flex;flex-direction:row;flex-shrink:0;border-top:2px solid #3b82f6;background:#f8f9fb;overflow:hidden;margin-top:0">
        <!-- 왼쪽 패널 [A] -->
        <div id="compare-left" style="flex:1;display:flex;flex-direction:column;border-right:1px solid #e2e6ed;background:#fff;min-width:0">
            <div style="height:36px;flex-shrink:0;background:#f8f9fb;border-bottom:1px solid #e2e6ed;padding:0 12px;display:flex;align-items:center;gap:8px">
                <span style="background:#1a73e8;color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px">[A]</span>
                <span id="compare-left-title" style="font-size:12px;font-weight:600;color:#1a2332;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">클릭으로 로드</span>
                <span id="compare-left-sub" style="font-size:11px;color:#5f6b7a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1"></span>
                <button onclick="clearComparePanel('left')" style="padding:3px 8px;border:1px solid #e2e6ed;border-radius:4px;background:#fff;font-size:11px;cursor:pointer;color:#5f6b7a;flex-shrink:0">✕</button>
            </div>
            <div id="compare-left-body" style="flex:1;overflow-y:auto;overflow-x:auto">
                <div style="padding:24px;text-align:center;color:#bbb;font-size:12px">행 클릭 → [A] 패널에 검사결과 표시<br><span style="font-size:11px">Ctrl+클릭 → [B] 패널</span></div>
            </div>

<script>
// ============================================================================
// 신호등 / 등급 함수 (salesMgmt.html에서 복제)
// ============================================================================
var _cachedGradeRules = null;
var _cachedSignalRules = null;
// 복합 매칭 맵 (인허가 기준)
var _companyByBizNo = {};    // 사업자번호 → company
var _companyByLicNo = {};    // 인허가번호 → company
var _companyByLicName = {};  // 인허가영업소명 → company
var _companyByName = {};     // 회사명 → company

function getGradeRules() {
    if (_cachedGradeRules) return _cachedGradeRules;
    return JSON.parse(localStorage.getItem('bfl_grade_rules') || 'null') || {
        gradeThresholds: { vip: 90, a: 70, b: 50 },
        revenue:      { scores: [5,10,20,30,40], thresholds: [1000,3000,5000,10000] },
        frequency:    { scores: [5,10,15,20,25], thresholds: [1,3,5,10] },
        duration:     { scores: [3,6,9,12,15],   thresholds: [1,2,3,5] },
        payment:      { scores: [3,6,9,12,15] },
        department:   { scores: [1,3,5], conditions: ['지사','고객관리','고객지원팀, 마케팅사업부'] },
        receiptType:  { scores: [1,3,5], conditions: ['택배접수','방문접수','홈페이지접수'] }
    };
}

function getSignalRules() {
    if (_cachedSignalRules) return _cachedSignalRules;
    return JSON.parse(localStorage.getItem('bfl_signal_rules') || 'null') || {
        green:30, blueMin:31, blueMax:60, yellowMin:61, yellowMax:90,
        orangeMin:91, orangeMax:120, redMin:121
    };
}

/**
 * 거래처별 접수 통계 계산
 * @param {string} companyKey - 거래처 키
 * @param {Array} receipts - 전체 접수 데이터
 * @returns {{ annualRevenue: number, monthlyFrequency: number, tradeDuration: number }}
 */
function calcReceiptStats(companyKey, receipts) {
    var now = new Date();
    var oneYearAgo = new Date(now);
    oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
    var oneYearAgoStr = oneYearAgo.toISOString().slice(0, 10);

    var totalFeeLastYear = 0;   // 최근 1년 매출 합계
    var receiptDates = [];       // 모든 접수 날짜
    var monthSet = {};           // 최근 1년 월별 접수 카운트

    for (var i = 0; i < receipts.length; i++) {
        var r = receipts[i];
        var cust = findCompanyForReceipt(r);
        if (!cust) continue;
        var key = cust.id || (cust.company || '').trim();
        if (key !== companyKey) continue;

        var rd = r.receiptDate || '';
        if (rd) receiptDates.push(rd);

        // 최근 1년 매출
        if (rd >= oneYearAgoStr) {
            totalFeeLastYear += (r.feeTotal || 0);
            var ym = rd.slice(0, 7); // YYYY-MM
            monthSet[ym] = (monthSet[ym] || 0) + 1;
        }
    }

    // 연간매출액 (만원 단위)
    var annualRevenue = Math.round(totalFeeLastYear / 10000);

    // 거래빈도 (최근 1년 월평균 접수건수)
    var monthKeys = Object.keys(monthSet);
    var monthlyFrequency = monthKeys.length > 0 ? Math.round(monthKeys.reduce(function(s, k) { return s + monthSet[k]; }, 0) / monthKeys.length) : 0;

    // 거래기간 (최초 접수일 ~ 현재, 년 단위)
    var tradeDuration = 0;
    if (receiptDates.length > 0) {
        receiptDates.sort();
        var firstDate = new Date(receiptDates[0]);
        tradeDuration = Math.max(0, Math.round((now - firstDate) / (1000 * 60 * 60 * 24 * 365) * 10) / 10);
    }

    return { annualRevenue: annualRevenue, monthlyFrequency: monthlyFrequency, tradeDuration: tradeDuration };
}

/**
 * 고객 등급 점수 계산 (접수 데이터 기반)
 * @param {Object} customer - 거래처 데이터
 * @param {Object} [receiptStats] - 접수 통계 { annualRevenue, monthlyFrequency, tradeDuration }
 * @param {string} [computedTrafficLight] - 미수금 기반 계산된 신호등 (없으면 customer.trafficLight 사용)
 */
function calcCustomerScore(customer, receiptStats, computedTrafficLight) {
    var rules = getGradeRules();
    var detail = {};
    var total = 0;
    var stats = receiptStats || {};
    var tl = computedTrafficLight || customer.trafficLight || 'green';

    // 1. 연간 매출액 (접수 데이터 기반)
    var rev = rules.revenue || { scores:[5,10,20,30,40], thresholds:[1000,3000,5000,10000] };
    var revVal = stats.annualRevenue || customer.annualRevenue || 0;
    var revScore = rev.scores[0];
    for (var i = rev.thresholds.length - 1; i >= 0; i--) {
        if (revVal >= rev.thresholds[i]) { revScore = rev.scores[i + 1]; break; }
    }
    detail.revenue = { label:'연간매출액', value: Number(revVal).toLocaleString() + '만원', score: revScore, max: rev.scores[rev.scores.length-1] };
    total += revScore;
    // 2. 거래 빈도 (접수 데이터 기반)
    var freq = rules.frequency || { scores:[5,10,15,20,25], thresholds:[1,3,5,10] };
    var freqVal = stats.monthlyFrequency || customer.monthlyFrequency || 0;
    var freqScore = freq.scores[0];
    for (var i = freq.thresholds.length - 1; i >= 0; i--) {
        if (freqVal >= freq.thresholds[i]) { freqScore = freq.scores[i + 1]; break; }
    }
    detail.frequency = { label:'거래빈도', value: '월 ' + freqVal + '건', score: freqScore, max: freq.scores[freq.scores.length-1] };
    total += freqScore;
    // 3. 거래 기간 (접수 데이터 기반)
    var dur = rules.duration || { scores:[3,6,9,12,15], thresholds:[1,2,3,5] };
    var durVal = stats.tradeDuration || customer.tradeDuration || 0;
    var durScore = dur.scores[0];
    for (var i = dur.thresholds.length - 1; i >= 0; i--) {
        if (durVal >= dur.thresholds[i]) { durScore = dur.scores[i + 1]; break; }
    }
    detail.duration = { label:'거래기간', value: durVal + '년', score: durScore, max: dur.scores[dur.scores.length-1] };
    total += durScore;
    // 4. 결제 신뢰도 (미수금 기반 계산된 신호등 사용)
    var pay = rules.payment || { scores:[3,6,9,12,15] };
    var tlMap = { red:0, orange:1, yellow:2, blue:3, green:4 };
    var tlIdx = tlMap[tl] !== undefined ? tlMap[tl] : 4;
    var payScore = pay.scores[tlIdx];
    var tlLabels = { green:'정상', blue:'양호', yellow:'주의', orange:'경고', red:'위험' };
    detail.payment = { label:'결제신뢰도', value: tlLabels[tl] || '정상', score: payScore, max: pay.scores[pay.scores.length-1] };
    total += payScore;
    // 5. 담당부서
    var dept = rules.department || { scores:[1,3,5], conditions:['지사','고객관리','고객지원팀, 마케팅사업부'] };
    var custDept = customer.department || '';
    var deptScore = 0;
    for (var i = dept.conditions.length - 1; i >= 0; i--) {
        if (dept.conditions[i].indexOf(custDept) !== -1 && custDept) { deptScore = dept.scores[i]; break; }
    }
    detail.department = { label:'담당부서', value: custDept || '미지정', score: deptScore, max: dept.scores[dept.scores.length-1] };
    total += deptScore;
    // 6. 접수형태
    var rcpt = rules.receiptType || { scores:[1,3,5], conditions:['택배접수','방문접수','홈페이지접수'] };
    var custRcpt = customer.receiptType || '';
    var rcptScore = 0;
    for (var i = rcpt.conditions.length - 1; i >= 0; i--) {
        if (rcpt.conditions[i] === custRcpt) { rcptScore = rcpt.scores[i]; break; }
    }
    detail.receiptType = { label:'접수형태', value: custRcpt || '없음', score: rcptScore, max: rcpt.scores[rcpt.scores.length-1] };
    total += rcptScore;
    // 등급 판정
    var th = rules.gradeThresholds || { vip:90, a:70, b:50 };
    var grade = 'C';
    if (total >= th.vip) grade = 'VIP';
    else if (total >= th.a) grade = 'A';
    else if (total >= th.b) grade = 'B';
    return { total: total, grade: grade, detail: detail };
}

/**
 * 미수금 기반 신호등 자동 계산
 * 접수 데이터에서 미수금(수수료>0 & 결제일 없음)을 집계하여 경과일 기반 색상 결정
 * @param {Object} receivableInfo - { oldestDate: '2026-01-15', totalAmount: 712800 }
 * @returns {string} 신호등 색상 (green/blue/yellow/orange/red)
 */
function calcTrafficLight(receivableInfo) {
    if (!receivableInfo || receivableInfo.totalAmount === 0 || !receivableInfo.oldestDate) return 'green';

    // 가장 오래된 미수금 접수일로부터 경과일 계산
    var debtStart = new Date(receivableInfo.oldestDate);
    var now = new Date();
    var days = Math.floor((now - debtStart) / (1000 * 60 * 60 * 24));

    // 신호등 규칙 적용
    var rules = getSignalRules();
    if (days <= rules.green) return 'green';
    if (days <= rules.blueMax) return 'blue';
    if (days <= rules.yellowMax) return 'yellow';
    if (days <= rules.orangeMax) return 'orange';
    return 'red';
}

/**

function findCompanyForReceipt(r) {
    return _companyByBizNo[(r.bizNo || '').trim()]

}

/**

 * 없으면 원래 billCompany 반환
 */
function resolveBillCompanyName(r) {
    var bizNo = (r.bizNo || '').trim();
    if (bizNo) {
        var ci = _companyByBizNo[bizNo];
        if (ci) {
            return ci.companyName || ci.company || ci.name || r.billCompany || '';

    return r.billCompany || '';

function getTotalFee(d) {
    if (d.discountFinalPrice) return Number(d.discountFinalPrice);
    if (d.samples && d.samples.length > 0) {
        var itemSum = 0, hasItemFees = false;
        d.samples.forEach(function(s) {
            var items = s.testItems || s.refTestItems || [];
            if (Array.isArray(items)) {
                items.forEach(function(t) {
                    if (t && Number(t.fee)) { itemSum += Number(t.fee); hasItemFees = true; }
                });
            }
        });
        if (hasItemFees && itemSum > 0) return itemSum;
    }
    return Number(d.feeTotal || d.feeOriginal || d.totalFee || d.totalAmount || 0);
}

    try {
        var snap = await db.collection('users').orderBy('name').get();
        _memoUsers = [];
        snap.forEach(function(doc) {

            _memoUsers.push({ id: doc.id, name: d.name || doc.id, department: d.department || '' });

async function loadReceipts() {
    document.getElementById('loading').style.display = '';
    document.getElementById('receipt-tbody').innerHTML = '';
    try {
        // 소분류 수수료 규칙 로드
        await SUB_CHIP_FEE.load();
        // 거래처 데이터 로드 → 복합 매칭 맵 구축 (인허가 기준)
        var companies = [];
        try { companies = await fsGetCompanies({ limit: 5000 }); } catch(e) { console.warn('거래처 로드 실패:', e); }
        _companyByBizNo = {}; _companyByLicNo = {}; _companyByLicName = {}; _companyByName = {};
        companies.forEach(function(c) {
            if (c.bizNo) _companyByBizNo[c.bizNo.trim()] = c;
            var name = (c.company || c.name || '').trim();
            if (name) _companyByName[name] = c;
            (c.licenses || []).forEach(function(lic) {
                if (lic.licNo) _companyByLicNo[lic.licNo.trim()] = c;
                if (lic.licBizName) _companyByLicName[lic.licBizName.trim()] = c;
            });
        });

        var rawReceipts = await fsGetReceipts({ limit: 500 });

        // ── 1단계: 거래처별 미수금 집계 (실제 미입금액 기준) ──
        _companyReceivables = {};
        rawReceipts.forEach(function(r) {
            var cust = findCompanyForReceipt(r);
            if (!cust) return;
            var key = cust.id || (cust.company || '').trim();
            if (!_companyReceivables[key]) _companyReceivables[key] = { oldestDate: null, totalAmount: 0 };
            var fee = getTotalFee(r);
            var paidAmt = (r.payments || []).reduce(function(s, p) { return s + Number(p.amount || 0); }, 0);
            if (!paidAmt && r.payDate) paidAmt = fee; // 방안A 호환
            var unpaid = Math.max(0, fee - paidAmt);
            if (unpaid > 0) {
                _companyReceivables[key].totalAmount += unpaid;
                var rd = r.receiptDate || '';
                if (rd && (!_companyReceivables[key].oldestDate || rd < _companyReceivables[key].oldestDate)) {
                    _companyReceivables[key].oldestDate = rd;
                }
            }
        });

        // ── 2단계: 거래처별 접수 통계 계산 ──
        _companyReceiptStats = {};
        var processedKeys = {};
        rawReceipts.forEach(function(r) {
            var cust = findCompanyForReceipt(r);
            if (!cust) return;
            var key = cust.id || (cust.company || '').trim();
            if (!processedKeys[key]) {
                processedKeys[key] = true;
                _companyReceiptStats[key] = calcReceiptStats(key, rawReceipts);
            }
        });

        // ── 3단계: 시료별 행 펼침 ──
        _allReceipts = [];
        rawReceipts.forEach(function(r) {
            if (r.reportSend && Array.isArray(r.reportSend)) {
                r.reportSendText = r.reportSend.join(', ');
            }
            // 거래처 복합 매칭 → 신호등(미수금 기반)/등급(접수통계 기반)
            var cust = findCompanyForReceipt(r);
            var custKey = cust ? (cust.id || (cust.company || '').trim()) : '';
            var trafficLight = cust ? calcTrafficLight(_companyReceivables[custKey]) : '';
            // 등급: Firestore 저장 값 사용 (companyMgmt에서 계산/저장)
            var grade = cust ? (cust.grade || 'F') : '';
            // 수수료 계산 (공급가액/세액/총계)
            var ft = getTotalFee(r);
            var feeSupply = ft ? Math.round(ft / 1.1) : 0;
            var feeVat = ft ? ft - feeSupply : 0;
            // 입금 상태 계산
            var _paidAmt = (r.payments || []).reduce(function(s, p) { return s + Number(p.amount || 0); }, 0);
            if (!_paidAmt && r.payDate) _paidAmt = ft; // 방안A 호환
            var _payKey = ft > 0 ? (_paidAmt >= ft ? '완납' : _paidAmt > 0 ? '부분입금' : '미입금') : '없음';
            var _unpaid = Math.max(0, ft - _paidAmt);

            var samples = r.samples && r.samples.length > 0 ? r.samples : [{}];
            var totalCount = r.sampleTotalCount || samples.length || 1;
            samples.forEach(function(s, idx) {
                var sno = String(idx + 1).padStart(3, '0');
                var row = Object.assign({}, r);
                // serial 모드: 시료별 독립 접수번호, suffix 모드: 접미사 붙임
                if (r.sampleNoMode === 'serial' && r.allocatedSampleNos && r.allocatedSampleNos[idx]) {
                    row.receiptNo = r.allocatedSampleNos[idx];
                } else if (r.sampleNoMode === 'serial' && samples.length === 1) {
                    row.receiptNo = r.receiptNo || '';
                } else {
                    row.receiptNo = (r.receiptNo || '') + '-' + sno;
                }
                row._baseReceiptNo = r.receiptNo || '';
                row.productName = s.productName || r.productName || '';
                row.foodType = s.foodType || r.foodType || '';
                row.sampleTotalCount = totalCount;
                row._sampleIdx = idx;
                // 신호등/등급
                row.trafficLight = trafficLight;
                row.grade = grade;
                // 수수료
                row.feeSupply = feeSupply;
                row.feeVat = feeVat;
                row.feeTotal = ft;
                // 입금 상태
                row._paidAmount = _paidAmt;
                row._unpaidAmount = _unpaid;
                row._payStatusKey = _payKey;
                // 시료별 긴급여부 (시료에 개별 설정이 있으면 우선)
                var sampleUrgent = s['urgent-value'] || s.urgentValue || '';
                if (sampleUrgent) row.urgent = sampleUrgent;
                // 접수등록 누락 필드
                row.testPurpose = r.testPurpose || '';
                row.payMethod = r.payMethod || '';
                row.payDate = r.payDate || '';
                row.licNo = r.licNo || '';
                row.licBizForm = r.licBizForm || '';
                row.companyMobile = r.companyMobile || '';
                row.companyAddress = r.companyAddress || '';
                row.ceo = r.ceo || '';
                row.billName = r.billName || '';
                row.billPhone = r.billPhone || '';
                row.billEmail = r.billEmail || '';
                row.relatedLaw = r.relatedLaw || '';
                row.documentNo = r.documentNo || '';
                row.reportFaxNo = r.reportFaxNo || '';
                row.reportEmail = r.reportEmail || '';
                // 시료별 필드
                row.reportNo = s.reportNo || '';
                row.manufactureDate = s.manufactureDate || '';
                row.expiryDate = s.expiryDate || '';
                row.expiryDays = s.expiryDays || '';
                row.lotNo = s.lotNo || '';
                row.packageUnit = s.packageUnit || '';
                row.sampleCount = s.sampleCount || '';
                row.sampleReceiveMethod = s.sampleReceiveMethod || '';
                row.receiptFormType = s.receiptFormType || '';
                row.transportStatus = s.transportStatus || '';
                row.noticeRequired = s.noticeRequired || '';
                row.billingDate = r.billingDate || '';
                _allReceipts.push(row);
            });
        });
        renderRepFilter();
        applyFilter();
    } catch(err) {
        console.error('접수 현황 로드 실패:', err);
        document.getElementById('loading').textContent = '데이터 로드 실패';
    }
}

var _searchTags = [];

// 줄임 단어 → 전체 단어 매핑
var SEARCH_ALIASES = {
  // 검사목적
  '자가': '자가품질위탁검사용',
  '자가품질': '자가품질위탁검사용',
  '위탁': '위탁검사',
  '성분': '영양성분',
  '수출': '수출용',
  '수입': '수입식품',
  '관능': '관능검사',
  '미생물': '미생물검사',
  '중금속': '중금속검사',
  '농약': '농약잔류물',
  '잔농': '잔류농약',
  '식품첨가물': '식품첨가물검사',
  '방사능': '방사능검사',
  '항생': '항생물질',
  '알티': 'allergen(rt-pcr)',
  '엘라': 'allergen(elisa)',
  // 업종
  '제조': '식품제조가공업',
  '즉판': '즉석판매제조가공업',
  '축물': '축산물가공업',
  '유통': '유통판매원',
  // 긴급
  '시간': '시간긴급',
  // 신호등 (hay에 한글 라벨 포함)
  '신빨': '빨강',
  '신주': '주황',
  '신노': '노랑',
  '신초': '초록'
};

function expandAlias(val) {
  var v = val.trim().toLowerCase();
  // 정확히 일치하는 alias가 있으면 확장된 단어 포함해서 둘 다 검색
  var alias = SEARCH_ALIASES[val.trim()] || SEARCH_ALIASES[v];
  return alias ? [val.trim(), alias] : [val.trim()];
}

function onSearchKeydown(e) {
  var inp = document.getElementById('filter-search');
  var val = (inp.value || '').trim();
  if (e.key === 'Enter') {
    e.preventDefault();
    if (!val) return;
    // 중복 방지
    if (_searchTags.some(function(t) { return t.raw === val; })) { inp.value = ''; return; }
    _searchTags.push({ raw: val, terms: expandAlias(val) });
    inp.value = '';
    renderSearchTags();
    applyFilter();
  } else if (e.key === 'Backspace' && !val && _searchTags.length > 0) {
    // 입력창 비어있을 때 Backspace → 마지막 태그 제거
    _searchTags.pop();
    renderSearchTags();
    applyFilter();
  }
}

function removeSearchTag(idx) {
  _searchTags.splice(idx, 1);
  renderSearchTags();
  applyFilter();
}

function renderSearchTags() {
  var container = document.getElementById('search-tags');
  if (!container) return;
  if (_searchTags.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = _searchTags.map(function(t, i) {
    var label = t.terms.length > 1 ? t.raw + ' (' + t.terms[1] + ')' : t.raw;
    return '<span style="display:inline-flex;align-items:center;gap:4px;background:#e8f0fe;color:#1565c0;border:1px solid #bbdefb;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:600">'
      + escHtml(label)
      + '<button type="button" onclick="removeSearchTag(' + i + ')" style="background:none;border:none;cursor:pointer;color:#1565c0;font-size:13px;padding:0;line-height:1">&times;</button>'
      + '</span>';
  }).join('');
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 부분 매칭: 검색어를 2글자 단위 n-gram으로 쪼개 하나라도 포함되면 true
function fuzzyMatch(term, hay) {
  term = term.toLowerCase(); hay = hay.toLowerCase();
  if (hay.indexOf(term) >= 0) return true; // 완전 포함 우선
  if (term.length < 2) return false;
  for (var i = 0; i < term.length - 1; i++) {
    if (hay.indexOf(term.slice(i, i + 2)) >= 0) return true;
  }
  return false;
}

// ============================================================================
// 필터 + 정렬
// ============================================================================
function applyFilter() {
    var typingSearch = (document.getElementById('filter-search').value || '').toLowerCase();
    var status = document.getElementById('filter-status').value;
    var from = document.getElementById('filter-from').value;
    var to = document.getElementById('filter-to').value;
    var field = document.getElementById('filter-field').value;
    var urgentFilter = document.getElementById('filter-urgent').value;
    var trafficFilter = document.getElementById('filter-traffic').value;
    var repFilter = document.getElementById('filter-rep').value;
    var payFilter = document.getElementById('filter-pay').value;

    _filteredReceipts = _allReceipts.filter(function(r) {
        if (status && r.status !== status) return false;
        if (field && r.testField !== field) return false;
        if (payFilter) {
            if (payFilter === '미결제') { if (r._payStatusKey !== '부분입금' && r._payStatusKey !== '미입금') return false; }
            else if (r._payStatusKey !== payFilter) return false;
        }
        if (from && r.receiptDate < from) return false;
        if (to && r.receiptDate > to) return false;
        if (urgentFilter) {
            var u = r.urgent || '';
            if (urgentFilter === 'Y') { if (u !== '긴급' && u !== 'Y' && u !== '시간긴급' && u !== '미생물긴급') return false; }
            else if (u !== urgentFilter) return false;
        }
        if (trafficFilter && r.trafficLight !== trafficFilter) return false;
        if (repFilter && r.salesRep !== repFilter) return false;
        // 검색 — 태그(Enter 확정) + 입력 중인 텍스트 모두 적용
        var _tlLabel = {red:'빨강', orange:'주황', yellow:'노랑', green:'초록'}[r.trafficLight] || '';
        var hay = [
            r.receiptNo, r._baseReceiptNo, r.companyName, r.productName,
            r.foodType, r.testPurpose, r.billCompany, r.salesRep,
            r.bizNo, r.companyAddress, r.ceo, r.companyMobile,
            r.billName, r.billPhone, r.billEmail, r.documentNo,
            r.reportNo, r.lotNo, r.relatedLaw, r.testField,
            r.sampleType, r.receiptFormType, r.urgent, _tlLabel
        ].map(function(v){ return (v||'').toLowerCase(); }).join(' ');

        // 태그 검색 (AND): 모든 태그가 hay에 매칭
        for (var ti = 0; ti < _searchTags.length; ti++) {
            var terms = _searchTags[ti].terms;
            var matched = terms.some(function(term) { return fuzzyMatch(term, hay); });
            if (!matched) return false;
        }
        // 입력 중 실시간 검색 (줄임말 확장 적용)
        if (typingSearch) {
            var typingTerms = expandAlias(typingSearch);
            if (!typingTerms.some(function(term) { return fuzzyMatch(term, hay); })) return false;
        }
        return true;
    });

    // 정렬
    _filteredReceipts.sort(function(a, b) {
        var va = (a[_sortKey] || ''), vb = (b[_sortKey] || '');
        if (typeof va === 'number' && typeof vb === 'number') {
            return _sortDir === 'asc' ? va - vb : vb - va;
        }
        va = String(va); vb = String(vb);
        return _sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    });

    _page = 1;
    renderTable();
}

var _voiceRecognition = null;
var _voiceActive = false;

function toggleVoiceSearch() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('이 브라우저는 음성 인식을 지원하지 않습니다.\nChrome 브라우저를 사용해주세요.');
        return;
    }
    if (_voiceActive) {
        stopVoiceSearch();
        return;
    }
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    _voiceRecognition = new SR();
    _voiceRecognition.lang = 'ko-KR';
    _voiceRecognition.continuous = false;
    _voiceRecognition.interimResults = true;

    var btn = document.getElementById('voice-btn');
    btn.style.color = '#e53935';
    btn.textContent = '🔴';
    _voiceActive = true;

    _voiceRecognition.onresult = function(e) {
        var transcript = '';
        for (var i = e.resultIndex; i < e.results.length; i++) {
            transcript += e.results[i][0].transcript;
        }
        document.getElementById('filter-search').value = transcript;
        applyFilter();
    };
    _voiceRecognition.onend = function() {
        stopVoiceSearch();
    };
    _voiceRecognition.onerror = function(e) {
        console.warn('음성 인식 오류:', e.error);
        stopVoiceSearch();
    };
    _voiceRecognition.start();
}

function stopVoiceSearch() {
    if (_voiceRecognition) {
        try { _voiceRecognition.stop(); } catch(e) {}
        _voiceRecognition = null;
    }
    _voiceActive = false;
    var btn = document.getElementById('voice-btn');
    btn.style.color = '#5f6b7a';
    btn.textContent = '🎤';
}

function setDateRange(months) {
    var now = new Date();
    var from = new Date(now);
    from.setMonth(from.getMonth() - months);
    document.getElementById('filter-from').value = from.toISOString().slice(0,10);
    document.getElementById('filter-to').value = now.toISOString().slice(0,10);
    applyFilter();
}

// days > 0: 오늘 기준 N일 전~오늘 / days < 0: 전일(어제)만
function setDateRangeDays(days) {
    var now = new Date();
    var to, from;
    if (days < 0) {
        // 전일
        var yesterday = new Date(now);
        yesterday.setDate(yesterday.getDate() - 1);
        from = to = yesterday.toISOString().slice(0,10);
    } else {
        var fromDate = new Date(now);
        fromDate.setDate(fromDate.getDate() - days + 1);
        from = fromDate.toISOString().slice(0,10);
        to = now.toISOString().slice(0,10);
    }
    document.getElementById('filter-from').value = from;
    document.getElementById('filter-to').value = to;
    applyFilter();
}

// ============================================================================
// 헤더 드래그 앤 드롭 (컬럼 순서 변경)
// ============================================================================
var _dragColKey = null;

function initHeaderDrag(thead) {
    var ths = thead.querySelectorAll('th[draggable="true"]');
    ths.forEach(function(th) {
        th.addEventListener('dragstart', function(e) {
            _dragColKey = th.getAttribute('data-col-key');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', _dragColKey);
            th.style.opacity = '0.5';
            // 드래그 시작 시 클릭(정렬) 방지
            th.setAttribute('data-dragging', '1');
        });
        th.addEventListener('dragend', function(e) {
            th.style.opacity = '';
            _dragColKey = null;
            thead.querySelectorAll('th').forEach(function(t) {
                t.classList.remove('drag-over-left', 'drag-over-right');
            });
            setTimeout(function() { th.removeAttribute('data-dragging'); }, 50);
        });
        th.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            var rect = th.getBoundingClientRect();
            var midX = rect.left + rect.width / 2;
            thead.querySelectorAll('th').forEach(function(t) {
                t.classList.remove('drag-over-left', 'drag-over-right');
            });
            if (e.clientX < midX) {
                th.classList.add('drag-over-left');
            } else {
                th.classList.add('drag-over-right');
            }
        });
        th.addEventListener('dragleave', function(e) {
            th.classList.remove('drag-over-left', 'drag-over-right');
        });
        th.addEventListener('drop', function(e) {
            e.preventDefault();
            var fromKey = e.dataTransfer.getData('text/plain');
            var toKey = th.getAttribute('data-col-key');
            if (fromKey === toKey) return;
            // ALL_COLUMNS 배열에서 이동
            var fromIdx = ALL_COLUMNS.findIndex(function(c) { return c.key === fromKey; });
            var toIdx = ALL_COLUMNS.findIndex(function(c) { return c.key === toKey; });
            if (fromIdx < 0 || toIdx < 0) return;
            var rect = th.getBoundingClientRect();
            var midX = rect.left + rect.width / 2;
            var moved = ALL_COLUMNS.splice(fromIdx, 1)[0];
            var newToIdx = ALL_COLUMNS.findIndex(function(c) { return c.key === toKey; });
            if (e.clientX >= midX) newToIdx++;
            ALL_COLUMNS.splice(newToIdx, 0, moved);
            saveColumnOrder();
            renderTable();
        });
    });
    // 정렬 클릭과 드래그 충돌 방지: onclick에서 드래그 중이면 무시
    var origSortBy = window.sortBy;
    window.sortBy = function(key) {
        var dragging = thead.querySelector('th[data-dragging="1"]');
        if (dragging) return;
        origSortBy(key);
    };
}

function saveColumnOrder() {
    var order = ALL_COLUMNS.map(function(c) { return c.key; });
    localStorage.setItem('receiptStatus_colOrder', JSON.stringify(order));
    // visibility도 함께 저장
    var vis = {};
    ALL_COLUMNS.forEach(function(c) { vis[c.key] = c.visible; });
    localStorage.setItem('receiptStatus_columns', JSON.stringify(vis));
}

function loadColumnOrder() {
    var saved = localStorage.getItem('receiptStatus_colOrder');
    if (!saved) return;
    var order = JSON.parse(saved);
    var colMap = {};
    ALL_COLUMNS.forEach(function(c) { colMap[c.key] = c; });
    var sorted = [];
    order.forEach(function(key) {
        if (colMap[key]) { sorted.push(colMap[key]); delete colMap[key]; }
    });
    // 새로 추가된 컬럼은 뒤에 배치
    Object.keys(colMap).forEach(function(key) { sorted.push(colMap[key]); });
    ALL_COLUMNS.length = 0;
    sorted.forEach(function(c) { ALL_COLUMNS.push(c); });
}

function renderTable() {

    var thead = document.getElementById('receipt-thead');
    var hhtml = '<tr>';
    hhtml += '<th style="width:40px;text-align:center;cursor:default" onclick="event.stopPropagation()"><input type="checkbox" id="select-all-cb" onchange="toggleSelectAll()" title="전체선택"></th>';
    visibleCols.forEach(function(col, vi) {
        var cls = '';
        var icon = '↕';
        if (_sortKey === col.key) {
            cls = _sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc';
            icon = _sortDir === 'asc' ? '▲' : '▼';
        }
        hhtml += '<th class="' + cls + '" style="width:' + col.width + '" draggable="true"' +
            ' data-col-key="' + col.key + '" data-vi="' + vi + '"' +
            ' onclick="sortBy(\'' + col.key + '\')">' +
            col.label + ' <span class="sort-icon">' + icon + '</span></th>';

    var tbody = document.getElementById('receipt-tbody');
    var start = (_page - 1) * _pageSize;
    var pageData = _filteredReceipts.slice(start, start + _pageSize);
    document.getElementById('loading').style.display = 'none';

    if (pageData.length === 0) {
        var colSpan = visibleCols.length + 1;
        tbody.innerHTML = '<tr><td colspan="' + colSpan + '" style="text-align:center;padding:40px;color:#999">접수 데이터가 없습니다.</td></tr>';
        document.getElementById('total-count').textContent = '';
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    document.getElementById('total-count').textContent = '총 ' + _filteredReceipts.length + '건';

    var bhtml = '';
    pageData.forEach(function(r) {
        var baseNo = r._baseReceiptNo || r.receiptNo || '';
        // 행 색상 규칙
        var rowStyle = '';
        var isSelected = (_selectedRowId === r.id + '_' + r._sampleIdx);
        if (r.urgent === '긴급' || r.urgent === 'Y') {
            rowStyle = 'background-color:#fff5f5;';
        } else if (r.processingDeadline) {
            var dlDays = Math.ceil((new Date(r.processingDeadline) - new Date()) / 86400000);
            if (dlDays <= 2) rowStyle = 'background-color:#fff8f0;';
        } else if (r.trafficLight === 'red' || r.trafficLight === 'orange') {
            rowStyle = 'background-color:#fffde7;';
        }
        var rowKey = r.id + '_' + r._sampleIdx;
        if (isSelected) rowStyle += 'border-left:3px solid #1a73e8;';
        if (_selectedRows.has(rowKey)) rowStyle += 'background-color:#e3f2fd;';
        var rowIdx = start + pageData.indexOf(r);
        bhtml += '<tr style="' + rowStyle + '" data-row-idx="' + rowIdx + '" onclick="handleCompareClick(event,\'' + r.id + '\',' + r._sampleIdx + ')" ondblclick="openDetailPanel(\'' + r.id + '\',' + r._sampleIdx + ')">';
        var checked = _selectedRows.has(rowKey) ? 'checked' : '';
        bhtml += '<td style="text-align:center" onclick="event.stopPropagation()"><input type="checkbox" ' + checked + ' onchange="toggleRowSelect(\'' + rowKey + '\',\'' + baseNo + '\')"></td>';
        visibleCols.forEach(function(col) {
            var val = r[col.key];
            if (val === undefined || val === null) val = '';
            if (col.key === 'status') {
                var tagCls = val === '접수완료' ? 'tag-complete' : val === '접수중' ? 'tag-inprogress' : 'tag-waiting';
                val = '<span class="tag ' + tagCls + '">' + val + '</span>';
            } else if (col.key === 'trafficLight') {
                if (val) {
                    var tlLabels = {green:'정상',blue:'양호',yellow:'주의',orange:'경고',red:'위험'};
                    // 미수금 상세 정보 툴팁
                    var cust2 = findCompanyForReceipt(r);
                    var custKey2 = cust2 ? (cust2.id || (cust2.company||'').trim()) : '';
                    var recv2 = _companyReceivables[custKey2];
                    var tipText = '수금상태: ' + (tlLabels[val]||val);
                    if (recv2 && recv2.totalAmount > 0) {
                        var days2 = Math.floor((new Date() - new Date(recv2.oldestDate)) / 86400000);
                        tipText += '\n미수금: ' + recv2.totalAmount.toLocaleString() + '원\n경과: ' + days2 + '일';
                    } else {
                        tipText += '\n미수금 없음';
                    }
                    val = '<span class="tl tl-' + val + '" data-tooltip="' + tipText + '"></span>';
                } else { val = '-'; }
            } else if (col.key === 'grade') {
                val = gradeRenderBadge(val || 'C', null, null);
            } else if (col.key === 'feeSupply' || col.key === 'feeVat' || col.key === 'feeTotal') {
                val = val ? Number(val).toLocaleString() + '원' : '-';
            } else if (col.key === 'urgent') {
                if (val === '시간긴급') val = '<span style="color:#e65100;font-weight:700">🔥시간</span>';
                else if (val === '미생물긴급') val = '<span style="color:#8b5cf6;font-weight:700">🧫미생물</span>';
                else if (val === '긴급' || val === 'Y') val = '<span style="color:#e53935;font-weight:700">⚡긴급</span>';
                else val = '일반';
            } else if (col.key === 'reportSend') {
                val = r.reportSendText || '';
            } else if (col.key === 'sampleTotalCount') {
                val = val || 1;
            } else if (col.key === 'processingDeadline') {
                if (val) {
                    var days = Math.ceil((new Date(val) - new Date()) / 86400000);
                    if (days <= 0) val = '<span style="color:#e53935;font-weight:700">D+' + Math.abs(days) + '</span>';
                    else if (days <= 2) val = '<span style="color:#ff9800;font-weight:700">D-' + days + '</span>';
                    else if (days <= 7) val = '<span style="color:#f9a825;font-weight:600">D-' + days + '</span>';
                    else val = '<span style="color:#999">D-' + days + '</span>';
                } else { val = '-'; }
            } else if (col.key === 'testField') {
                var tfColors = { '축산': 'background:#fce8d5;color:#bf5700', '식품': 'background:#e0f2f1;color:#00695c', '기타': 'background:#fce4ec;color:#ad1457' };
                var tfStyle = tfColors[val] || '';
                if (tfStyle) val = '<span style="' + tfStyle + ';padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">' + val + '</span>';
            } else if (col.key === 'billCompany') {
                val = resolveBillCompanyName(r);
            } else if (col.key === 'payStatus') {
                if (r._payStatusKey === '완납') val = '✅완납';
                else if (r._payStatusKey === '부분입금') {
                    var pct = r.feeTotal > 0 ? Math.round(r._paidAmount / r.feeTotal * 100) : 0;
                    val = '<span style="color:#d97706;font-weight:700">부분(' + pct + '%)</span>';
                }
                else if (r._payStatusKey === '미입금') val = '<span style="color:#e53935;font-weight:700">미수금</span>';
                else val = '-';
            }
            bhtml += '<td>' + val + '</td>';
        });
        bhtml += '</tr>';
    });
    tbody.innerHTML = bhtml;

    // 페이지네이션
    renderPagination();
}

// ============================================================================
// 페이지네이션
// ============================================================================
function renderPagination() {
    var totalPages = Math.ceil(_filteredReceipts.length / _pageSize);
    if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
    var html = '<button ' + (_page <= 1 ? 'disabled' : '') + ' onclick="goPage(' + (_page - 1) + ')">◀</button>';
    for (var i = 1; i <= totalPages; i++) {
        if (totalPages > 7 && Math.abs(i - _page) > 2 && i !== 1 && i !== totalPages) {
            if (i === _page - 3 || i === _page + 3) html += '<span class="page-info">...</span>';
            continue;
        }
        html += '<button class="' + (i === _page ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    }
    html += '<button ' + (_page >= totalPages ? 'disabled' : '') + ' onclick="goPage(' + (_page + 1) + ')">▶</button>';
    html += '<span class="page-info" style="margin-left:8px">' + _page + ' / ' + totalPages + '</span>';
    document.getElementById('pagination').innerHTML = html;
}
function goPage(p) { _page = p; renderTable(); }

function toggleRowSelect(rowKey, baseNo) {
    if (_selectedRows.has(rowKey)) {
        _selectedRows.delete(rowKey);
    } else {
        _selectedRows.add(rowKey);
    }
    updateSummaryBar();
    renderTable();
}

function toggleSelectAll() {
    var allKeys = [];
    _filteredReceipts.forEach(function(r) {
        allKeys.push(r.id + '_' + r._sampleIdx);
    });
    if (_selectedRows.size === allKeys.length) {
        _selectedRows.clear();
    } else {
        _selectedRows.clear();
        allKeys.forEach(function(k) { _selectedRows.add(k); });
    }
    updateSummaryBar();
    renderTable();
    var cb = document.getElementById('select-all-cb');
    if (cb) cb.checked = _selectedRows.size === allKeys.length && allKeys.length > 0;
}

function updateSummaryBar() {
    var count = _selectedRows.size;
    var countEl = document.getElementById('select-count');
    var delBtn = document.getElementById('btn-delete-selected');
    var bar = document.getElementById('summary-bar');

    if (count > 0) {
        if (countEl) { countEl.style.display = ''; countEl.textContent = count + '개 선택'; }
        if (delBtn) delBtn.style.display = '';
    } else {
        if (countEl) countEl.style.display = 'none';
        if (delBtn) delBtn.style.display = 'none';
    }

    // 하단 합계바
    if (!bar) return;
    if (count === 0) {
        bar.style.display = 'none';
        return;
    }
    bar.style.display = 'flex';
    var sumSupply = 0, sumVat = 0, sumTotal = 0;
    _filteredReceipts.forEach(function(r) {
        var rk = r.id + '_' + r._sampleIdx;
        if (_selectedRows.has(rk)) {
            sumSupply += (r._sampleIdx === 0 ? (r.feeSupply || 0) : 0);
            sumVat    += (r._sampleIdx === 0 ? (r.feeVat    || 0) : 0);
            sumTotal  += (r._sampleIdx === 0 ? (r.feeTotal  || 0) : 0);
        }
    });
    document.getElementById('summary-count').textContent = count + '건 선택';
    document.getElementById('summary-supply').textContent = '공급가액: ' + sumSupply.toLocaleString() + '원';
    document.getElementById('summary-vat').textContent = '세액: ' + sumVat.toLocaleString() + '원';
    document.getElementById('summary-total').textContent = '총계: ' + sumTotal.toLocaleString() + '원';
}

function clearSelection() {
    _selectedRows.clear();
    _lastSelectedIdx = -1;
    var cb = document.getElementById('select-all-cb');
    if (cb) cb.checked = false;
    updateSummaryBar();
    renderTable();
}

async function deleteSelectedReceipts() {
    if (_selectedRows.size === 0) {
        showToast('삭제할 접수건을 선택하세요', 'warning');
        return;
    }
    // 선택된 행에서 고유 접수번호 추출
    var baseNos = [];
    _filteredReceipts.forEach(function(r) {
        var rk = r.id + '_' + r._sampleIdx;
        var bno = r._baseReceiptNo || r.receiptNo || '';
        if (_selectedRows.has(rk) && bno && baseNos.indexOf(bno) === -1) baseNos.push(bno);
    });
    if (!confirm(baseNos.length + '개 접수건을 삭제하시겠습니까?\n\n' + baseNos.join(', ') + '\n\n⚠️ 관련 검사결과도 함께 삭제됩니다.')) return;

    try {
        for (var i = 0; i < baseNos.length; i++) {
            var receiptNo = baseNos[i];
            // 쿼리 기반 삭제
            {
                var snap = await db.collection('receipts').where('receiptNo', '==', receiptNo).get();
                for (var k = 0; k < snap.docs.length; k++) {
                    await snap.docs[k].ref.delete();
                }
            }
            // 관련 testResults 삭제
            await fsDeleteTestResultsByReceiptNo(receiptNo);
        }
        showToast(baseNos.length + '개 접수건이 삭제되었습니다', 'success');
        clearSelection();
        loadReceipts();
    } catch(e) {
        console.error('삭제 오류:', e);
        showToast('삭제 실패: ' + (e.message || e), 'error');
    }
}

        if (!text) return '';

            line = line.trim();

            return /\([^)]+\)$/.test(line) ? line : (line + (fallbackBy ? '(' + fallbackBy + ')' : ''));

              existText.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</div>'

        return '<div style="margin-bottom:16px">' +
            '<div style="display:flex;align-items:center;margin-bottom:4px">' +

    }

    var memoHtml = '';

    // 접수메모
    var _recDisplayText = _annotateLines(_receiptMemoText, _memoBy);
    memoHtml += _buildMemoSection('receipt',
        '접수메모 <span style="color:#94a3b8;font-weight:400">(고객지원팀)</span>',

    ];

    // 사용자 목록 로드 후 셀렉트 채우기

            { key: 'receipt',      dept: '고객지원팀' },

// 보고번호 동적 조회 (상세 페이지용)
async function _fetchReportNoForDetail(licNoRaw, productName) {
    try {
        var licNo = (licNoRaw || '').replace(/[^0-9]/g, '');
        if (!licNo || !productName) return;
        var snap = await db.collection('fss_products').where('lcns_no', '==', licNo).get();
        if (snap.empty) return;
        var normalizedInput = productName.replace(/\s/g, '').toLowerCase();
        var matched = null;
        snap.forEach(function(doc) {
            var d = doc.data();
            var prdName = (d.prdlst_nm || '').replace(/\s/g, '').toLowerCase();
            if (prdName === normalizedInput || prdName.indexOf(normalizedInput) >= 0 || normalizedInput.indexOf(prdName) >= 0) {
                if (!matched || (d.prms_dt || '') > (matched.prms_dt || '')) matched = d;
            }
        });
        if (matched && matched.prdlst_report_no) {
            var el = document.getElementById('dp-sf-reportNo');
            if (el) el.textContent = matched.prdlst_report_no;
        }
    } catch(e) { console.warn('[보고번호 조회]', e.message); }
}

// 이전 접수 시료 비교 (자가품질위탁검사용)
// ============================================================================
var _dismissedWarnings = {}; // 해제된 경고 { 'receiptNo_fieldKey': true }

function comparePrevReceipt(companyName, productName, currentReceiptNo, fields) {
    // 같은 거래처 + 같은 제품명의 이전 접수 찾기 (메모리 캐시에서)
    var prevSample = null;
    var prevReceiptNo = '';
    var candidates = _allReceipts
        .filter(function(x) {
            return x.companyName === companyName
                && (x._baseReceiptNo || x.receiptNo) !== currentReceiptNo
                && x.testPurpose === '자가품질위탁검사용';
        })
        .sort(function(a, b) {
            return (b.receiptDate || '').localeCompare(a.receiptDate || '');
        });

    // 같은 제품명의 시료 찾기
    for (var i = 0; i < candidates.length; i++) {
        var c = candidates[i];
        var samples = c.samples || [];
        for (var j = 0; j < samples.length; j++) {
            if ((samples[j].productName || '') === productName) {
                prevSample = samples[j];
                prevReceiptNo = c._baseReceiptNo || c.receiptNo || '';
                break;
            }
        }
        if (prevSample) break;
    }

    if (!prevSample) return; // 이전 접수 없음

    // 필드별 비교
    var diffCount = 0;
    var prevMap = {
        productName: prevSample.productName || '',
        reportNo: prevSample.reportNo || '',
        foodType: prevSample.foodType || '',
        manufactureDate: prevSample.manufactureDate || '',
        expiryDate: prevSample.expiryDate || '',
        expiryDays: prevSample.expiryDays || '',
        lotNo: prevSample.lotNo || '',
        packageUnit: prevSample.packageUnit || '',
        sampleCount: prevSample.sampleCount || '',
        sampleReceiveMethod: prevSample.sampleReceiveMethod || '',
        receiptFormType: prevSample.receiptFormType || '',
        transportStatus: prevSample.transportStatus || '',
        noticeRequired: prevSample.noticeRequired || ''
    };

    // 비교 제외 필드 (당연히 달라야 하는 것)
    var skipFields = ['manufactureDate', 'expiryDate', 'lotNo'];

    fields.forEach(function(f) {
        if (skipFields.indexOf(f.key) >= 0) return;
        var el = document.getElementById('dp-sf-' + f.key);
        if (!el) return;
        var curVal = String(f.val || '').trim();
        var prevVal = String(prevMap[f.key] || '').trim();
        if (!curVal && !prevVal) return; // 둘 다 비어있으면 비교 불필요
        if (curVal !== prevVal && (curVal || prevVal)) {
            var warnKey = currentReceiptNo + '_' + f.key;
            if (_dismissedWarnings[warnKey]) return; // 이미 해제됨
            diffCount++;
            el.innerHTML = '<div style="display:flex;align-items:center;gap:4px">' +
                '<span>' + (f.val || '-') + '</span>' +
                '<span title="이전: ' + (prevVal || '없음') + ' (' + prevReceiptNo + ')" ' +
                'style="cursor:pointer;font-size:16px" ' +
                'onclick="dismissSampleWarning(this,\'' + warnKey.replace(/'/g, "\\'") + '\')">🧑‍🔧</span>' +
                '</div>' +
                '<div style="grid-column:1/3;font-size:10px;color:#e65100;background:#fff3e0;padding:2px 8px;border-radius:4px;margin:-2px 0 4px">' +
                '이전(' + prevReceiptNo + '): ' + (prevVal || '없음') +
                '</div>';
        }
    });

    // 상단에 비교 요약 표시
    if (diffCount > 0) {
        var grid = document.getElementById('dp-sample-grid');
        if (grid) {
            var summary = document.createElement('div');
            summary.id = 'dp-sample-diff-summary';
            summary.style.cssText = 'grid-column:1/3;background:#fff3e0;border:1px solid #ffcc80;border-radius:6px;padding:8px 12px;margin-bottom:8px;font-size:11px;color:#e65100';
            summary.innerHTML = '🧑‍🔧 이전 접수와 <b>' + diffCount + '개</b> 항목이 다릅니다 <span style="font-size:10px;color:#999">(클릭하여 확인)</span>';
            grid.insertBefore(summary, grid.firstChild);
        }
    }
}

function dismissSampleWarning(el, warnKey) {
    _dismissedWarnings[warnKey] = true;
    // 경고 이모지와 이전값 표시 제거
    var parent = el.closest('.dp-val');
    if (parent) {
        var nextEl = parent.nextElementSibling;
        // 이전값 비교 행 제거 (grid-column:1/3인 div)
        if (nextEl && nextEl.style.gridColumn === '1/3') {
            nextEl.remove();
        }
        // 이모지 제거, 값만 남기기
        var span = parent.querySelector('span');
        if (span) parent.innerHTML = span.textContent;
    }
    // 요약 카운트 업데이트
    var summaryEl = document.getElementById('dp-sample-diff-summary');
    if (summaryEl) {
        var remaining = document.querySelectorAll('#dp-sample-grid [onclick*="dismissSampleWarning"]').length;
        if (remaining === 0) {
            summaryEl.remove();
        } else {
            summaryEl.innerHTML = '🧑‍🔧 이전 접수와 <b>' + remaining + '개</b> 항목이 다릅니다';
        }
    }
}

function cancelBasicEdit() {
    document.getElementById('dp-basic-view').style.display = '';
    document.getElementById('dp-basic-edit').style.display = 'none';
}
function saveBasicEdit() {
    var r = _currentDetailRecord;
    if (!r) return;
    var docId = r._origId || r.id;
    var updateData = {
        receiptDate: document.getElementById('be-receiptDate').value || '',
        processingDeadline: document.getElementById('be-deadline').value || '',
        testField: document.getElementById('be-testField').value || '',
        testPurpose: document.getElementById('be-testPurpose').value || '',
        salesRep: document.getElementById('be-salesRep').value || '',
        urgent: document.getElementById('be-urgent').value === '긴급' ? '긴급' : '',
        companyName: document.getElementById('be-companyName').value || '',
        licNo: document.getElementById('be-licNo').value || '',
        licBizForm: document.getElementById('be-licBizForm').value || ''
    };
    db.collection('receipts').doc(docId).update(updateData).then(function() {
        // 로컬 캐시 업데이트
        Object.keys(updateData).forEach(function(k) { r[k] = updateData[k]; });
        _allReceipts.forEach(function(x) {
            if ((x._origId || x.id) === docId) {
                Object.keys(updateData).forEach(function(k) { x[k] = updateData[k]; });
            }
        });
        cancelBasicEdit();
        openDetailPanel(r.id, _currentDetailSampleIdx);
        renderTable();
        showDpToast('기본정보 저장 완료');
    }).catch(function(err) {
        console.error('기본정보 저장 실패:', err);
        showDpToast('저장 실패: ' + err.message, true);
    });
}

            dpEditRow('보고번호', 'se-reportNo', 'text', s.reportNo || '') +
            dpEditRow('검체유형', 'se-foodType', 'text', s.foodType || r.foodType || '') +
            dpEditRow('제조일자', 'se-manufactureDate', 'date', s.manufactureDate || '') +
            dpEditRow('소비기한', 'se-expiryDate', 'text', s.expiryDate || '') +
            dpEditRow('소비기한(일수)', 'se-expiryDays', 'text', s.expiryDays || '') +
            dpEditRow('로트번호', 'se-lotNo', 'text', s.lotNo || '') +
            dpEditRow('포장단위', 'se-packageUnit', 'text', s.packageUnit || '') +
            dpEditRow('검체수', 'se-sampleCount', 'text', s.sampleCount || '') +
            dpEditRow('시료접수', 'se-sampleReceiveMethod', 'text', s.sampleReceiveMethod || '') +
            dpEditRow('접수형태', 'se-receiptFormType', 'text', s.receiptFormType || '') +
            dpEditRow('운반상태', 'se-transportStatus', 'text', s.transportStatus || '') +
            dpEditRow('공지여부', 'se-noticeRequired', 'text', s.noticeRequired || '') +
            '</div>' +

}
function cancelSampleEdit() {
    document.getElementById('dp-sample-grid').style.display = '';
    document.getElementById('dp-sample-edit').style.display = 'none';
}
function saveSampleEdit() {
    var r = _currentDetailRecord;
    if (!r) return;
    var docId = r._origId || r.id;
    var idx = _currentDetailSampleIdx;

    // Firestore에서 현재 문서 가져와서 samples 배열 업데이트
    db.collection('receipts').doc(docId).get().then(function(doc) {
        if (!doc.exists) { showDpToast('문서를 찾을 수 없습니다', true); return; }
        var data = doc.data();
        var samples = data.samples || [];
        if (idx >= samples.length) {
            // samples 배열에 해당 인덱스가 없으면 확장
            while (samples.length <= idx) samples.push({});
        }
        var s = samples[idx];
        s.productName = document.getElementById('se-productName').value || '';
        s.reportNo = document.getElementById('se-reportNo').value || '';
        s.foodType = document.getElementById('se-foodType').value || '';
        s.manufactureDate = document.getElementById('se-manufactureDate').value || '';
        s.expiryDate = document.getElementById('se-expiryDate').value || '';
        s.expiryDays = document.getElementById('se-expiryDays').value || '';
        s.lotNo = document.getElementById('se-lotNo').value || '';
        s.packageUnit = document.getElementById('se-packageUnit').value || '';
        s.sampleCount = document.getElementById('se-sampleCount').value || '';
        s.sampleReceiveMethod = document.getElementById('se-sampleReceiveMethod').value || '';
        s.receiptFormType = document.getElementById('se-receiptFormType').value || '';
        s.transportStatus = document.getElementById('se-transportStatus').value || '';
        s.noticeRequired = document.getElementById('se-noticeRequired').value || '';

        return db.collection('receipts').doc(docId).update({ samples: samples });
    }).then(function() {
        // 로컬 캐시 업데이트
        if (r.samples && r.samples[idx]) {
            var fields = ['productName','reportNo','foodType','manufactureDate','expiryDate','expiryDays','lotNo','packageUnit','sampleCount','sampleReceiveMethod','receiptFormType','transportStatus','noticeRequired'];
            fields.forEach(function(f) {
                var el = document.getElementById('se-' + f);
                if (el) r.samples[idx][f] = el.value || '';
            });
        }
        cancelSampleEdit();
        openDetailPanel(r.id, _currentDetailSampleIdx);
        renderTable();
        showDpToast('시료정보 저장 완료');
    }).catch(function(err) {
        console.error('시료정보 저장 실패:', err);
        showDpToast('저장 실패: ' + err.message, true);
    });
}

function dpEditSelect(label, id, options, val) {

// 메모 저장 (접수현황 메모 탭에서 직접 저장)
function saveMemoField(key) {
    var r = _currentDetailRecord;
    if (!r) return;
    var docId = r._origId || r.id;
    var textEl = document.getElementById('memo-area-' + key);
    if (!textEl) return;

    // 섹션별 담당자 선택 값 읽기
    var userSel = document.getElementById('memo-user-' + key);
    var by = userSel ? userSel.value.trim() : '';
    if (!by) { showToast('담당자를 먼저 선택하세요', 'error'); return; }

    // 새로 입력한 텍스트
    var newText = textEl.value.trim();
    if (!newText) { showToast('메모 내용을 입력하세요', 'error'); return; }

    var at = new Date().toISOString().slice(0,16).replace('T',' ');
    var newEntry = newText + '(' + by + ')';  // "내용(성명)" 형식

    // 기존 메모에 append (줄바꿈 구분)
    var prevText = '';
    if (key === 'receipt') {
        prevText = r.noticeMemo || '';
    } else {
        var _tm = key.replace('team_', '');
        prevText = (r.teamMemo && r.teamMemo[_tm]) ? r.teamMemo[_tm] : '';
    }
    // 기존 내용 뒤에 새 항목 추가 (기존 없으면 그냥 새 항목)
    var mergedText = prevText ? (prevText + '\n' + newEntry) : newEntry;

    var updateObj = {};
    if (key === 'receipt') {
        updateObj.noticeMemo = mergedText;
        updateObj.noticeMemoBy = by;
        updateObj.noticeMemoAt = at;
    } else if (key.indexOf('team_') === 0) {
        var team = key.replace('team_', '');
        updateObj['teamMemo.' + team] = mergedText;
        updateObj['teamMemoLog.' + team] = { by: by, at: at };
    } else {
        return;
    }

    db.collection('receipts').doc(docId).update(updateObj)
    .then(function() {
        // 로컬 캐시 업데이트
        if (key === 'receipt') {
            r.noticeMemo = mergedText; r.noticeMemoBy = by; r.noticeMemoAt = at;
        } else {
            var team = key.replace('team_', '');
            if (!r.teamMemo) r.teamMemo = {};
            if (!r.teamMemoLog) r.teamMemoLog = {};
            r.teamMemo[team] = mergedText;
            r.teamMemoLog[team] = { by: by, at: at };
        }
        // 기존 메모 표시 영역 갱신 (저장된 전체 텍스트, 이미 (성명) 포함)
        var dispEl = document.getElementById('memo-display-' + key);
        if (dispEl) {
            dispEl.style.display = '';
            dispEl.textContent = mergedText; // newEntry에 이미 (by) 붙어 있음
        }
        // 입력란 초기화
        textEl.value = '';
        // 시각 갱신
        var atDiv = textEl.closest('div[style]').querySelector('.dp-memo-author');
        if (atDiv) atDiv.innerHTML = at;
        showToast('메모가 저장됐습니다', 'success');
    })
    .catch(function(e) { showToast('저장 실패: ' + e.message, 'error'); });
}

function downloadExcel() {

    var data = [header];
    _filteredReceipts.forEach(function(r) {
        data.push([
            r.receiptNo || '',
            r.receiptDate || '',
            r.status || '',
            r.companyName || '',
            r.productName || '',
            r.testField || '',
            r.testPurpose || '',
            r.sampleTotalCount || 1,
            r._sampleIdx === 0 ? (r.feeSupply || 0) : '',
            r._sampleIdx === 0 ? (r.feeVat    || 0) : '',
            r._sampleIdx === 0 ? (r.feeTotal  || 0) : '',
            r._sampleIdx === 0 ? (r._payStatusKey === '완납' ? '완납' : r._payStatusKey === '부분입금' ? '부분입금(' + Math.round(r._paidAmount/r.feeTotal*100) + '%)' : '미수금') : '',
            r._sampleIdx === 0 ? (function(){
                var pmts = r.payments || [];
                if (!pmts.length) return r.payDate ? r.payDate + ' 완납' : '';
                return pmts.map(function(p){ return (p.date||'-') + ' ' + Number(p.amount||0).toLocaleString() + '원(' + (p.method||'-') + ')'; }).join(' / ');
            })() : '',
            r.salesRep || '',
            r.processingDeadline || '',
            (r.urgent === '긴급' || r.urgent === 'Y') ? '긴급' : '일반'
        ]);
    });
    var ws = XLSX.utils.aoa_to_sheet(data);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '접수현황');
    var fname = '접수현황_' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '.xlsx';
    XLSX.writeFile(wb, fname);
}
