function loadComparePanel(side, id, sampleIdx) {
    var r = _allReceipts.find(function(x) {
        return x.id === id && x._sampleIdx === sampleIdx;
    });
    if (!r) return;
    var titleEl = document.getElementById('compare-' + side + '-title');
    var subEl   = document.getElementById('compare-' + side + '-sub');
    var bodyEl  = document.getElementById('compare-' + side + '-body');
    var totalEl = document.getElementById('compare-' + side + '-total');
    var countEl = document.getElementById('compare-' + side + '-count');
    titleEl.textContent = r.receiptNo || '-';
    subEl.textContent   = (r.companyName || '') + (r.productName ? ' · ' + r.productName : '');
    bodyEl.innerHTML    = '<div style="padding:16px;text-align:center;color:#999;font-size:12px">불러오는 중...</div>';
    totalEl.textContent = '-';
    countEl.textContent = '';
    var docId = (r._baseReceiptNo || r.receiptNo || '') + '_S' + sampleIdx;
    // 1단계: 접수 데이터에서 시험항목 추출 (refTestItems → mfdsTemplates 순)
    function getBaseItems() {
        // Firestore에서 원본 receipts 문서 조회 (메모리 캐시에 없을 수 있으므로)
        return db.collection('receipts').doc(r.id).get().then(function(doc) {
            var data = doc.exists ? doc.data() : r;
            var s = (data.samples && data.samples[sampleIdx]) || {};
            // 1) 참고용(기준규격외) 항목: refTestItems 직접 사용
            if (s.refTestItems && s.refTestItems.length > 0) {
                return s.refTestItems.map(function(ri) {
                    return {
                        testItemName: ri.itemName || ri.testItemName || '',
                        testItemCode: ri.testCode || ri.testItemCode || '',
                        unit: ri.unit || '',
                        fee: ri.fee || 0,
                        standard: ri.standard || '-'
                    };
                });
            }
            // 2) 고시항목: mfdsProductCode로 mfdsTemplates 조회
            var prodCode = s.mfdsProductCode || '';
            var foodType = s.foodType || '';
            if (!prodCode && !foodType) return [];
            return db.collection('mfdsTemplates').get().then(function(snap) {
                var matched = null;
                snap.forEach(function(tdoc) {
                    var t = tdoc.data();
                    if (prodCode && t.foodTypeCode === prodCode) { matched = t; }
                    if (!matched && foodType && (t.templateName === foodType || t.foodTypeName === foodType)) { matched = t; }
                });
                if (matched && matched.testItems && matched.testItems.length > 0) {
                    return matched.testItems.map(function(ti) {
                        return {
                            testItemName: ti.testItemName || '',
                            testItemCode: ti.testItemCode || '',
                            standard: ti.standard || '-',
                            unit: ti.unit || '',
                            fee: ti.fee || 0,
                            judgmentType: ti.judgmentType || ''
                        };
                    });
                }
                return [];
            });
        });
    }
    // 2단계: testResults에서 결과값 조회 (없어도 괜찮음)
    function getResultItems() {
        return db.collection('testResults').doc(docId).get().then(function(doc) {
            return doc.exists ? (doc.data().items || []) : [];
        }).catch(function() { return []; });
    }
    // 3단계: 병합 후 렌더링
    Promise.all([getBaseItems(), getResultItems()]).then(function(results) {
        var baseItems   = results[0];
        var resultItems = results[1];
        if (!baseItems || baseItems.length === 0) {
            baseItems = resultItems;
        }
        var merged = baseItems.map(function(base, idx) {
            var res = resultItems.find(function(ri) {
                return ri.testItemName === (base.testItemName || base.itemName || base.name)
                    || ri.itemName === (base.testItemName || base.itemName || base.name);
            }) || resultItems[idx] || {};
            return {
                testItemName:    base.testItemName || base.itemName || base.name || base['항목명'] || base['시험항목명'] || base.testName || '-',
                testItemCode:    base.testItemCode || base.testCode || base['시험항목코드'] || '',
                testTeam:        base.testTeam || base.team || base['시험팀'] || base.department || res.testTeam || '-',
                testerName:      base.testerName || base.assignee || base['담당자'] || base.charger || res.testerName || '-',
                standard:        base.standard || base['규격'] || base.spec || base.stdValue || res.standard || '-',
                markValue:       res.markValue || res.measuredValue || '',
                judgmentResult:  res.judgmentResult || '',
                unit:            base.unit || base['단위'] || res.unit || '',
                fee:             base.fee || base['수수료'] || res.fee || 0,
            };
        });
        if (merged.length === 0) {
            bodyEl.innerHTML = '<div style="padding:24px;text-align:center;color:#bbb;font-size:12px">시험항목 없음<br><span style="font-size:11px">접수등록에서 시험항목을 추가하세요</span></div>';
            totalEl.textContent = '0원';
            countEl.textContent = '(0건)';
            return;
        }
        // 소분류 수수료 규칙 적용
        _applySubChipFeesToItems(merged);
        var totalFee    = merged.reduce(function(s, it) { return s + (it._displayFee !== undefined ? Number(it._displayFee) : (Number(it.fee) || 0)); }, 0);
        var judgedCount = merged.filter(function(it) { return it.judgmentResult; }).length;
        totalEl.textContent = totalFee.toLocaleString() + '원';
        countEl.textContent = '(' + judgedCount + '/' + merged.length + '건 판정완료)';
        var html = '<div style="min-width:600px"><table style="width:100%;border-collapse:collapse">';
        html += '<thead><tr style="background:#f8f9fb;position:sticky;top:0;z-index:1">';
        [
            {label:'No',     align:'center'},
            {label:'항목명',  align:'left'},
            {label:'시험팀',  align:'left'},
            {label:'담당자',  align:'left'},
            {label:'규격',    align:'left'},
            {label:'결과값',  align:'right'},
            {label:'판정',    align:'center'},
            {label:'검사비용',align:'right'}
        ].forEach(function(h) {
            html += '<th style="padding:7px 10px;font-size:11px;font-weight:700;color:#5f6b7a;border-bottom:2px solid #e2e6ed;white-space:nowrap;text-align:'+h.align+'">'+h.label+'</th>';
        });
        html += '</tr></thead><tbody>';
        var _rowNo = 0;
        merged.forEach(function(it) {
            // 묶음 수수료 행
            if (it._isBundleRow) {
                html += '<tr style="border-bottom:2px solid #c4b5fd;background:#f0fdf4">';
                html += '<td style="padding:7px 6px;text-align:center;font-size:11px;color:#15803d;font-weight:700">0</td>';
                html += '<td colspan="6" style="padding:7px 10px;font-size:12px;color:#15803d;font-weight:700">' + (it.testItemName || '') + '</td>';
                html += '<td style="padding:7px 10px;font-size:12px;color:#15803d;font-weight:700;text-align:right;white-space:nowrap">' + (it.fee ? Number(it.fee).toLocaleString() + '원' : '-') + '</td>';
                html += '</tr>';
                return;
            }
            _rowNo++;
            var jr   = it.judgmentResult || '';
            var jrBg = jr==='적합' ? '#e8f5e9' : jr==='부적합' ? '#fce4ec' : '';
            var jrCl = jr==='적합' ? '#2e7d32' : jr==='부적합' ? '#c62828' : '#bbb';
            var mv   = it.markValue ? it.markValue + (it.unit ? ' '+it.unit : '') : '<span style="color:#ccc">미입력</span>';
            html += '<tr style="border-bottom:1px solid #eef0f4" onmouseover="this.style.background=\'#fafbfc\'" onmouseout="this.style.background=\'\'">';
            html += '<td style="padding:7px 6px;text-align:center;font-size:11px;color:#667085">' + _rowNo + '</td>';
            var dispName = (it.testItemName || '').split('||')[0];
            html += '<td style="padding:7px 10px;font-size:12px;color:#1a2332;white-space:nowrap">' + dispName + '</td>';
            html += '<td style="padding:7px 10px;font-size:11px;color:#5f6b7a;white-space:nowrap">' + it.testTeam + '</td>';
            html += '<td style="padding:7px 10px;font-size:11px;color:#5f6b7a;white-space:nowrap">' + it.testerName + '</td>';
            html += '<td style="padding:7px 10px;font-size:11px;color:#5f6b7a;white-space:nowrap">' + it.standard + '</td>';
            html += '<td style="padding:7px 10px;font-size:12px;color:#1a2332;text-align:right;white-space:nowrap">' + mv + '</td>';
            html += '<td style="padding:7px 10px;text-align:center">';
            if (jr) {
                html += '<span style="display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:'+jrBg+';color:'+jrCl+'">'+jr+'</span>';
            } else {
                html += '<span style="color:#bbb;font-size:11px">-</span>';
            }
            html += '</td>';
            var dispFee = it._displayFee !== undefined ? it._displayFee : (it.fee || 0);
            var feeColor = it._bundleGroup ? '#999' : (it._feeOver ? '#dc2626' : '#5f6b7a');
            html += '<td style="padding:7px 10px;font-size:' + (it._bundleGroup ? '10px' : '12px') + ';color:' + feeColor + ';text-align:right;white-space:nowrap">' + (it._bundleGroup ? '-' : (dispFee ? Number(dispFee).toLocaleString()+'원' : '-')) + '</td>';
            html += '</tr>';
        });
        html += '</tbody></table></div>';
        bodyEl.innerHTML = html;
        highlightDiff();
    }).catch(function(err) {
        bodyEl.innerHTML = '<div style="padding:16px;text-align:center;color:#e53935;font-size:12px">로드 실패: ' + (err.message || err) + '</div>';
    });
}

function highlightDiff() {
    var leftRows  = document.querySelectorAll('#compare-left-body tbody tr');
    var rightRows = document.querySelectorAll('#compare-right-body tbody tr');
    if (!leftRows.length || !rightRows.length) return;
    function buildMap(rows) {
        var map = {};
        rows.forEach(function(tr) {
            var tds = tr.querySelectorAll('td');
            if (tds.length < 5) return;
            var name  = tds[0].textContent.trim();
            var judge = tds[4].textContent.trim();
            map[name] = { judge: judge, tr: tr };
        });
        return map;
    }
    var lm = buildMap(leftRows);
    var rm = buildMap(rightRows);
    Object.keys(lm).forEach(function(name) {
        if (!rm[name]) return;
        var lj = lm[name].judge;
        var rj = rm[name].judge;
        if (lj && rj && lj !== '미입력' && rj !== '미입력' && lj !== rj) {
            lm[name].tr.style.background = '#fffde7';
            rm[name].tr.style.background = '#fffde7';
        }
    });
}

function clearComparePanel(side) {
    document.getElementById('compare-' + side + '-title').textContent =
        side === 'left' ? '클릭으로 로드' : 'Ctrl+클릭으로 로드';
    document.getElementById('compare-' + side + '-sub').textContent = '';
    document.getElementById('compare-' + side + '-body').innerHTML =
        '<div style="padding:24px;text-align:center;color:#bbb;font-size:12px">행 클릭 → [A] 패널에 검사결과 표시<br><span style="font-size:11px">Ctrl+클릭 → [B] 패널</span></div>';
    document.getElementById('compare-' + side + '-total').textContent = '-';
    document.getElementById('compare-' + side + '-count').textContent = '';
}

// 드래그 리사이즈
(function() {
    var handle = document.getElementById('resize-handle');
    var zone   = document.getElementById('compare-zone');
    if (!handle || !zone) return;
    var dragging = false, startY = 0, startH = 0;
    handle.addEventListener('mousedown', function(e) {
        dragging = true; startY = e.clientY; startH = zone.offsetHeight;
        document.body.style.cursor = 'row-resize';
        document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        var newH = Math.min(Math.max(startH + (startY - e.clientY), 120), window.innerHeight * 0.6);
        zone.style.height = newH + 'px';
    });
    document.addEventListener('mouseup', function() {
        if (!dragging) return;
        dragging = false;
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
    });
})();

// ============================================================================
// 초기화
// ============================================================================
window.onload = function() {
    loadColumnSettings();
    loadColumnOrder();
    loadReceipts();
    // sticky 가로 스크롤바 ↔ 테이블 동기화
    (function() {
        var wrap = document.getElementById('table-scroll-wrap');
        var bar = document.getElementById('sticky-hscroll');
        var inner = document.getElementById('sticky-hscroll-inner');
        if (!wrap || !bar || !inner) return;
        var syncing = false;
        function syncWidth() { inner.style.width = wrap.scrollWidth + 'px'; }
        bar.addEventListener('scroll', function() {
            if (syncing) return; syncing = true;
            wrap.scrollLeft = bar.scrollLeft;
            syncing = false;
        });
        wrap.addEventListener('scroll', function() {
            if (syncing) return; syncing = true;
            bar.scrollLeft = wrap.scrollLeft;
            syncing = false;
        });
        // 테이블 렌더링 후 너비 동기화
        new MutationObserver(syncWidth).observe(wrap, { childList: true, subtree: true });
        window.addEventListener('resize', syncWidth);
        syncWidth();
    })();
    // 기본 날짜 필터 (최근 30일)
    var now = new Date();
    var from = new Date(now);
    from.setDate(from.getDate() - 30);
    document.getElementById('filter-to').value = now.toISOString().split('T')[0];
    document.getElementById('filter-from').value = from.toISOString().split('T')[0];
    // 분야 필터 동적 로드
    loadFieldFilterOptions();
};

async function loadFieldFilterOptions() {
  try {
    var doc = await db.collection('settings').doc('inspectionFields').get();
    if (doc.exists && doc.data().fields) {
      var sel = document.getElementById('filter-field');
      if (!sel) return;
      var fields = doc.data().fields;
      fields.forEach(function(f) {
        var opt = document.createElement('option');
        opt.value = f.name;
        opt.textContent = f.name;
        sel.appendChild(opt);
      });
    }
  } catch(e) { console.warn('분야 필터 로드 실패:', e); }
}
</script>
