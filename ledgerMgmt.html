<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioFoodLab LIMS - 매출처 원장</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;height:100vh;background:#f8f9fb;font-size:13px;overflow:hidden;display:flex}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;margin-left:250px;height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e2e6ed;padding:0 24px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;color:#1a2332}
.topbar-sep{color:#c8d6e5}
.topbar-sub{font-size:13px;color:#5f6b7a}
.content{flex:1;padding:24px;overflow-y:auto}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#1a73e8;color:#fff}.btn-primary:hover{background:#1557b0}
.btn-secondary{background:#fff;color:#5f6b7a;border:1px solid #e2e6ed}.btn-secondary:hover{background:#f0f2f5}
.btn-sm{padding:5px 10px;font-size:11px}
.tbl-wrap{overflow-x:auto;border:1px solid #e2e6ed;border-radius:10px}
.text-right{text-align:right}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:#1f2937;color:#fff;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;z-index:1100}
.toast.show{opacity:1}

/* 매출처 원장 필터 */
.ledger-filter{display:flex;gap:8px;align-items:center;flex-wrap:nowrap;margin-bottom:16px;padding:10px 16px;background:#fff;border:1px solid #e2e6ed;border-radius:10px}
.ledger-filter input[type="text"]{padding:7px 10px;border:1px solid #e2e6ed;border-radius:8px;font-size:13px;font-family:inherit;width:220px;flex-shrink:0}
.ledger-search-wrap{position:relative;flex-shrink:0}
.ledger-suggest{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e2e6ed;border-top:none;border-radius:0 0 8px 8px;max-height:260px;overflow-y:auto;z-index:100;display:none;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.ledger-suggest.show{display:block}
.ledger-suggest-item{padding:8px 10px;cursor:pointer;border-bottom:1px solid #f0f2f5;font-size:12px}
.ledger-suggest-item:last-child{border:none}
.ledger-suggest-item:hover,.ledger-suggest-item.active{background:#eff6ff}
.ledger-suggest-item .sg-name{font-weight:600;color:#1a2332}
.ledger-suggest-item .sg-sub{font-size:11px;color:#6b7280;margin-top:2px}
.ledger-filter input[type="date"]{padding:7px 8px;border:1px solid #e2e6ed;border-radius:8px;font-size:12px;font-family:inherit;width:130px;flex-shrink:0}
.ledger-filter input:focus{outline:none;border-color:#1a73e8}
.ledger-filter label{font-size:12px;font-weight:500;color:#5f6b7a;display:flex;align-items:center;gap:4px;cursor:pointer}

/* 테이블 */
.ledger-tbl{width:100%;border-collapse:collapse;font-size:12px}
.ledger-tbl thead{background:#f8f9fb;position:sticky;top:0}
.ledger-tbl th{padding:8px 10px;text-align:left;font-weight:600;color:#5f6b7a;border-bottom:2px solid #e2e6ed;white-space:nowrap;font-size:11px}
.ledger-tbl td{padding:7px 10px;border-bottom:1px solid #f0f2f5;color:#1a2332}
.ledger-tbl .text-right{text-align:right}
.ledger-tbl .row-carry{background:#f0fdf4}
.ledger-tbl .row-payment{background:#eff6ff}
.ledger-tbl .row-total{background:#f8f9fb;font-weight:700}
.ledger-tbl .bal-pos{color:#ef4444;font-weight:600}
.ledger-tbl .bal-neg{color:#2563eb;font-weight:600}
.ledger-tbl .bal-zero{color:#10b981;font-weight:600}
.ledger-tbl .receipt-no{font-size:11px;color:#6b7280}
.ledger-empty{text-align:center;padding:60px 20px;color:#9ca3af}

/* 원장 헤더 정보 */
.ledger-info{display:none;margin-bottom:14px;border:1px solid #e2e6ed;border-radius:10px;overflow:hidden}
.ledger-info-top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#f8f9fb;border-bottom:1px solid #e2e6ed}
.ledger-info-top .title{font-size:16px;font-weight:700;color:#1a2332}
.ledger-info-top .period{font-size:12px;color:#6b7280}
.ledger-info-top .bfl-logo{font-size:12px;color:#6b7280;font-weight:500}
.ledger-info-body{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0}
.ledger-info-col{padding:12px 16px;border-right:1px solid #eef0f4}
.ledger-info-col:last-child{border-right:none}
.ledger-info-col .col-title{font-size:11px;font-weight:700;color:#1a73e8;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px}
.ledger-info-row{display:flex;gap:6px;margin-bottom:4px;font-size:12px}
.ledger-info-row:last-child{margin-bottom:0}
.ledger-info-row .lbl{color:#6b7280;min-width:70px;flex-shrink:0}
.ledger-info-row .val{color:#1a2332;font-weight:500}

/* 인쇄 */
@media print{
.sidebar,.topbar,.ledger-filter,.toast{display:none!important}
.main{margin-left:0!important}
.content{padding:0!important;overflow:visible!important}
.ledger-info{display:block!important;border:1px solid #999;margin-bottom:12px}
.ledger-info-top{border-bottom:1px solid #999}
.ledger-info-col{border-right:1px solid #999}
.ledger-info-col:last-child{border-right:none}
.ledger-tbl{font-size:11px}
.ledger-tbl th,.ledger-tbl td{padding:5px 8px;border:1px solid #ccc}
.tbl-wrap{border:none}
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/firestore-helpers.js"></script>
<script src="js/sidebar.js?v=3"></script>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
    <div class="topbar">
        <span class="topbar-title">재무 관리</span>
        <span class="topbar-sep">›</span>
        <span class="topbar-sub">매출처 원장</span>
    </div>
    <div class="content">
        <div class="ledger-filter" id="ledger-filter">
            <div class="ledger-search-wrap">
                <input type="text" id="ledger-company" placeholder="업체명/사업자번호/대표자/주소" autocomplete="off">
                <div class="ledger-suggest" id="ledger-suggest"></div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="document.getElementById('ledger-company').value='';document.getElementById('ledger-suggest').classList.remove('show')" title="초기화" style="padding:8px 10px">&times;</button>
            <input type="date" id="ledger-from">
            <span style="color:#9ca3af">~</span>
            <input type="date" id="ledger-to">
            <label style="margin-left:6px"><input type="checkbox" id="ledger-exclude-zero"> 매출 0원 제외</label>
            <button class="btn btn-primary" onclick="loadLedger()">조회</button>
            <button class="btn btn-secondary" onclick="printLedger()">인쇄</button>
        </div>
        <!-- 업체정보 + 영업허가 + 담당자정보 헤더 -->
        <div class="ledger-info" id="ledger-info">
            <div class="ledger-info-top">
                <div class="title" id="ledger-info-title">매출처 원장</div>
                <div class="period" id="ledger-info-period"></div>
                <div class="bfl-logo">BioFoodLab LIMS</div>
            </div>
            <div class="ledger-info-body">
                <div class="ledger-info-col">
                    <div class="col-title">거래처 정보</div>
                    <div class="ledger-info-row"><span class="lbl">업체명</span><span class="val" id="li-company">-</span></div>
                    <div class="ledger-info-row"><span class="lbl">사업자번호</span><span class="val" id="li-bizno">-</span></div>
                    <div class="ledger-info-row"><span class="lbl">대표자</span><span class="val" id="li-ceo">-</span></div>
                    <div class="ledger-info-row"><span class="lbl">전화번호</span><span class="val" id="li-phone">-</span></div>
                    <div class="ledger-info-row"><span class="lbl">주소</span><span class="val" id="li-addr">-</span></div>
                </div>
                <div class="ledger-info-col">
                    <div class="col-title">영업허가 정보</div>
                    <div class="ledger-info-row"><span class="lbl">영업소명칭</span><span class="val" id="li-lic-name">-</span></div>
                    <div class="ledger-info-row"><span class="lbl">인허가번호</span><span class="val" id="li-lic-no">-</span></div>
                    <div class="ledger-info-row"><span class="lbl">영업형태</span><span class="val" id="li-lic-form">-</span></div>
                    <div class="ledger-info-row"><span class="lbl">대표자</span><span class="val" id="li-lic-rep">-</span></div>
                    <div class="ledger-info-row"><span class="lbl">소재지</span><span class="val" id="li-lic-addr">-</span></div>
                </div>
                <div class="ledger-info-col">
                    <div class="col-title">담당자 정보</div>
                    <div class="ledger-info-row"><span class="lbl">영업담당</span><span class="val" id="li-salesrep">-</span></div>
                    <div class="ledger-info-row"><span class="lbl">거래처담당</span><span class="val" id="li-contact">-</span></div>
                    <div class="ledger-info-row"><span class="lbl">담당연락처</span><span class="val" id="li-contact-phone">-</span></div>
                    <div class="ledger-info-row"><span class="lbl">담당이메일</span><span class="val" id="li-contact-email">-</span></div>
                </div>
            </div>
        </div>
        <div id="ledger-result">
            <div class="ledger-empty">업체명을 입력하고 [조회] 버튼을 클릭하세요.</div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2500);
}

// 날짜 초기화
(function initLedgerDates() {
    var now = new Date();
    function fmtDate(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
    document.getElementById('ledger-to').value = fmtDate(now);
    document.getElementById('ledger-from').value = fmtDate(new Date(now.getFullYear(), now.getMonth() - 3, now.getDate()));
})();

function _ledgerFmt(n) {
    if (!n || n === 0) return '';
    return n.toLocaleString('ko-KR');
}

// ---- 업체 자동완성 ----
var _ledgerCompaniesCache = null;
var _ledgerSuggestTimer = null;

async function _loadCompaniesCache() {
    if (_ledgerCompaniesCache) return _ledgerCompaniesCache;
    await waitForFirebase();
    var snap = await db.collection('companies').get();
    _ledgerCompaniesCache = [];
    snap.forEach(function(doc) {
        var c = doc.data();
        _ledgerCompaniesCache.push({
            name: c.name || c.company || '',
            businessNo: c.businessNo || c.bizNo || '',
            ceo: c.ceo || c.repName || '',
            addr: ((c.addr1 || '') + ' ' + (c.addr2 || '')).trim(),
            phone: c.phone || c.contactPhone || c.tel || ''
        });
    });
    return _ledgerCompaniesCache;
}

function _searchCompanies(keyword, list) {
    var kw = keyword.toLowerCase().replace(/[\s\-]/g, '');
    return list.filter(function(c) {
        var targets = [
            c.name.toLowerCase().replace(/[\s\-]/g, ''),
            c.businessNo.replace(/[\s\-]/g, ''),
            c.ceo.toLowerCase(),
            c.addr.toLowerCase()
        ];
        return targets.some(function(t) { return t.indexOf(kw) >= 0; });
    }).slice(0, 10);
}

(function initLedgerAutocomplete() {
    var input = document.getElementById('ledger-company');
    var suggestEl = document.getElementById('ledger-suggest');
    var activeIdx = -1;

    input.addEventListener('input', function() {
        clearTimeout(_ledgerSuggestTimer);
        var val = input.value.trim();
        if (val.length < 1) { suggestEl.classList.remove('show'); return; }
        _ledgerSuggestTimer = setTimeout(async function() {
            var list = await _loadCompaniesCache();
            var results = _searchCompanies(val, list);
            if (results.length === 0) { suggestEl.classList.remove('show'); return; }
            activeIdx = -1;
            suggestEl.innerHTML = results.map(function(c, i) {
                var sub = [];
                if (c.businessNo) sub.push(c.businessNo);
                if (c.ceo) sub.push(c.ceo);
                if (c.addr) sub.push(c.addr);
                return '<div class="ledger-suggest-item" data-idx="' + i + '" data-name="' + c.name.replace(/"/g, '&quot;') + '">' +
                    '<div class="sg-name">' + c.name + '</div>' +
                    (sub.length ? '<div class="sg-sub">' + sub.join(' · ') + '</div>' : '') +
                    '</div>';
            }).join('');
            suggestEl.classList.add('show');
        }, 200);
    });

    input.addEventListener('keydown', function(e) {
        if (!suggestEl.classList.contains('show')) {
            if (e.key === 'Enter') { e.preventDefault(); loadLedger(); }
            return;
        }
        var items = suggestEl.querySelectorAll('.ledger-suggest-item');
        if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, items.length - 1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); }
        else if (e.key === 'Enter') {
            e.preventDefault();
            if (activeIdx >= 0 && items[activeIdx]) {
                input.value = items[activeIdx].dataset.name;
                suggestEl.classList.remove('show');
                loadLedger();
            } else {
                suggestEl.classList.remove('show');
                loadLedger();
            }
            return;
        } else if (e.key === 'Escape') { suggestEl.classList.remove('show'); return; }
        items.forEach(function(it, i) { it.classList.toggle('active', i === activeIdx); });
        if (activeIdx >= 0 && items[activeIdx]) items[activeIdx].scrollIntoView({ block: 'nearest' });
    });

    suggestEl.addEventListener('click', function(e) {
        var item = e.target.closest('.ledger-suggest-item');
        if (!item) return;
        input.value = item.dataset.name;
        suggestEl.classList.remove('show');
        loadLedger();
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.ledger-search-wrap')) suggestEl.classList.remove('show');
    });
})();

// ---- 원장 조회 ----
async function loadLedger() {
    document.getElementById('ledger-suggest').classList.remove('show');
    var company = document.getElementById('ledger-company').value.trim();
    if (!company) { showToast('업체명을 입력하세요'); return; }

    var fromDate = document.getElementById('ledger-from').value;
    var toDate = document.getElementById('ledger-to').value;
    var excludeZero = document.getElementById('ledger-exclude-zero').checked;
    var resultEl = document.getElementById('ledger-result');
    resultEl.innerHTML = '<div class="ledger-empty">조회 중...</div>';

    try {
        await waitForFirebase();

        // 0) 사업자번호/대표자/주소 입력 시 → 업체명으로 변환
        var cachedList = await _loadCompaniesCache();
        var found = cachedList.find(function(c) { return c.name === company; });
        if (!found) {
            var matched = _searchCompanies(company, cachedList);
            if (matched.length > 0) {
                company = matched[0].name;
                document.getElementById('ledger-company').value = company;
            }
        }

        // 1) 해당 업체 전체 데이터 조회 (부분 검색 지원)
        var allSnap = null;
        var searchVariants = [company];
        if (!company.startsWith('(주)')) searchVariants.push('(주)' + company);
        if (!company.startsWith('주식회사 ')) searchVariants.push('주식회사 ' + company);
        if (company.startsWith('(주)')) searchVariants.push(company.replace(/^\(주\)/, ''));
        if (company.startsWith('주식회사 ')) searchVariants.push(company.replace(/^주식회사 /, ''));

        // 단계1: 변형별 정확 매칭
        for (var vi = 0; vi < searchVariants.length; vi++) {
            var snap = await db.collection('receipts')
                .where('companyName', '==', searchVariants[vi].trim())
                .get();
            if (snap.size > 0) { allSnap = snap; company = searchVariants[vi].trim(); break; }
        }

        // 단계2: 접두어 범위 검색
        if (!allSnap || allSnap.size === 0) {
            for (var pi = 0; pi < searchVariants.length; pi++) {
                var prefix = searchVariants[pi].trim();
                var prefixSnap = await db.collection('receipts')
                    .where('companyName', '>=', prefix)
                    .where('companyName', '<=', prefix + '\uf8ff')
                    .get();
                if (prefixSnap.size > 0) { allSnap = prefixSnap; company = prefixSnap.docs[0].data().companyName; break; }
            }
        }

        // 단계3: companies 컬렉션에서 업체명 찾아서 재시도
        if (!allSnap || allSnap.size === 0) {
            var compSnap = await db.collection('companies')
                .where('name', '>=', company)
                .where('name', '<=', company + '\uf8ff')
                .get();
            if (compSnap.size === 0 && !company.startsWith('(주)')) {
                compSnap = await db.collection('companies')
                    .where('name', '>=', '(주)' + company)
                    .where('name', '<=', '(주)' + company + '\uf8ff')
                    .get();
            }
            if (compSnap.size > 0) {
                var foundName = compSnap.docs[0].data().name;
                allSnap = await db.collection('receipts')
                    .where('companyName', '==', foundName)
                    .get();
                if (allSnap.size > 0) company = foundName;
            }
        }

        if (!allSnap) allSnap = { size: 0, forEach: function() {}, docs: [] };

        // 업체 정보 조회
        await _loadCompanyInfo(company, allSnap);

        var periodReceipts = [];
        var carrySales = 0, carryPayments = 0;

        allSnap.forEach(function(doc) {
            var d = doc.data();
            var rDate = d.receiptDate || '';
            if (rDate >= fromDate && rDate <= toDate) {
                periodReceipts.push({ id: doc.id, data: d });
            } else if (rDate < fromDate) {
                carrySales += _getFee(d);
                (d.payments || []).forEach(function(p) { carryPayments += (Number(p.amount) || 0); });
            }
        });
        var carryBalance = carrySales - carryPayments;

        // 행 구성
        var rows = [];

        periodReceipts.forEach(function(r) {
            var d = r.data;
            var fee = _getFee(d);
            if (excludeZero && fee === 0) return;

            rows.push({
                date: d.receiptDate || '', type: '매출', payMethod: '',
                receiptNo: d.receiptNo || '', productName: _getProductName(d),
                desc: _getDesc(d), sales: fee, payment: 0, sortOrder: 0
            });

            (d.payments || []).forEach(function(p) {
                var pDate = p.date || '';
                if (pDate < fromDate || pDate > toDate) return;
                rows.push({
                    date: pDate, type: '입금', payMethod: p.method || '',
                    receiptNo: d.receiptNo || '', productName: '',
                    desc: p.memo || '', sales: 0, payment: Number(p.amount) || 0, sortOrder: 1
                });
            });
        });

        // 조회기간 이전 접수건의 입금이 조회기간 내에 있는 경우
        allSnap.forEach(function(doc) {
            var d = doc.data();
            var rDate = d.receiptDate || '';
            if (rDate >= fromDate) return;
            (d.payments || []).forEach(function(p) {
                var pDate = p.date || '';
                if (pDate >= fromDate && pDate <= toDate) {
                    rows.push({
                        date: pDate, type: '입금', payMethod: p.method || '',
                        receiptNo: d.receiptNo || '', productName: '',
                        desc: p.memo || '', sales: 0, payment: Number(p.amount) || 0, sortOrder: 1
                    });
                }
            });
        });

        rows.sort(function(a, b) {
            if (a.date < b.date) return -1;
            if (a.date > b.date) return 1;
            return a.sortOrder - b.sortOrder;
        });

        var balance = carryBalance;
        var totalSales = 0, totalPayments = 0;

        // 렌더링
        var html = '<div class="tbl-wrap"><table class="ledger-tbl"><thead><tr>';
        html += '<th style="width:90px">일자</th>';
        html += '<th style="width:50px">구분</th>';
        html += '<th>적 요</th>';
        html += '<th class="text-right" style="width:100px">매출</th>';
        html += '<th class="text-right" style="width:100px">입금</th>';
        html += '<th class="text-right" style="width:110px">잔액</th>';
        html += '</tr></thead><tbody>';

        // 이월 행
        html += '<tr class="row-carry">';
        html += '<td></td>';
        html += '<td><strong>이월</strong></td>';
        html += '<td style="font-size:11px;color:#6b7280">조회기준 이전일까지의 이월금액</td>';
        html += '<td class="text-right">' + _ledgerFmt(carrySales) + '</td>';
        html += '<td class="text-right">' + _ledgerFmt(carryPayments) + '</td>';
        html += '<td class="text-right ' + (carryBalance > 0 ? 'bal-pos' : carryBalance < 0 ? 'bal-neg' : 'bal-zero') + '">' + _ledgerFmt(carryBalance) + '</td>';
        html += '</tr>';

        rows.forEach(function(row) {
            balance += row.sales - row.payment;
            totalSales += row.sales;
            totalPayments += row.payment;

            var summary = '';
            if (row.type === '매출') {
                var parts = [];
                if (row.productName) parts.push(row.productName);
                if (row.desc) parts.push(row.desc);
                if (row.receiptNo) parts.push('<span class="receipt-no">' + row.receiptNo + '</span>');
                summary = parts.join(' ');
            } else {
                var parts2 = [];
                if (row.payMethod) parts2.push(row.payMethod);
                if (row.desc) parts2.push(row.desc);
                if (row.receiptNo) parts2.push('<span class="receipt-no">' + row.receiptNo + '</span>');
                summary = parts2.join(' · ');
            }

            var cls = row.type === '입금' ? ' class="row-payment"' : '';
            html += '<tr' + cls + '>';
            html += '<td>' + row.date + '</td>';
            html += '<td>' + row.type + '</td>';
            html += '<td title="' + (summary || '').replace(/<[^>]*>/g,'').replace(/"/g, '&quot;') + '">' + summary + '</td>';
            html += '<td class="text-right">' + _ledgerFmt(row.sales) + '</td>';
            html += '<td class="text-right">' + _ledgerFmt(row.payment) + '</td>';
            html += '<td class="text-right ' + (balance > 0 ? 'bal-pos' : balance < 0 ? 'bal-neg' : 'bal-zero') + '">' + _ledgerFmt(balance) + '</td>';
            html += '</tr>';
        });

        // 합계
        html += '<tr class="row-total">';
        html += '<td colspan="3" class="text-right" style="font-size:13px">합 계</td>';
        html += '<td class="text-right">' + _ledgerFmt(totalSales) + '</td>';
        html += '<td class="text-right">' + _ledgerFmt(totalPayments) + '</td>';
        html += '<td class="text-right ' + (balance > 0 ? 'bal-pos' : balance < 0 ? 'bal-neg' : 'bal-zero') + '">' + _ledgerFmt(balance) + '</td>';
        html += '</tr>';

        html += '</tbody></table></div>';

        if (rows.length === 0 && carryBalance === 0) {
            resultEl.innerHTML = '<div class="ledger-empty">해당 업체의 거래내역이 없습니다.</div>';
        } else {
            resultEl.innerHTML = html;
        }

        // 헤더 업데이트
        document.getElementById('ledger-info-title').textContent = company + ' - 매출처 원장';
        document.getElementById('ledger-info-period').textContent = '조회기간: ' + fromDate + ' ~ ' + toDate;
        document.getElementById('ledger-info').style.display = 'block';

    } catch(e) {
        console.error('[ledger]', e);
        resultEl.innerHTML = '<div class="ledger-empty">조회 실패: ' + e.message + '</div>';
    }
}

function _getFee(d) {
    if (d.discountFinalPrice != null && Number(d.discountFinalPrice) > 0) return Number(d.discountFinalPrice);
    if (d.feeTotal != null && Number(d.feeTotal) > 0) return Number(d.feeTotal);
    if (d.feeOriginal != null && Number(d.feeOriginal) > 0) return Number(d.feeOriginal);
    if (d.totalFee != null && Number(d.totalFee) > 0) return Number(d.totalFee);
    var supply = Number(d.supplyPrice) || 0;
    var tax = Number(d.tax) || 0;
    if (supply + tax > 0) return supply + tax;
    return Number(d.fee) || 0;
}

function _getProductName(d) {
    if (d.productName) return d.productName;
    if (d.sampleName) return d.sampleName;
    if (d.samples && d.samples.length > 0) {
        var first = d.samples[0].productName || '';
        if (d.samples.length > 1) first += ' 외 ' + (d.samples.length - 1) + '건';
        return first;
    }
    return '';
}

function _getDesc(d) {
    var field = d.testField || d.sampleType || '';
    var purpose = d.testPurpose || d.purpose || d.inspectionPurpose || '';
    if (!field && !purpose) return '';
    return '[' + field + ', ' + purpose + ']';
}

async function _loadCompanyInfo(companyName, receiptsSnap) {
    document.getElementById('li-company').textContent = companyName;
    document.getElementById('li-bizno').textContent = '-';
    document.getElementById('li-ceo').textContent = '-';
    document.getElementById('li-phone').textContent = '-';
    document.getElementById('li-addr').textContent = '-';
    document.getElementById('li-lic-name').textContent = '-';
    document.getElementById('li-lic-no').textContent = '-';
    document.getElementById('li-lic-form').textContent = '-';
    document.getElementById('li-lic-rep').textContent = '-';
    document.getElementById('li-lic-addr').textContent = '-';
    document.getElementById('li-salesrep').textContent = '-';
    document.getElementById('li-contact').textContent = '-';
    document.getElementById('li-contact-phone').textContent = '-';
    document.getElementById('li-contact-email').textContent = '-';

    try {
        var compSnap = await db.collection('companies')
            .where('name', '==', companyName).limit(1).get();
        if (compSnap.empty) {
            compSnap = await db.collection('companies')
                .where('company', '==', companyName).limit(1).get();
        }

        if (!compSnap.empty) {
            var c = compSnap.docs[0].data();
            var bizNo = c.businessNo || c.bizNo || '';
            if (bizNo) document.getElementById('li-bizno').textContent = bizNo;
            var ceo = c.ceo || c.repName || '';
            if (ceo) document.getElementById('li-ceo').textContent = ceo;
            var phone = c.phone || c.contactPhone || c.tel || '';
            if (phone) document.getElementById('li-phone').textContent = phone;
            var addr = ((c.addr1 || '') + ' ' + (c.addr2 || '')).trim();
            if (addr) document.getElementById('li-addr').textContent = addr;

            var contactName = '', contactPhone = '', contactEmail = '';
            if (c.contacts && c.contacts.length > 0) {
                var ct = c.contacts[0];
                contactName = ct.name || '';
                contactPhone = ct.phone || ct.mobile || '';
                contactEmail = ct.email || '';
            } else {
                contactName = c.contactName || '';
                contactPhone = c.contactPhone || '';
                contactEmail = c.contactEmail || '';
            }
            if (contactName) document.getElementById('li-contact').textContent = contactName;
            if (contactPhone) document.getElementById('li-contact-phone').textContent = contactPhone;
            if (contactEmail) document.getElementById('li-contact-email').textContent = contactEmail;

            if (c.licenses && c.licenses.length > 0) {
                var lic = c.licenses[0];
                if (lic.licBizName) document.getElementById('li-lic-name').textContent = lic.licBizName;
                if (lic.licNo) document.getElementById('li-lic-no').textContent = lic.licNo;
                if (lic.licBizForm) document.getElementById('li-lic-form').textContent = lic.licBizForm;
                if (lic.licRepName) document.getElementById('li-lic-rep').textContent = lic.licRepName;
                var licAddr = ((lic.licAddr || '') + ' ' + (lic.licAddr2 || '')).trim();
                if (licAddr) document.getElementById('li-lic-addr').textContent = licAddr;
            }
        }

        var salesRep = '';
        if (receiptsSnap && receiptsSnap.docs) {
            var sortedDocs = receiptsSnap.docs.slice().sort(function(a, b) {
                return (b.data().receiptDate || '').localeCompare(a.data().receiptDate || '');
            });
            for (var i = 0; i < sortedDocs.length; i++) {
                var sr = sortedDocs[i].data().salesRep;
                if (sr) { salesRep = sr; break; }
            }
        }
        if (salesRep) document.getElementById('li-salesrep').textContent = salesRep;

    } catch(e) {
        console.warn('[ledger] 업체정보 조회 실패:', e);
    }
}

function printLedger() {
    var company = document.getElementById('ledger-company').value.trim();
    if (!company) { showToast('먼저 업체를 조회하세요'); return; }
    window.print();
}
