// 1. mfds_test_items에서 PA 항목 단위 업데이트
async function runUpdate() {
  document.getElementById('btnRun').disabled = true;
  var db = firebase.firestore();
  var codes = Object.keys(PA_UNITS);
  log('=== 단위 업데이트 시작 (' + codes.length + '건) ===');

  // 전체 PA 문서를 한번에 로드
  log('PA 항목 전체 로드 중...');
  var allSnap = await db.collection('mfds_test_items').get();
  var docMap = {};
  allSnap.forEach(function(doc) {
    var data = doc.data();
    var code = (data['시험항목코드'] || '').toUpperCase();
    if (code.indexOf('PA') === 0) docMap[code] = doc.ref;
  });
  log('PA 문서 ' + Object.keys(docMap).length + '건 발견');

  var batch = db.batch();
  var cnt = 0, total = 0;
  for (var i = 0; i < codes.length; i++) {
    var code = codes[i];
    var ref = docMap[code];
    if (!ref) continue;
    batch.update(ref, { '단위': PA_UNITS[code] });
    cnt++; total++;
    if (cnt >= 450) {
      await batch.commit();
      log('  ✅ ' + total + '건 커밋');
      batch = db.batch(); cnt = 0;
    }
  }
  if (cnt > 0) { await batch.commit(); log('  ✅ 최종 ' + total + '건 커밋'); }
  log('=== 단위 업데이트 완료: ' + total + '건 ===');
}

// 2. settings/refFeeMapping에서 PA 항목 수수료 업데이트
async function runFeeUpdate() {
  var db = firebase.firestore();
  log('=== 수수료 업데이트 시작 ===');
  var doc = await db.collection('settings').doc('refFeeMapping').get();
  if (!doc.exists) { log('❌ refFeeMapping 문서 없음'); return; }
  var items = doc.data().items || [];
  log('기존 항목: ' + items.length + '건');

  var updated = 0;
  items.forEach(function(item) {
    var code = (item.testItemCode || '').toUpperCase();
    if (PA_FEES[code] !== undefined) {
      item.fee = PA_FEES[code];
      updated++;
    }
    if (PA_UNITS[code]) {
      item.unit = PA_UNITS[code];
    }
  });

  await db.collection('settings').doc('refFeeMapping').update({ items: items });
  log('✅ 수수료 업데이트: ' + updated + '건');
  log('=== 수수료 업데이트 완료 ===');
}
