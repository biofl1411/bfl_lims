var logEl = document.getElementById('log');
function log(msg) { logEl.textContent += msg + '\n'; logEl.scrollTop = logEl.scrollHeight; }

async function runUpdate() {
  var db = firebase.firestore();
  var codes = Object.keys(PA_UNITS);
  log('업데이트 대상: ' + codes.length + '건');

  var batch = db.batch();
  var batchCount = 0;
  var totalUpdated = 0;
  var notFound = 0;

  for (var i = 0; i < codes.length; i++) {
    var code = codes[i];
    var unit = PA_UNITS[code];

    // mfds_test_items에서 해당 코드 찾기
    var snap = await db.collection('mfds_test_items').where('시험항목코드', '==', code).get();
    if (snap.empty) {
      log('  ❌ ' + code + ' 미발견');
      notFound++;
      continue;
    }

    snap.forEach(function(doc) {
      batch.update(doc.ref, { '단위': unit });
      batchCount++;
      totalUpdated++;
    });

    // batch 500건 제한
    if (batchCount >= 450) {
      await batch.commit();
      log('  ✅ ' + totalUpdated + '건 커밋');
      batch = db.batch();
      batchCount = 0;
    }
  }

  if (batchCount > 0) {
    await batch.commit();
    log('  ✅ ' + totalUpdated + '건 커밋');
  }

  log('');
  log('=== 완료 ===');
  log('업데이트: ' + totalUpdated + '건');
  log('미발견: ' + notFound + '건');
}
