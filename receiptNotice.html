<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioFoodLab LIMS - 접수 공지</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;height:100vh;background:#f8f9fb;font-size:13px;overflow:hidden;display:flex}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;margin-left:250px;height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e2e6ed;padding:0 24px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;color:#1a2332}
.topbar-sep{color:#c8d6e5}
.topbar-sub{font-size:13px;color:#5f6b7a}
.content{flex:1;padding:24px;overflow-y:auto}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#1a73e8;color:#fff}.btn-primary:hover{background:#1557b0}
.btn-secondary{background:#fff;color:#5f6b7a;border:1px solid #e2e6ed}.btn-secondary:hover{background:#f0f2f5}
.btn-danger{background:#fff;color:#ef4444;border:1px solid #fecaca}.btn-danger:hover{background:#fef2f2}
.btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}
.card{background:#fff;border-radius:12px;border:1px solid #e2e6ed;margin-bottom:16px}
.card-hd{padding:16px 20px;border-bottom:1px solid #eef0f4;display:flex;align-items:center;gap:10px}
.card-hd h3{font-size:15px;font-weight:700;color:#1a2332}
.card-hd .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.card-bd{padding:20px}

/* 공지 항목 테이블 */
.notice-table{width:100%;border-collapse:collapse}
.notice-table th{background:#f8f9fb;padding:10px 14px;font-size:11px;font-weight:700;color:#5f6b7a;text-align:left;border-bottom:2px solid #e2e6ed;white-space:nowrap}
.notice-table td{padding:10px 14px;border-bottom:1px solid #eef0f4;font-size:13px;vertical-align:middle}
.notice-table tr:hover{background:#fafbfc}
.notice-table .center{text-align:center}
.notice-table .no-col{width:50px;text-align:center;font-weight:700;color:#1a73e8}
.notice-table .common-col{width:70px;text-align:center}
.notice-table .action-col{width:80px;text-align:center}

.notice-input{width:100%;padding:8px 12px;border:1px solid #e2e6ed;border-radius:6px;font-size:13px;font-family:inherit}
.notice-input:focus{outline:none;border-color:#1a73e8;box-shadow:0 0 0 3px rgba(26,115,232,0.1)}

.common-check{width:18px;height:18px;cursor:pointer;accent-color:#1a73e8}

/* 추가 영역 */
.add-area{display:flex;gap:10px;align-items:center;margin-top:16px;padding:14px;background:#f8f9fb;border-radius:10px;border:1px dashed #d0d5dd}
.add-area input{flex:1}

/* 저장 상태 */
.save-status{font-size:12px;color:#10b981;opacity:0;transition:opacity .3s}
.save-status.show{opacity:1}

/* 빈 상태 */
.empty-row{text-align:center;padding:30px;color:#9ca3af;font-size:13px}

/* 드래그 */
.drag-handle{cursor:grab;color:#c8d6e5;font-size:16px;user-select:none}
.drag-handle:hover{color:#5f6b7a}
.dragging{opacity:0.5;background:#e8f0fe!important}
</style>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/firestore-helpers.js"></script>
<script src="js/sidebar.js?v=2"></script>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
    <div class="topbar">
        <span class="topbar-title">접수 관리</span>
        <span class="topbar-sep">›</span>
        <span class="topbar-sub">접수 공지</span>
    </div>
    <div class="content">
        <div class="card">
            <div class="card-hd">
                <h3>접수 공지 관리</h3>
                <div class="right">
                    <span class="save-status" id="save-status">저장되었습니다</span>
                    <button class="btn btn-primary" onclick="saveAll()">전체 저장</button>
                    <button class="btn btn-secondary" onclick="loadData()">새로고침</button>
                </div>
            </div>
            <div class="card-bd">
                <p style="font-size:12px;color:#5f6b7a;margin-bottom:16px">
                    자주 사용하는 공지 문구를 등록합니다. "공통"으로 체크하면 모든 검사목적에서 공통으로 표시됩니다.<br>
                    접수등록에서 공지를 선택하면 비고 입력란이 나타나며, 입력한 내용은 성적서의 "비고 또는 기타" 항목에 기재됩니다.
                </p>

                <table class="notice-table" id="notice-table">
                    <thead>
                        <tr>
                            <th style="width:30px"></th>
                            <th class="no-col">No.</th>
                            <th>공지 내용</th>
                            <th class="common-col">공통</th>
                            <th class="action-col">삭제</th>
                        </tr>
                    </thead>
                    <tbody id="notice-tbody">
                        <tr><td colspan="5" class="empty-row">로딩 중...</td></tr>
                    </tbody>
                </table>

                <!-- 추가 영역 -->
                <div class="add-area">
                    <input type="text" class="notice-input" id="new-notice-text" placeholder="새 공지 문구를 입력하세요..." onkeydown="if(event.key==='Enter')addNotice()">
                    <label style="display:flex;align-items:center;gap:4px;white-space:nowrap;font-size:12px;cursor:pointer">
                        <input type="checkbox" class="common-check" id="new-notice-common"> 공통
                    </label>
                    <button class="btn btn-primary" onclick="addNotice()">+ 추가</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// db는 firebase-init.js에서 이미 선언됨

var noticeItems = []; // [{text, common}]

// ============================================================================
// 초기 로드
// ============================================================================
document.addEventListener('DOMContentLoaded', loadData);

async function loadData() {
    try {
        var doc = await db.collection('settings').doc('receiptNotices').get();
        if (doc.exists && doc.data().items) {
            noticeItems = doc.data().items;
        } else if (doc.exists && doc.data().notices) {
            // 기존 형식 마이그레이션 (검사목적별 텍스트 → 항목 리스트)
            var old = doc.data().notices;
            noticeItems = [];
            Object.keys(old).forEach(function(key) {
                if (old[key] && old[key].trim()) {
                    noticeItems.push({ text: old[key].trim(), common: false });
                }
            });
        } else {
            noticeItems = [];
        }
        renderTable();
    } catch (e) {
        console.error('로드 실패:', e);
        document.getElementById('notice-tbody').innerHTML =
            '<tr><td colspan="5" class="empty-row" style="color:#ef4444">로드 실패: ' + e.message + '</td></tr>';
    }
}

// ============================================================================
// 테이블 렌더
// ============================================================================
function renderTable() {
    var tbody = document.getElementById('notice-tbody');
    if (noticeItems.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-row">등록된 공지가 없습니다. 아래에서 추가하세요.</td></tr>';
        return;
    }

    tbody.innerHTML = noticeItems.map(function(item, idx) {
        return '<tr draggable="true" ondragstart="dragStart(event,' + idx + ')" ondragover="dragOver(event)" ondrop="dropItem(event,' + idx + ')" ondragend="dragEnd(event)">' +
            '<td class="center"><span class="drag-handle">⠿</span></td>' +
            '<td class="no-col">' + (idx + 1) + '</td>' +
            '<td><input type="text" class="notice-input" value="' + escapeHtml(item.text) + '" onchange="updateText(' + idx + ',this.value)"></td>' +
            '<td class="common-col"><input type="checkbox" class="common-check"' + (item.common ? ' checked' : '') + ' onchange="updateCommon(' + idx + ',this.checked)"></td>' +
            '<td class="action-col"><button class="btn btn-danger" style="padding:4px 10px" onclick="removeItem(' + idx + ')">삭제</button></td>' +
            '</tr>';
    }).join('');
}

function escapeHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================================
// 항목 조작
// ============================================================================
function addNotice() {
    var input = document.getElementById('new-notice-text');
    var text = input.value.trim();
    if (!text) { input.focus(); return; }

    var common = document.getElementById('new-notice-common').checked;
    noticeItems.push({ text: text, common: common });
    input.value = '';
    document.getElementById('new-notice-common').checked = false;
    renderTable();
    autoSave();
}

function updateText(idx, value) {
    noticeItems[idx].text = value;
    autoSave();
}

function updateCommon(idx, checked) {
    noticeItems[idx].common = checked;
    autoSave();
}

function removeItem(idx) {
    if (!confirm((idx+1) + '번 공지를 삭제하시겠습니까?')) return;
    noticeItems.splice(idx, 1);
    renderTable();
    autoSave();
}

// ============================================================================
// 드래그 정렬
// ============================================================================
var dragIdx = -1;

function dragStart(e, idx) {
    dragIdx = idx;
    e.target.closest('tr').classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
}

function dragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
}

function dropItem(e, targetIdx) {
    e.preventDefault();
    if (dragIdx < 0 || dragIdx === targetIdx) return;
    var item = noticeItems.splice(dragIdx, 1)[0];
    noticeItems.splice(targetIdx, 0, item);
    dragIdx = -1;
    renderTable();
    autoSave();
}

function dragEnd(e) {
    dragIdx = -1;
    document.querySelectorAll('.dragging').forEach(function(el) { el.classList.remove('dragging'); });
}

// ============================================================================
// 저장
// ============================================================================
var saveTimer = null;

function autoSave() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(saveAll, 1000);
}

async function saveAll() {
    if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
    try {
        await db.collection('settings').doc('receiptNotices').set({
            items: noticeItems,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        var status = document.getElementById('save-status');
        status.classList.add('show');
        setTimeout(function() { status.classList.remove('show'); }, 2000);
    } catch (e) {
        alert('저장 실패: ' + e.message);
    }
}
</script>
</body>
</html>
