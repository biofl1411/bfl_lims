<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioFoodLab LIMS - 접수 공지</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;height:100vh;background:#f8f9fb;font-size:13px;overflow:hidden;display:flex}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;margin-left:250px;height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e2e6ed;padding:0 24px;height:52px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;color:#1a2332}
.topbar-sep{color:#c8d6e5}
.topbar-sub{font-size:13px;color:#5f6b7a}
.content{flex:1;padding:24px;overflow-y:auto}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:#1a73e8;color:#fff}.btn-primary:hover{background:#1557b0}
.btn-secondary{background:#fff;color:#5f6b7a;border:1px solid #e2e6ed}.btn-secondary:hover{background:#f0f2f5}
.btn-danger{background:#fff;color:#ef4444;border:1px solid #fecaca}.btn-danger:hover{background:#fef2f2}
.card{background:#fff;border-radius:12px;border:1px solid #e2e6ed;margin-bottom:16px}
.card-hd{padding:16px 20px;border-bottom:1px solid #eef0f4;display:flex;align-items:center;gap:10px}
.card-hd h3{font-size:15px;font-weight:700;color:#1a2332}
.card-hd .right{margin-left:auto;display:flex;gap:8px;align-items:center}
.card-bd{padding:20px}

/* 목적 리스트 */
.purpose-list{display:flex;flex-direction:column;gap:2px;max-height:calc(100vh - 260px);overflow-y:auto;border:1px solid #e2e6ed;border-radius:10px}
.purpose-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background .1s;border-bottom:1px solid #f0f2f5}
.purpose-item:last-child{border-bottom:none}
.purpose-item:hover{background:#f8f9fb}
.purpose-item.active{background:#e8f0fe;border-left:3px solid #1a73e8}
.purpose-item .name{font-size:13px;font-weight:500;color:#1a2332;flex:1}
.purpose-item .count{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;background:#f3f4f6;color:#9ca3af}
.purpose-item .count.has{background:#e8f5e9;color:#2e7d32}
.purpose-item.common-item{border-bottom:2px solid #e2e6ed}
.purpose-item.common-item .name{color:#1a73e8;font-weight:700}

/* 오른쪽 항목 영역 */
.notice-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border:1px solid #eef0f4;border-radius:8px;margin-bottom:6px}
.notice-item .no{font-weight:700;color:#1a73e8;min-width:28px;text-align:center}
.notice-item .text-input{flex:1;padding:8px 12px;border:1px solid #e2e6ed;border-radius:6px;font-size:13px;font-family:inherit}
.notice-item .text-input:focus{outline:none;border-color:#1a73e8;box-shadow:0 0 0 3px rgba(26,115,232,0.1)}
.notice-item .del-btn{background:none;border:none;color:#d0d5dd;font-size:16px;cursor:pointer;padding:4px}
.notice-item .del-btn:hover{color:#ef4444}

.add-area{display:flex;gap:10px;align-items:center;margin-top:10px;padding:12px 14px;background:#f8f9fb;border-radius:8px;border:1px dashed #d0d5dd}
.add-area input{flex:1;padding:8px 12px;border:1px solid #e2e6ed;border-radius:6px;font-size:13px;font-family:inherit}
.add-area input:focus{outline:none;border-color:#1a73e8}

.empty-msg{text-align:center;padding:40px 20px;color:#9ca3af;font-size:13px}
.save-status{font-size:12px;color:#10b981;opacity:0;transition:opacity .3s}
.save-status.show{opacity:1}
.selected-label{font-size:14px;font-weight:700;color:#1a2332;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.selected-label .tag{font-size:11px;padding:2px 8px;border-radius:8px;background:#e8f0fe;color:#1a73e8}
</style>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/firestore-helpers.js"></script>
<script src="js/sidebar.js?v=2"></script>
</head>
<body>
<aside class="sidebar" id="sidebar"></aside>
<div class="main">
    <div class="topbar">
        <span class="topbar-title">접수 관리</span>
        <span class="topbar-sep">›</span>
        <span class="topbar-sub">접수 공지</span>
    </div>
    <div class="content">
        <div class="card">
            <div class="card-hd">
                <h3>접수 공지 관리</h3>
                <div class="right">
                    <span class="save-status" id="save-status">저장되었습니다</span>
                    <button class="btn btn-secondary" onclick="loadData()">새로고침</button>
                </div>
            </div>
            <div class="card-bd">
                <p style="font-size:12px;color:#5f6b7a;margin-bottom:16px">
                    검사목적별로 자주 사용하는 공지 문구를 등록합니다. 접수등록에서 해당 검사목적 선택 시 등록된 공지만 표시됩니다.<br>
                    <b>공통</b>에 등록한 공지는 모든 검사목적에서 함께 표시됩니다.
                </p>
                <div style="display:grid;grid-template-columns:250px 1fr;gap:20px">
                    <!-- 왼쪽: 검사목적 리스트 -->
                    <div>
                        <div style="font-size:12px;font-weight:600;color:#5f6b7a;margin-bottom:8px">검사목적</div>
                        <div class="purpose-list" id="purpose-list">
                            <div class="empty-msg">로딩 중...</div>
                        </div>
                    </div>
                    <!-- 오른쪽: 공지 항목 -->
                    <div id="right-panel">
                        <div class="empty-msg" id="empty-state">왼쪽에서 검사목적을 선택하세요</div>
                        <div id="items-area" style="display:none">
                            <div class="selected-label">
                                <span id="selected-name"></span>
                                <span class="tag" id="selected-count"></span>
                            </div>
                            <div id="items-list"></div>
                            <div class="add-area">
                                <input type="text" id="new-text" placeholder="새 공지 문구 입력..." onkeydown="if(event.key==='Enter')addItem()">
                                <button class="btn btn-primary" onclick="addItem()">+ 추가</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// db는 firebase-init.js에서 이미 선언됨
var purposes = [];        // 검사목적 목록
var allItems = [];        // 전체 공지: [{text, purpose}] (purpose='공통' 또는 검사목적명)
var selectedPurpose = ''; // 현재 선택 ('공통' 또는 검사목적명)

document.addEventListener('DOMContentLoaded', loadData);

async function loadData() {
    try {
        var purposeDoc = await db.collection('settings').doc('inspectionPurposes').get();
        if (purposeDoc.exists && purposeDoc.data().purposes) {
            purposes = purposeDoc.data().purposes
                .filter(function(p) { return p.o !== 0; })
                .sort(function(a, b) { return (a.c || 999) - (b.c || 999); });
        }

        var noticeDoc = await db.collection('settings').doc('receiptNotices').get();
        if (noticeDoc.exists && noticeDoc.data().items) {
            allItems = noticeDoc.data().items;
        } else {
            allItems = [];
        }

        renderPurposeList();
        if (selectedPurpose) renderItems();
    } catch (e) {
        console.error('로드 실패:', e);
        document.getElementById('purpose-list').innerHTML =
            '<div class="empty-msg" style="color:#ef4444">로드 실패: ' + e.message + '</div>';
    }
}

function getItemsFor(purpose) {
    return allItems.filter(function(item) { return item.purpose === purpose; });
}

function renderPurposeList() {
    var list = document.getElementById('purpose-list');
    var html = '';

    // 공통 항목
    var commonCount = getItemsFor('공통').length;
    html += '<div class="purpose-item common-item' + (selectedPurpose === '공통' ? ' active' : '') + '" onclick="selectPurpose(\'공통\')">' +
        '<span class="name">공통</span>' +
        '<span class="count' + (commonCount > 0 ? ' has' : '') + '">' + commonCount + '건</span></div>';

    // 검사목적별
    purposes.forEach(function(p) {
        var name = p.n;
        var cnt = getItemsFor(name).length;
        html += '<div class="purpose-item' + (selectedPurpose === name ? ' active' : '') + '" onclick="selectPurpose(\'' + name.replace(/'/g, "\\'") + '\')">' +
            '<span class="name">' + name + '</span>' +
            '<span class="count' + (cnt > 0 ? ' has' : '') + '">' + cnt + '건</span></div>';
    });

    list.innerHTML = html;
}

function selectPurpose(name) {
    selectedPurpose = name;
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('items-area').style.display = '';
    renderPurposeList();
    renderItems();
}

function renderItems() {
    var items = getItemsFor(selectedPurpose);
    document.getElementById('selected-name').textContent = selectedPurpose;
    document.getElementById('selected-count').textContent = items.length + '건';

    var listEl = document.getElementById('items-list');
    if (items.length === 0) {
        listEl.innerHTML = '<div class="empty-msg">등록된 공지가 없습니다.</div>';
    } else {
        listEl.innerHTML = items.map(function(item, localIdx) {
            var globalIdx = allItems.indexOf(item);
            return '<div class="notice-item">' +
                '<span class="no">' + (localIdx + 1) + '</span>' +
                '<input type="text" class="text-input" value="' + escapeHtml(item.text) + '" onchange="updateItem(' + globalIdx + ',this.value)">' +
                '<button class="del-btn" onclick="removeItem(' + globalIdx + ')" title="삭제">✕</button>' +
                '</div>';
        }).join('');
    }

    document.getElementById('new-text').value = '';
    document.getElementById('new-text').focus();
}

function escapeHtml(str) {
    return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addItem() {
    var input = document.getElementById('new-text');
    var text = input.value.trim();
    if (!text || !selectedPurpose) { input.focus(); return; }

    allItems.push({ text: text, purpose: selectedPurpose });
    renderItems();
    renderPurposeList();
    autoSave();
}

function updateItem(globalIdx, value) {
    allItems[globalIdx].text = value;
    autoSave();
}

function removeItem(globalIdx) {
    var item = allItems[globalIdx];
    if (!confirm('"' + item.text.substring(0, 30) + '..." 삭제하시겠습니까?')) return;
    allItems.splice(globalIdx, 1);
    renderItems();
    renderPurposeList();
    autoSave();
}

var saveTimer = null;
function autoSave() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(saveAll, 800);
}

async function saveAll() {
    if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
    try {
        await db.collection('settings').doc('receiptNotices').set({
            items: allItems,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        var status = document.getElementById('save-status');
        status.classList.add('show');
        setTimeout(function() { status.classList.remove('show'); }, 2000);
    } catch (e) {
        alert('저장 실패: ' + e.message);
    }
}
</script>
</body>
</html>
