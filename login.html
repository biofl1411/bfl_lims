<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioFoodLab LIMS - 로그인</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.login-wrap{width:100%;max-width:420px;padding:24px}
.login-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:48px 40px;
  backdrop-filter:blur(16px);
  box-shadow:0 32px 64px rgba(0,0,0,0.4);
}
.logo-area{text-align:center;margin-bottom:36px}
.logo-icon{
  width:64px;height:64px;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  border-radius:16px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:32px;margin-bottom:16px;
  box-shadow:0 8px 24px rgba(102,126,234,0.4);
}
.logo-title{font-size:22px;font-weight:700;color:#f1f5f9}
.logo-sub{font-size:13px;color:#64748b;margin-top:4px}
.form-group{margin-bottom:18px}
.form-label{display:block;font-size:13px;font-weight:600;color:#94a3b8;margin-bottom:8px}
.form-input{
  width:100%;padding:12px 14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;
  font-size:14px;color:#e2e8f0;
  outline:none;transition:border-color .2s,background .2s;
  font-family:inherit;
}
.form-input::placeholder{color:#475569}
.form-input:focus{border-color:#4fc3f7;background:rgba(79,195,247,0.06)}
.form-input:-webkit-autofill,
.form-input:-webkit-autofill:focus{
  -webkit-box-shadow:0 0 0 1000px #1e293b inset;
  -webkit-text-fill-color:#e2e8f0;
  border-color:#4fc3f7;
}
.pw-wrap{position:relative}
.pw-wrap .form-input{padding-right:44px}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#64748b;cursor:pointer;font-size:16px;padding:4px;
  transition:color .15s;
}
.pw-toggle:hover{color:#94a3b8}
.btn-login{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#1a56db,#2563eb);
  border:none;border-radius:10px;
  font-size:15px;font-weight:600;color:white;
  cursor:pointer;transition:all .2s;
  font-family:inherit;margin-top:8px;
  box-shadow:0 4px 16px rgba(37,99,235,0.4);
}
.btn-login:hover{background:linear-gradient(135deg,#1d4ed8,#3b82f6);transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,0.5)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.error-msg{
  background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);
  border-radius:8px;padding:10px 14px;
  font-size:13px;color:#fca5a5;
  margin-top:16px;display:none;
}
.error-msg.visible{display:block}
.footer-text{text-align:center;margin-top:28px;font-size:12px;color:#334155}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">🔬</div>
      <div class="logo-title">BioFoodLab LIMS</div>
      <div class="logo-sub">Laboratory Information Management System</div>
    </div>

    <div class="form-group">
      <label class="form-label" for="inp-email">이메일</label>
      <input class="form-input" id="inp-email" type="email" placeholder="name@bfl.com" autocomplete="username" />
    </div>
    <div class="form-group">
      <label class="form-label" for="inp-pw">비밀번호</label>
      <div class="pw-wrap">
        <input class="form-input" id="inp-pw" type="password" placeholder="비밀번호 입력" autocomplete="current-password" />
        <button class="pw-toggle" id="btn-pw-toggle" type="button" tabindex="-1" onclick="togglePw()">👁️</button>
      </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">로그인</button>

    <div class="error-msg" id="err-msg"></div>

    <div class="footer-text">BioFoodLab Co., Ltd. &copy; 2025</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script>
const _cfg = {
  apiKey:"AIzaSyDbG7L2gR9UovOYQXE0vv8nbH0_DqqXyyo",
  authDomain:"bfl-lims.firebaseapp.com",
  projectId:"bfl-lims"
};
if (!firebase.apps.length) firebase.initializeApp(_cfg);
var _auth = firebase.auth();
var _persistenceSet = false;

// 이미 로그인된 경우 → 즉시 이동
_auth.onAuthStateChanged(function(user) {
  if (user && !user.isAnonymous) {
    _redirect();
  }
});

function _redirect() {
  var p = new URLSearchParams(location.search).get('redirect') || 'index.html';
  // 외부 URL 방어
  if (p.startsWith('http') || p.startsWith('//')) p = 'index.html';
  window.location.replace(p);
}

function togglePw() {
  var i = document.getElementById('inp-pw');
  var b = document.getElementById('btn-pw-toggle');
  if (i.type === 'password') { i.type = 'text'; b.textContent = '🙈'; }
  else { i.type = 'password'; b.textContent = '👁️'; }
}

function showError(msg) {
  var el = document.getElementById('err-msg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('err-msg').classList.remove('visible');
}

async function doLogin() {
  var email = document.getElementById('inp-email').value.trim();
  var pw = document.getElementById('inp-pw').value;
  var btn = document.getElementById('btn-login');

  hideError();
  if (!email) { showError('이메일을 입력하세요.'); return; }
  if (!pw) { showError('비밀번호를 입력하세요.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>로그인 중...';

  try {
    await _auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    await _auth.signInWithEmailAndPassword(email, pw);
    // onAuthStateChanged가 _redirect() 호출
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '로그인';
    var msg = '로그인에 실패했습니다.';
    if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
      msg = '이메일 또는 비밀번호가 올바르지 않습니다.';
    } else if (e.code === 'auth/too-many-requests') {
      msg = '로그인 시도가 너무 많습니다. 잠시 후 다시 시도하세요.';
    } else if (e.code === 'auth/invalid-email') {
      msg = '올바른 이메일 형식이 아닙니다.';
    } else if (e.code === 'auth/network-request-failed') {
      msg = '네트워크 오류가 발생했습니다. 연결을 확인하세요.';
    }
    showError(msg);
  }
}

// Enter 키 로그인
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
