function stdChgAutoEndDate() {
  var fromEl = document.getElementById('std-chg-applyFrom');
  var toEl = document.getElementById('std-chg-applyTo');
  if (!fromEl || !toEl || !fromEl.value) return;
  var d = new Date(fromEl.value);
  d.setMonth(d.getMonth() + 3);
  toEl.value = d.toISOString().slice(0, 10);
}

function closeStdChangeModal() {
  var modal = document.getElementById('std-change-modal');
  if (modal) modal.style.display = 'none';
}

async function saveStdChangeModal() {
  var idx = _stdChangeIdx;
  var item = currentTestItems[idx];
  if (!item) return;
  var samples = currentReceipt ? (currentReceipt.samples || [currentReceipt]) : [];
  var sampleFoodType = (samples[currentSampleIdx] || {}).foodType || '';

  // 변경할 값 수집
  var newOverrides = {
    stdInfo: {
      standardName: document.getElementById('std-chg-standardName').value,
      standardConcentration: document.getElementById('std-chg-standardConcentration').value,
      manufacturer: document.getElementById('std-chg-manufacturer').value
    },
    stdConc: {
      stdBlank: document.getElementById('std-chg-stdBlank').value,
      std1: document.getElementById('std-chg-std1').value,
      std2: document.getElementById('std-chg-std2').value,
      std3: document.getElementById('std-chg-std3').value,
      std4: document.getElementById('std-chg-std4').value,
      std5: document.getElementById('std-chg-std5').value
    },
    applyFrom: document.getElementById('std-chg-applyFrom').value,
    applyTo: document.getElementById('std-chg-applyTo').value
  };

  // 시험일지에 저장
  var ftEntry = null;
  for (var i = 0; i < _formTemplatesList.length; i++) {
    var t = _formTemplatesList[i];
    if (t.itemName === item.testItemName && t.foodType === sampleFoodType) { ftEntry = t; break; }
  }
  if (!ftEntry) { showToast('해당 시험일지를 찾을 수 없습니다', 'error'); return; }

  try {
    // 시험일지 문서 ID 찾기
    var snap = await db.collection('formTemplates').where('appliedToLims', '==', true).get();
    var docId = null;
    snap.docs.forEach(function(d) {
      var data = d.data();
      var ft = '';
      if (data.analyzed && data.analyzed.sections) {
        data.analyzed.sections.forEach(function(sec) {
          (sec.fields || []).forEach(function(f) {
            if (f.id === 'sampleType' && f.exampleValue) ft = f.exampleValue.trim();
          });
        });
      }
      if (!ft) ft = (data.sampleType || '').trim();
      var iName = (data.representativeItem || '').trim();
      if (iName === item.testItemName && ft === sampleFoodType) docId = d.id;
    });

    if (!docId) { showToast('시험일지 문서를 찾을 수 없습니다', 'error'); return; }

    await db.collection('formTemplates').doc(docId).update({
      _overrides: newOverrides
    });

    // 캐시 갱신
    ftEntry.overrides = newOverrides;

    closeStdChangeModal();
    showToast('값 변경 및 적용 기간 저장 완료', 'success');

    // 기록서 폼 새로고침
    var saved = {};
    var tmpl = findFormTemplate(item.testItemName, sampleFoodType);
    var detailRow = document.getElementById('item-detail-' + idx);
    if (detailRow && tmpl) {
      detailRow.querySelector('td').innerHTML = renderCalcForm(idx, item, tmpl, saved);
      calcItemResult(idx);
    }
  } catch(e) {
    showToast('저장 실패: ' + e.message, 'error');
  }
}

/* ============================================================
   동적 계산 엔진 (formTemplates 기반)
   ============================================================ */
function calcItemResult(idx) {
  var item = currentTestItems[idx];
  if (!item) return;
  var samples = currentReceipt ? (currentReceipt.samples || [currentReceipt]) : [];
  var sampleFoodType = (samples[currentSampleIdx] || {}).foodType || '';
  var tmpl = findFormTemplate(item.testItemName, sampleFoodType);
  if (!tmpl) return;
  markModified();

  var sections = tmpl.sections || [];
  var calculations = tmpl.calculations || [];
  var judgment = tmpl.judgmentRule || {};
  var _roundingRules = tmpl._roundingRules || [{ decimal: 2, mode: 'round' }];

  // 1) 모든 필드 값 수집
  var key = currentSampleIdx + '_' + idx;
  var vals = {};
  _rawInputs[key] = {};
  sections.forEach(function(sec) {
    (sec.fields || []).forEach(function(f) {
      var el = document.getElementById('idf-' + f.id + '-' + idx);
      var v = el ? el.value : '';
      vals[f.id] = (f.type === 'number') ? (parseFloat(v) || 0) : v;
      _rawInputs[key][f.id] = v;
    });
  });

  // 2) 계산식 실행
  var calcResults = {};
  calculations.forEach(function(c, ci) {
    try {
      // formula 안의 변수명을 vals에서 치환하여 eval
      var expr = c.formula;
      Object.keys(vals).forEach(function(k) {
        expr = expr.replace(new RegExp('\\b' + k + '\\b', 'g'), '(' + (typeof vals[k] === 'number' ? vals[k] : 0) + ')');
      });
      // 이전 계산 결과도 참조 가능
      Object.keys(calcResults).forEach(function(k) {
        expr = expr.replace(new RegExp('\\b' + k + '\\b', 'g'), '(' + calcResults[k] + ')');
      });
      var result = Function('"use strict"; return (' + expr + ')')();
      result = Math.max(0, result);
      var rawResult = result;
      // 전체 자릿수 결과 표시
      var rawEl = document.getElementById('idf-calc-raw-' + ci + '-' + idx);
      if (rawEl) rawEl.textContent = result;
      // 다중 규칙: 순서대로 적용
      for (var ri = 0; ri < _roundingRules.length; ri++) {
        var rule = _roundingRules[ri];
        result = parseFloat(applyRounding(result, rule.decimal, rule.mode));
      }
      var lastRule = _roundingRules[_roundingRules.length - 1] || { decimal: 2, mode: 'round' };
      var resultStr = applyRounding(result, lastRule.decimal, lastRule.mode);
      calcResults[c.id] = result;

      var el = document.getElementById('idf-calc-' + ci + '-' + idx);
      if (el) el.textContent = resultStr;
    } catch(e) {
      var el2 = document.getElementById('idf-calc-' + ci + '-' + idx);
      if (el2) el2.textContent = '계산오류';
      console.warn('계산식 오류:', c.formula, e);
    }
  });

  // 3) 수식 미리보기 업데이트
  var formulaEl = document.getElementById('idf-formula-' + idx);
  if (formulaEl && calculations.length > 0) {
    var preview = calculations.map(function(c) {
      var expr = c.formulaText || c.formula || '';
      // 변수에 실제 값 표시
      Object.keys(vals).forEach(function(k) {
        if (typeof vals[k] === 'number' && vals[k] !== 0) {
          expr = expr.replace(new RegExp(k, 'g'), vals[k]);
        }
      });
      var rval = calcResults[c.id] != null ? applyRounding(calcResults[c.id], lastRule.decimal, lastRule.mode) : '-';
      return (c.label || c.id) + ': ' + expr + ' = ' + rval + ' ' + (c.unit || '');
    }).join('\n');
    formulaEl.textContent = preview;
  }

  // 4) 판정
  var judgeEl = document.getElementById('idf-judge-' + idx);
  var finalResult = null;
  if (judgment.resultFieldId && calcResults[judgment.resultFieldId] != null) {
    finalResult = calcResults[judgment.resultFieldId];
  } else if (Object.keys(calcResults).length > 0) {
    // 마지막 계산결과 사용
    var lastKey = Object.keys(calcResults).pop();
    finalResult = calcResults[lastKey];
  }

  if (finalResult != null && judgeEl) {
    // 판정 기준: 1) 양식의 judgmentRule  2) 시험항목의 maxValue (식약처 기준규격)
    var maxVal = (judgment.maxValue != null) ? judgment.maxValue : (parseFloat(item.maxValue) || null);
    if (maxVal != null) {
      var pass = finalResult <= maxVal;
      judgeEl.textContent = pass ? '적합' : '부적합';
      judgeEl.style.color = pass ? '#10b981' : '#ef4444';
      // 규칙 적용 판정도 표시
      var judgeRuleEl = document.getElementById('idf-judge-rule-' + idx);
      if (judgeRuleEl) {
        judgeRuleEl.textContent = pass ? '적합' : '부적합';
        judgeRuleEl.style.color = pass ? '#059669' : '#ef4444';
      }
    } else {
      judgeEl.textContent = '-';
      judgeEl.style.color = '#999';
    }
  }

  // 5) 메인 테이블 측정값에 반영
  if (finalResult != null) {
    var lastRule2 = _roundingRules[_roundingRules.length - 1] || { decimal: 2, mode: 'round' };
    var resultStr2 = applyRounding(finalResult, lastRule2.decimal, lastRule2.mode);
    var mainInput = document.querySelector('.result-input[data-idx="' + idx + '"]');
    if (mainInput) {
      mainInput.value = resultStr2;
      mainInput.removeAttribute('readonly');
      mainInput.style.background = '';
      mainInput.style.cursor = '';
      onResultInput(idx, mainInput);
    }
  }
}

// 헬퍼
/* 소수점 처리: 버림(floor), 반올림(round), 내림(ceil) */
function applyRounding(value, dp, mode) {
  dp = dp || 2;
  mode = mode || 'round';
  var factor = Math.pow(10, dp);
  var result;
  if (mode === 'floor') {
    result = Math.floor(value * factor) / factor;
  } else if (mode === 'ceil') {
    result = Math.ceil(value * factor) / factor;
  } else {
    result = Math.round(value * factor) / factor;
  }
  return result.toFixed(dp);
}

function gv(id) { var el = document.getElementById(id); return el ? el.value : ''; }
function se(id, text) { var el = document.getElementById(id); if (el) el.textContent = text; }

/* generateDiaryCn() 제거됨 — 시험일지는 '시험 결재 > 시험일지'에서 관리 */

/* ============================================================
   결과 수집
   ============================================================ */
function collectCurrentResults() {
  if (!currentTestItems.length) return;

  var items = [];
  currentTestItems.forEach(function(item, idx) {
    var input = document.querySelector('.result-input[data-idx="' + idx + '"]');
    var remarkInput = document.querySelector('.remark-input[data-idx="' + idx + '"]');
    var judgeCell = document.getElementById('judge-' + idx);
    var overrideCb = input ? input.closest('tr').querySelector('input[type="checkbox"]') : null;

    var mv = input ? input.value.trim() : '';
    var jr = judgeCell ? judgeCell.textContent.trim() : '';
    if (jr === '-') jr = '';

    // MFDS 결과값 처리 규칙 적용
    var processed = {};
    if (typeof MFDS_RULES !== 'undefined' && mv) {
      processed = MFDS_RULES.processResultValue(mv, item, jr);
    }

    items.push({
      testItemCode: item.testItemCode || '',
      testItemName: item.testItemName || '',
      standard: item.standard || '',
      unit: item.unit || '',
      judgmentType: item.judgmentType || '',
      maxValue: item.maxValue || '',
      maxValueCode: item.maxValueCode || '',
      minValue: item.minValue || '',
      minValueCode: item.minValueCode || '',
      precision: item.precision || '',
      measuredValue: mv,
      judgmentResult: jr,
      autoJudgment: (overrideCb && overrideCb.checked) ? '' : jr,
      manualOverride: overrideCb ? overrideCb.checked : false,
      remarks: remarkInput ? remarkInput.value.trim() : '',
      // MFDS 결과값 처리 필드
      markValue: processed.markValue || mv,
      validCphr: processed.validCphr || item.precision || '',
      fdqntLimitApplcAt: processed.fdqntLimitApplcAt || 'N',
      fdqntLimitValue: processed.fdqntLimitValue || item.fdqntLimitValue || '',
      fdqntLimitBeloValue: processed.fdqntLimitBeloValue || item.fdqntLimitBeloValue || '',
      jdgmntFomCode: processed.jdgmntFomCode || '',
      jdgmntWordCode: processed.jdgmntWordCode || '',
      mxmmValueSeCode: processed.mxmmValueSeCode || '',
      mummValueSeCode: processed.mummValueSeCode || '',
      // 양식 기반 원시 입력 데이터
      rawInputs: _rawInputs[currentSampleIdx + '_' + idx] || {}
    });
  });

  currentResults[currentSampleIdx] = items;
}

/* ============================================================
   Firestore 저장
   ============================================================ */
async function saveResults() {
  if (!currentReceipt) { showToast('접수건을 선택해주세요', 'warning'); return; }

  collectCurrentResults();

  try {
    var r = currentReceipt;
    var samples = r.samples || [];
    var totalSamples = samples.length || 1;

    // 현재 시료 결과 저장
    var items = currentResults[currentSampleIdx] || [];
    var allItemsJudged = items.length > 0 && items.every(function(it) { return it.measuredValue && it.judgmentResult; });
    var anyFail = items.some(function(it) { return it.judgmentResult === '부적합'; });

    var docData = {
      receiptNo: r.receiptNo,
      receiptId: r.id,
      sampleIdx: currentSampleIdx,
      testStartDate: today(),
      testEndDate: '',
      testerName: '',
      diaryMemo: '',
      exprDiarySn: _exprDiarySn || null,
      items: items,
      overallResult: allItemsJudged ? (anyFail ? '부적합' : '적합') : '',
      status: allItemsJudged ? '결과입력완료' : '시험중',
      mfdsSubmitted: (savedTestResults[currentSampleIdx] || {}).mfdsSubmitted || false,
      mfdsResultSaved: (savedTestResults[currentSampleIdx] || {}).mfdsResultSaved || false
    };

    await fsSaveTestResult(docData);

    // 접수 상태 업데이트
    var allComplete = await fsCheckAllSamplesComplete(r.receiptNo, totalSamples);
    var newStatus = allComplete ? '결과입력완료' : '시험중';
    if (r.status !== newStatus) {
      await fsUpdateReceiptStatus(r.id, newStatus);
      r.status = newStatus;
    }

    // 캐시 업데이트
    savedTestResults[currentSampleIdx] = docData;
    isModified = false;

    showToast('결과가 저장되었습니다', 'success');
    updateStats();
    renderReceiptList();

  } catch(e) {
    console.error('저장 실패:', e);
    showToast('저장 실패: ' + e.message, 'error');
  }
}

/* ============================================================
   식약처 API 연동
   ============================================================ */
function toggleMfdsEnabled() {
  MFDS_ENABLED = document.getElementById('mfds-toggle').checked;
  localStorage.setItem('bfl_mfds_result_enabled', MFDS_ENABLED ? '1' : '0');
}

function openMfdsModal() {
  if (!MFDS_ENABLED) {
    showToast('식약처 전송이 비활성화 상태입니다. 활성화 후 다시 시도하세요.', 'warning');
    return;
  }
  if (!currentReceipt) { showToast('접수건을 선택해주세요', 'warning'); return; }

  collectCurrentResults();
  var items = currentResults[currentSampleIdx] || [];
  if (!items.length || !items[0].measuredValue) {
    showToast('측정값을 먼저 입력해주세요', 'warning');
    return;
  }

  var body = document.getElementById('mfds-modal-body');
  body.innerHTML = '<div class="alert alert-warning">식약처에 전송하면 <strong>취소/삭제가 불가능</strong>합니다. 신중하게 확인해주세요.</div>' +
    '<table class="result-table" style="font-size:12px"><thead><tr><th>시험항목</th><th>측정값</th><th>판정</th></tr></thead><tbody>' +
    items.map(function(it) {
      return '<tr><td>' + it.testItemName + '</td><td>' + it.measuredValue + '</td><td>' + getJudgeBadge(it.judgmentResult) + '</td></tr>';
    }).join('') +
    '</tbody></table>';

  document.getElementById('mfds-modal').classList.add('active');
}

function closeMfdsModal() {
  document.getElementById('mfds-modal').classList.remove('active');
}

async function confirmMfdsSubmit() {
  closeMfdsModal();

  // 먼저 Firestore 저장
  await saveResults();

  try {
    showToast('식약처 전송 중...', 'info');

    // 시험일지 SN 확인 (시험일지 페이지에서 등록된 것을 사용)
    var exprDiarySn = _exprDiarySn;

    // testResults에 exprDiarySn이 없으면 testDiaries에서 조회
    if (!exprDiarySn) {
      var receiptNo = currentReceipt.receiptNo || '';
      var sploreReqestNo = currentReceipt.sploreReqestNo || '';
      try {
        // testDiaries에서 해당 시료의 일지 조회 (receiptNo 또는 sploreReqestNo로 검색)
        var diarySnap = null;
        if (sploreReqestNo) {
          diarySnap = await db.collection('testDiaries')
            .where('sploreReqestNo', '==', sploreReqestNo)
            .where('exprDiarySn', '!=', '')
            .limit(1).get();
        }
        if ((!diarySnap || diarySnap.empty) && receiptNo) {
          diarySnap = await db.collection('testDiaries')
            .where('sampleId', '==', receiptNo)
            .where('exprDiarySn', '!=', '')
            .limit(1).get();
        }
        if (diarySnap && !diarySnap.empty) {
          exprDiarySn = diarySnap.docs[0].data().exprDiarySn;
          _exprDiarySn = exprDiarySn;
          // testResults에도 반영
          var docId = receiptNo + '_S' + currentSampleIdx;
          await db.collection('testResults').doc(docId).update({ exprDiarySn: exprDiarySn });
        }
      } catch(e) { console.warn('testDiaries 조회 실패:', e); }
    }

    // exprDiarySn이 없으면 diaryTemplates에서 항목코드로 일지 양식 조회 → 자동 등록
    if (!exprDiarySn) {
      var resultItems = currentResults[currentSampleIdx] || [];
      if (!resultItems.length) { showToast('결과 항목이 없습니다', 'error'); return; }

      try {
        showToast('일지 양식 조회 중...', 'info');
        // 항목코드별로 diaryTemplates 조회
        var itemCodes = resultItems.map(function(it) { return it.testItemCode; }).filter(Boolean);
        var diaryContent = '';
        for (var ci = 0; ci < itemCodes.length; ci++) {
          try {
            var tmplDoc = await db.collection('diaryTemplates').doc(itemCodes[ci]).get();
            if (tmplDoc.exists) {
              var tmpl = tmplDoc.data();
              diaryContent += '<h3>' + (ci+1) + '. ' + (tmpl.itemName || resultItems[ci].testItemName) + '</h3>';
              diaryContent += (tmpl.diaryCn || '') + '<br>';
            } else {
              diaryContent += '<h3>' + (ci+1) + '. ' + (resultItems[ci].testItemName || '') + '</h3>';
              diaryContent += '<p>기준: ' + (resultItems[ci].standard || '-') + ' | 결과: ' + (resultItems[ci].measuredValue || '-') + ' ' + (resultItems[ci].unit || '') + '</p>';
            }
          } catch(e2) { /* skip */ }
        }
        if (!diaryContent) diaryContent = '시험 결과 기록';

        // insertExprDiary 호출하여 exprDiarySn 획득
        var todayStr = today().replace(/-/g, '');
        var exprIemLst = resultItems.map(function(r, i) { return { exprIemSn: String(i + 1) }; });

        var diaryParams = {
          jobSeCode: 'IM18000001',
          webApi: 'Y',
          sploreReqestNo: currentReceipt.sploreReqestNo || currentReceipt.receiptNo,
          sploreSn: String(currentSampleIdx + 1),
          exprBeginDe: todayStr,
          exprEndDe: todayStr,
          exprDiaryCn: diaryContent,
          sploreChargerId: (typeof MFDS !== 'undefined' && MFDS.DEFAULT_USER) ? MFDS.DEFAULT_USER.mfdsLimsId : 'apitest34',
          exprIemLst: exprIemLst
        };

        var diaryRes = await MFDS.insertExprDiary(diaryParams);
        if (diaryRes && (diaryRes.resultFlag === '1' || diaryRes.exprDiarySn)) {
          exprDiarySn = diaryRes.exprDiarySn || (diaryRes.resultData && diaryRes.resultData[0] && diaryRes.resultData[0].exprDiarySn);
          _exprDiarySn = exprDiarySn;
          var docId2 = currentReceipt.receiptNo + '_S' + currentSampleIdx;
          await db.collection('testResults').doc(docId2).update({ exprDiarySn: exprDiarySn, mfdsSubmitted: true });
          showToast('일지 양식으로 시험일지 자동 등록 (SN: ' + exprDiarySn + ')', 'success');
        } else {
          throw new Error(diaryRes.errorMessage || '시험일지 등록 실패');
        }
      } catch(e3) {
        console.error('일지 자동등록 실패:', e3);
        showToast('시험일지 등록 실패: ' + (e3.message || e3) + '\n기록서 양식 수집 > 시험일지에서 양식을 먼저 등록하세요', 'error');
        return;
      }
    }

    // 검사결과 전송
    var items = currentResults[currentSampleIdx] || [];
    var resultParams = {
      jobSeCode: 'IM18000001',
      webApi: 'Y',
      sploreReqestNo: currentReceipt.sploreReqestNo || currentReceipt.receiptNo,
      sploreSn: String(currentSampleIdx + 1),
      exprDiarySn: exprDiarySn,
      inspctResultList: items.map(function(it, i) {
        return {
          testItmSn: String(i + 1),
          testItmCode: it.testItemCode,
          testItmNm: it.testItemName,
          inspctRsltValue: it.measuredValue,
          markValue: it.markValue || it.measuredValue,
          validCphr: it.validCphr || '',
          jdgmntFomCode: it.jdgmntFomCode || '',
          jdgmntWordCode: it.jdgmntWordCode || '',
          sstfcYn: it.judgmentResult === '적합' ? 'Y' : (it.judgmentResult === '부적합' ? 'N' : ''),
          fdqntLimitApplcAt: it.fdqntLimitApplcAt || 'N',
          fdqntLimitValue: it.fdqntLimitValue || '',
          fdqntLimitBeloValue: it.fdqntLimitBeloValue || '',
          mxmmValue: it.maxValue || '',
          mxmmValueSeCode: it.mxmmValueSeCode || '',
          mummValue: it.minValue || '',
          mummValueSeCode: it.mummValueSeCode || '',
          unitCode: it.unit || '',
          stndrdValue: it.standard || ''
        };
      })
    };

    var resultRes = await MFDS.saveSploreInspctResult(resultParams);
    if (resultRes && resultRes.resultFlag === '1') {
      var docId2 = currentReceipt.receiptNo + '_S' + currentSampleIdx;
      await db.collection('testResults').doc(docId2).update({ mfdsResultSaved: true });
      showToast('식약처 검사결과 전송 완료!', 'success');
    } else {
      showToast('검사결과 전송 실패: ' + (resultRes.errorMessage || ''), 'error');
    }

  } catch(e) {
    console.error('식약처 전송 오류:', e);
    showToast('식약처 전송 실패: ' + (e.message || e), 'error');
  }
}

/* ============================================================
   유틸리티
   ============================================================ */
function toggleSection(header) {
  header.classList.toggle('active');
  var content = header.nextElementSibling;
  if (content) content.classList.toggle('active');
}

function markModified() {
  isModified = true;
}

function cancelEdit() {
  if (isModified && !confirm('변경사항이 저장되지 않습니다. 취소할까요?')) return;
  currentReceipt = null;
  isModified = false;
  document.getElementById('right-panel').innerHTML = '<div class="no-selection"><div class="icon">🔬</div><div>좌측 목록에서 접수건을 선택하세요</div></div>';
  document.querySelectorAll('.receipt-row').forEach(function(el) { el.classList.remove('active'); });
}


function handleUrlParams() {
  var params = new URLSearchParams(window.location.search);
  var rn = params.get('receiptNo');
  if (rn) {
    var found = allReceipts.find(function(r) { return r.receiptNo === rn; });
    if (found) selectReceipt(found.id);
  }
}
