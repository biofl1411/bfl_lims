<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 관리 - BioFoodLab 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --border: #e2e6ed;
  --text: #1a2332;
  --text2: #5f6b7a;
  --text3: #8892a4;
  --primary: #1a73e8;
  --primary-light: #e8f0fe;
  --success: #0d9f6e;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ─── Sidebar Layout ─── */
.app-layout { display:flex; min-height:100vh; }
.main-wrapper { flex:1; margin-left:250px; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
@media(max-width:768px) { .main-wrapper { margin-left:0; } }

/* ─── 통합 상단바 (헤더 + 탭) ─── */
.top-nav {
  background: linear-gradient(135deg, #1a2332 0%, #2d3a4a 100%);
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,.2);
}
.top-nav-title {
  padding: 14px 24px 0;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -.3px;
}
.top-nav-title span { color: #90caf9; font-weight: 400; font-size: 13px; margin-left: 6px; }

/* ─── Tab Bar (다크 헤더 안) ─── */
.tab-bar {
  display: flex;
  padding: 0 8px;
}
.tab-btn {
  flex: 1;
  padding: 11px 12px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  color: rgba(255,255,255,.55);
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  transition: all .18s;
  text-align: center;
  white-space: nowrap;
}
.tab-btn:hover { color: rgba(255,255,255,.85); }
.tab-btn.active {
  color: #fff;
  border-bottom-color: #64b5f6;
  font-weight: 700;
}

/* ─── iframe 패널 ─── */
.tab-panels { flex: 1; position: relative; overflow: auto; }
.tab-panel {
  position: absolute;
  inset: 0;
  display: none;
}
.tab-panel.active { display: block; }
.tab-panel iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* ─── 로딩 오버레이 ─── */
.iframe-loading {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  font-size: 14px;
  color: var(--text3);
  pointer-events: none;
}
.iframe-loading.hidden { display: none; }
.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin-right: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-wrapper">

    <div class="top-nav">
      <div class="top-nav-title">🔌 API 관리<span>BioFoodLab 관리자</span></div>
      <div class="tab-bar" id="tabBar">
        <button class="tab-btn" data-tab="apiSettings"     onclick="switchTab('apiSettings')">API 설정(영업부용)</button>
        <button class="tab-btn" data-tab="collectSettings" onclick="switchTab('collectSettings')">API 수집 설정</button>
        <button class="tab-btn" data-tab="collectStatus"   onclick="switchTab('collectStatus')">수집 현황</button>
        <button class="tab-btn" data-tab="newBiz"          onclick="switchTab('newBiz')">신규 업체 알림</button>
      </div>
    </div>

    <div class="tab-panels">

      <!-- API 설정(영업부용) -->
      <div class="tab-panel" id="panel-apiSettings">
        <div class="iframe-loading" id="loading-apiSettings">
          <div class="spinner"></div>로딩 중...
        </div>
        <iframe id="iframe-apiSettings" src="" onload="onIframeLoad('apiSettings')"></iframe>
      </div>

      <!-- API 수집 설정 -->
      <div class="tab-panel" id="panel-collectSettings">
        <div class="iframe-loading" id="loading-collectSettings">
          <div class="spinner"></div>로딩 중...
        </div>
        <iframe id="iframe-collectSettings" src="" onload="onIframeLoad('collectSettings')"></iframe>
      </div>

      <!-- 수집 현황 -->
      <div class="tab-panel" id="panel-collectStatus">
        <div class="iframe-loading" id="loading-collectStatus">
          <div class="spinner"></div>로딩 중...
        </div>
        <iframe id="iframe-collectStatus" src="" onload="onIframeLoad('collectStatus')"></iframe>
      </div>

      <!-- 신규 업체 알림 -->
      <div class="tab-panel" id="panel-newBiz">
        <div class="iframe-loading" id="loading-newBiz">
          <div class="spinner"></div>로딩 중...
        </div>
        <iframe id="iframe-newBiz" src="" onload="onIframeLoad('newBiz')"></iframe>
      </div>

    </div>
  </div>
</div>

<script src="js/sidebar.js"></script>
<script>
// ─── 탭 설정 ───
var TAB_SRCS = {
  apiSettings:     'salesMgmt.html#apiSettings',
  collectSettings: 'admin_api_settings.html',
  collectStatus:   'admin_collect_status.html',
  newBiz:          'admin_new_businesses.html'
};
var _loaded = {}; // 탭별 iframe 로드 여부 (최초 1회만 src 설정)

// iframe 로드 완료 → 내부 사이드바/헤더/topbar 숨김
function onIframeLoad(tabId) {
  var iframe = document.getElementById('iframe-' + tabId);
  try {
    var doc = iframe.contentDocument || iframe.contentWindow.document;

    // 1. 사이드바 숨김
    var sb = doc.getElementById('sidebar');
    if (sb) sb.style.display = 'none';

    // 2. .main-wrapper 기반 레이아웃 (admin_*.html 계열)
    var mw = doc.querySelector('.main-wrapper');
    if (mw) { mw.style.marginLeft = '0'; mw.style.height = '100%'; mw.style.overflow = 'auto'; }

    // 3. .header 숨김
    var hd = doc.querySelector('.header');
    if (hd) hd.style.display = 'none';

    // 4. salesMgmt.html 계열: .main의 margin 제거 + .topbar(브레드크럼+알림) 숨김
    var mainEl = doc.querySelector('.main');
    if (mainEl) { mainEl.style.marginLeft = '0'; mainEl.style.width = '100%'; }
    var topbar = doc.querySelector('.topbar');
    if (topbar) topbar.style.display = 'none';

    // 5. body 배경 통일
    doc.body.style.background = '#f0f2f5';
  } catch(e) { /* cross-origin 접근 불가 시 무시 */ }

  // 로딩 오버레이 제거
  var loading = document.getElementById('loading-' + tabId);
  if (loading) loading.classList.add('hidden');
}

// 탭 전환
function switchTab(tabId) {
  // 버튼 active 전환
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.tab === tabId);
  });
  // 패널 active 전환
  document.querySelectorAll('.tab-panel').forEach(function(panel) {
    var panelTab = panel.id.replace('panel-', '');
    panel.classList.toggle('active', panelTab === tabId);
  });
  // iframe src 최초 1회 설정 (lazy load)
  if (!_loaded[tabId]) {
    _loaded[tabId] = true;
    var iframe = document.getElementById('iframe-' + tabId);
    if (iframe) iframe.src = TAB_SRCS[tabId];
  }
  // URL hash 업데이트
  history.replaceState(null, '', '#' + tabId);
}

// 초기 탭 결정 (hash 기반)
(function() {
  var hash = location.hash.replace('#', '');
  var validTabs = Object.keys(TAB_SRCS);
  var initTab = validTabs.indexOf(hash) !== -1 ? hash : 'collectStatus';
  switchTab(initTab);
})();
</script>
</body>
</html>
